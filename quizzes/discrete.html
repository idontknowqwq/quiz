<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>離散數學互動測驗 · Discrete Mathematics Quiz</title>
<style>
:root{
  --bg:#FFFFFF; --text:#1A1A1A; --muted:#6B7280; --border:#E5E7EB;
  --accent:#2563EB; --accent-text:#FFFFFF; --track:#E5E7EB; --hover:#F3F4F6;
  --correct:#16A34A; --wrong:#DC2626;
}
[data-theme="dark"]{
  --bg:#111111; --text:#E5E7EB; --muted:#9CA3AF; --border:#374151;
  --accent:#60A5FA; --accent-text:#111111; --track:#374151; --hover:#1F2937;
  --correct:#4ADE80; --wrong:#F87171;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.6;transition:background .2s ease,color .2s ease}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px 80px}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;
  flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:24px}
.title{font-size:1.15rem;font-weight:700}
.controls{display:flex;gap:8px}
.btn{font:inherit;cursor:pointer;border:1px solid var(--border);background:var(--bg);
  color:var(--text);border-radius:8px;padding:7px 12px;font-size:.85rem;
  transition:background .15s ease,border-color .15s ease}
.btn:hover{background:var(--hover)}
.progress-text{font-size:.85rem;color:var(--muted);margin-bottom:14px}
.qcard{transition:opacity .25s ease}
.qcard.fade{opacity:0}
.qnum{font-size:.8rem;color:var(--muted);margin-bottom:6px}
.qtext{font-size:1.1rem;font-weight:600;margin-bottom:18px}
.options{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:flex-start;gap:10px;text-align:left;font:inherit;
  cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);
  border-radius:10px;padding:12px 14px;font-size:.98rem;
  transition:background .15s ease,border-color .15s ease}
.opt:hover{background:var(--hover)}
.opt .letter{flex:0 0 auto;font-weight:700;color:var(--muted)}
.opt.selected{border-color:var(--accent);background:var(--hover)}
.opt.selected .letter{color:var(--accent)}
.nav{margin-top:24px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.btn.primary{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:600}
.btn.primary:hover{opacity:.9;background:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.barwrap{position:fixed;left:0;right:0;bottom:0;height:6px;background:var(--track)}
.bar{height:100%;width:0;background:var(--accent);transition:width .25s ease}
/* results */
.results h2{font-size:1.4rem;margin-bottom:4px}
.score{font-size:2.6rem;font-weight:800;margin:10px 0}
.grade{font-size:1.2rem;font-weight:700;margin-bottom:16px}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}
.stat{border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.stat .k{font-size:.8rem;color:var(--muted)}
.stat .v{font-size:1.25rem;font-weight:700}
.percentile{border:1px solid var(--border);border-radius:10px;padding:14px;margin:14px 0;font-size:1rem}
.review-title{font-weight:700;margin:24px 0 12px;font-size:1.1rem}
.rev{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.rev .rq{font-weight:600;margin-bottom:8px}
.rev .line{font-size:.92rem;margin:3px 0}
.rev .yours{color:var(--wrong)}
.rev .ans{color:var(--correct)}
.rev .exp{color:var(--muted);font-size:.88rem;margin-top:8px}
.resbtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
.allcorrect{color:var(--correct);font-weight:600}
@media(max-width:480px){.statgrid{grid-template-columns:1fr}.title{font-size:1rem}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title" id="appTitle">離散數學互動測驗</div>
    <div class="controls">
      <button class="btn" id="langBtn">English</button>
      <button class="btn" id="themeBtn">🌙 深色</button>
    </div>
  </header>
  <main id="main"></main>
</div>
<div class="barwrap"><div class="bar" id="bar"></div></div>

 {id:24,difficulty:"hard",points:25,answer:3,

 {id:25,difficulty:"medium",points:15,answer:1,

 {id:39,difficulty:"trap",points:19,answer:1,
  zh:{question:"下列關於關係性質的敘述，何者正確？",options:["對稱且遞移必定反身","對稱且遞移未必反身","反身且對稱必定遞移","反身且遞移必定對稱"],explanation:"空關係即為對稱且遞移但不反身的反例。"},
  en:{question:"Which statement about relation properties is correct?",options:["Symmetric and transitive do imply reflexivity","Symmetric and transitive need not be reflexive","Reflexive and symmetric imply transitivity","Reflexive and transitive imply symmetry"],explanation:"The empty relation is a counterexample."}},
 {id:40,difficulty:"medium",points:15,answer:3,
  zh:{question:"費氏數列 F₁=1、F₂=1、Fₙ=Fₙ₋₁+Fₙ₋₂，則 F₇ 為？",options:["21","8","11","13"],explanation:"數列為 1,1,2,3,5,8,13，故 F₇ = 13。"},
  en:{question:"For Fibonacci F₁=1, F₂=1, Fₙ=Fₙ₋₁+Fₙ₋₂, what is F₇?",options:["21","8","11","13"],explanation:"Sequence 1,1,2,3,5,8,13, so F₇ = 13."}}
];

const T = {
  zh:{appTitle:"離散數學互動測驗",lang:"English",dark:"🌙 深色",light:"☀️ 淺色",
    progress:(c,t)=>`第 ${c} / ${t} 題`,prev:"上一題",submit:"提交測驗",
    resultTitle:"測驗結果",totalScore:"總分",correctCount:"正確題數",wrongCount:"錯誤題數",
    byDiff:"各難度正確率",easy:"簡單",medium:"中等",hard:"困難",trap:"陷阱",
    grade:"等級評定",percentile:p=>`你的成績超越了約 ${p}% 的測試者`,
    reviewTitle:"錯題回顧",yours:"你的選擇",answer:"正確答案",
    retry:"重新測驗",copy:"複製結果",copied:"已複製！",allCorrect:"全部答對，太厲害了！",
    summary:(s,c)=>`離散數學測驗成績：${s} / 670　答對 ${c} / 40`},
  en:{appTitle:"Discrete Mathematics Quiz",lang:"中文",dark:"🌙 Dark",light:"☀️ Light",
    progress:(c,t)=>`Question ${c} / ${t}`,prev:"Previous",submit:"Submit Quiz",
    resultTitle:"Results",totalScore:"Total Score",correctCount:"Correct",wrongCount:"Wrong",
    byDiff:"Accuracy by Difficulty",easy:"Easy",medium:"Medium",hard:"Hard",trap:"Trap",
    grade:"Grade",percentile:p=>`You scored higher than about ${p}% of test-takers`,
    reviewTitle:"Review of Mistakes",yours:"Your choice",answer:"Correct answer",
    retry:"Retry",copy:"Copy Result",copied:"Copied!",allCorrect:"All correct — outstanding!",
    summary:(s,c)=>`Discrete Math Quiz: ${s} / 670, ${c} / 40 correct`}
};
const GRADES=[
  {min:600,zh:"🏆 頂尖專家",en:"🏆 Top Expert"},
  {min:500,zh:"⭐ 進階掌握",en:"⭐ Advanced"},
  {min:380,zh:"📘 中等水準",en:"📘 Intermediate"},
  {min:250,zh:"📗 基礎尚可",en:"📗 Basic"},
  {min:0,zh:"📕 需要加強",en:"📕 Needs Improvement"}
];
const LETTERS=["A","B","C","D"],TOTAL=questions.length,MAXSCORE=670;
let lang="zh",current=0,answers=new Array(TOTAL).fill(null),finished=false;

const main=document.getElementById("main");
const bar=document.getElementById("bar");
const langBtn=document.getElementById("langBtn");
const themeBtn=document.getElementById("themeBtn");
const appTitle=document.getElementById("appTitle");

// theme
function applyTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  themeBtn.textContent = t==="dark"?T[lang].light:T[lang].dark;
}
let theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark":"light";
applyTheme(theme);
themeBtn.onclick=()=>{theme=theme==="dark"?"light":"dark";applyTheme(theme);};
langBtn.onclick=()=>{lang=lang==="zh"?"en":"zh";document.documentElement.lang=lang==="zh"?"zh-Hant":"en";refreshChrome();finished?renderResults():renderQuestion();};

function refreshChrome(){
  appTitle.textContent=T[lang].appTitle;
  langBtn.textContent=T[lang].lang;
  themeBtn.textContent=theme==="dark"?T[lang].light:T[lang].dark;
}

function setBar(){bar.style.width=((finished?TOTAL:current)/TOTAL*100)+"%";}

function renderQuestion(){
  finished=false;
  const q=questions[current],d=q[lang];
  setBar();
  let html=`<div class="progress-text">${T[lang].progress(current+1,TOTAL)}</div>
  <div class="qcard" id="qcard">
    <div class="qnum">${current+1}</div>
    <div class="qtext">${d.question}</div>
    <div class="options">`;
  d.options.forEach((o,i)=>{
    const sel=answers[current]===i?" selected":"";
    html+=`<button class="opt${sel}" data-i="${i}"><span class="letter">${LETTERS[i]}</span><span>${o}</span></button>`;
  });
  html+=`</div><div class="nav">
    <button class="btn" id="prevBtn"${current===0?" disabled":""}>${T[lang].prev}</button>`;
  if(current===TOTAL-1) html+=`<button class="btn primary" id="submitBtn"${answers[current]===null?" disabled":""}>${T[lang].submit}</button>`;
  html+=`</div></div>`;
  main.innerHTML=html;

  main.querySelectorAll(".opt").forEach(b=>{
    b.onclick=()=>selectOption(parseInt(b.dataset.i));
  });
  const prevBtn=document.getElementById("prevBtn");
  if(prevBtn) prevBtn.onclick=()=>{if(current>0){current--;fadeTo(renderQuestion);}};
  const submitBtn=document.getElementById("submitBtn");
  if(submitBtn) submitBtn.onclick=()=>fadeTo(renderResults);
}

function selectOption(i){
  answers[current]=i;
  main.querySelectorAll(".opt").forEach((b,idx)=>b.classList.toggle("selected",idx===i));
  if(current===TOTAL-1){
    const sb=document.getElementById("submitBtn");
    if(sb) sb.disabled=false;
    return; // last question: wait for explicit submit
  }
  setTimeout(()=>{current++;fadeTo(renderQuestion);},400);
}

function fadeTo(fn){
  const card=document.getElementById("qcard")||main.firstElementChild;
  if(card){card.classList.add("fade");setTimeout(fn,200);} else fn();
}

// normal CDF via erf approximation
function normalCdf(x,mean,sd){
  const z=(x-mean)/(sd*Math.SQRT2);
  // Abramowitz-Stegun erf
  const t=1/(1+0.3275911*Math.abs(z));
  const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-z*z);
  const erf=z>=0?y:-y;
  return 0.5*(1+erf);
}

function renderResults(){
  finished=true;setBar();
  let score=0,correct=0;
  const perDiff={easy:[0,0],medium:[0,0],hard:[0,0],trap:[0,0]};
  questions.forEach((q,i)=>{
    perDiff[q.difficulty][1]++;
    if(answers[i]===q.answer){score+=q.points;correct++;perDiff[q.difficulty][0]++;}
  });
  const wrong=TOTAL-correct;
  const pct=Math.max(0,Math.min(99.9,normalCdf(score,MAXSCORE*0.45,MAXSCORE*0.15)*100));
  const pctStr=pct.toFixed(1);
  const grade=GRADES.find(g=>score>=g.min);
  const t=T[lang];

  let html=`<div class="results">
    <h2>${t.resultTitle}</h2>
    <div class="score">${score} / ${MAXSCORE}</div>
    <div class="grade">${grade[lang]}</div>
    <div class="percentile">${t.percentile(pctStr)}</div>
    <div class="statgrid">
      <div class="stat"><div class="k">${t.correctCount}</div><div class="v">${correct} / ${TOTAL}</div></div>
      <div class="stat"><div class="k">${t.wrongCount}</div><div class="v">${wrong} / ${TOTAL}</div></div>
    </div>
    <div class="review-title">${t.byDiff}</div>
    <div class="statgrid">`;
  ["easy","medium","hard","trap"].forEach(k=>{
    html+=`<div class="stat"><div class="k">${t[k]}</div><div class="v">${perDiff[k][0]} / ${perDiff[k][1]}</div></div>`;
  });
  html+=`</div>`;

  const wrongs=questions.filter((q,i)=>answers[i]!==q.answer);
  html+=`<div class="review-title">${t.reviewTitle}</div>`;
  if(wrongs.length===0){
    html+=`<div class="rev allcorrect">${t.allCorrect}</div>`;
  }else{
    questions.forEach((q,i)=>{
      if(answers[i]===q.answer)return;
      const d=q[lang];
      const your=answers[i]===null?"—":`${LETTERS[answers[i]]}. ${d.options[answers[i]]}`;
      html+=`<div class="rev">
        <div class="rq">${q.id}. ${d.question}</div>
        <div class="line yours">${t.yours}：${your}</div>
        <div class="line ans">${t.answer}：${LETTERS[q.answer]}. ${d.options[q.answer]}</div>
        <div class="exp">${d.explanation}</div>
      </div>`;
    });
  }
  html+=`<div class="resbtns">
    <button class="btn primary" id="retryBtn">${t.retry}</button>
    <button class="btn" id="copyBtn">${t.copy}</button>
  </div></div>`;
  main.innerHTML=html;

  document.getElementById("retryBtn").onclick=()=>{
    current=0;answers=new Array(TOTAL).fill(null);finished=false;fadeTo(renderQuestion);
  };
  document.getElementById("copyBtn").onclick=()=>{
    const txt=t.summary(score,correct)+" — "+grade[lang]+" | "+t.percentile(pctStr);
    const btn=document.getElementById("copyBtn");
    navigator.clipboard.writeText(txt).then(()=>{btn.textContent=t.copied;setTimeout(()=>btn.textContent=t.copy,1500);})
      .catch(()=>{btn.textContent=t.copied;setTimeout(()=>btn.textContent=t.copy,1500);});
  };
}

refreshChrome();
renderQuestion();
</script>
</body>
</html>
