<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微積分互動測驗 | Calculus Interactive Quiz</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
    --accent: #2563EB;
    --accent-text: #FFFFFF;
    --hover: #F3F4F6;
    --correct: #16A34A;
    --wrong: #DC2626;
    --track: #E5E7EB;
  }
  [data-theme="dark"] {
    --bg: #111111;
    --text: #E5E7EB;
    --text-secondary: #9CA3AF;
    --border: #374151;
    --accent: #60A5FA;
    --accent-text: #111111;
    --hover: #1F2937;
    --correct: #4ADE80;
    --wrong: #F87171;
    --track: #374151;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    transition: background 0.2s, color 0.2s;
  }
  header {
    position: sticky; top: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
    z-index: 10;
  }
  .title { font-size: 18px; font-weight: 700; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .ctrl-btn {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: var(--hover); }
  .progress-text { font-size: 14px; color: var(--text-secondary); white-space: nowrap; }
  main { max-width: 760px; margin: 0 auto; padding: 28px 20px 100px; }
  .question-card { transition: opacity 0.25s ease; }
  .question-card.fade { opacity: 0; }
  .q-number { font-size: 14px; color: var(--text-secondary); margin-bottom: 10px; }
  .q-text { font-size: 20px; font-weight: 600; margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    display: flex; align-items: center; gap: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    font-size: 16px;
    background: var(--bg);
    transition: background 0.15s, border-color 0.15s;
  }
  .option:hover { background: var(--hover); }
  .option.selected { border-color: var(--accent); background: var(--accent); color: var(--accent-text); }
  .option .label {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }
  .option.selected .label { border-color: var(--accent-text); }
  .nav-row { margin-top: 26px; display: flex; justify-content: space-between; align-items: center; }
  .nav-btn {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 18px;
    font-size: 15px; cursor: pointer;
    transition: background 0.15s;
  }
  .nav-btn:hover:not(:disabled) { background: var(--hover); }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .submit-btn {
    background: var(--accent); color: var(--accent-text);
    border: none; border-radius: 6px; padding: 12px 24px;
    font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .progress-bar-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 6px; background: var(--track);
  }
  .progress-bar { height: 100%; width: 0; background: var(--accent); transition: width 0.3s; }
  /* Results */
  .results h2 { font-size: 26px; margin-bottom: 6px; }
  .score-big { font-size: 44px; font-weight: 800; color: var(--accent); margin: 8px 0; }
  .grade { font-size: 22px; font-weight: 700; margin: 6px 0 18px; }
  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 18px 0; }
  .stat-box { border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .stat-box .k { font-size: 13px; color: var(--text-secondary); }
  .stat-box .v { font-size: 20px; font-weight: 700; margin-top: 4px; }
  .percentile { border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 18px 0; font-size: 17px; }
  .section-title { font-size: 18px; font-weight: 700; margin: 26px 0 12px; }
  .review-item { border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
  .review-q { font-weight: 600; margin-bottom: 8px; }
  .review-line { font-size: 15px; margin: 3px 0; }
  .review-line.user { color: var(--wrong); }
  .review-line.correct { color: var(--correct); }
  .review-exp { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }
  .result-actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
  .hidden { display: none; }
  @media (max-width: 520px) {
    .title { font-size: 15px; }
    .ctrl-btn { padding: 6px 9px; font-size: 13px; }
    .q-text { font-size: 18px; }
    .stat-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <div class="title" id="appTitle">微積分互動測驗</div>
  <div class="controls">
    <span class="progress-text" id="progressText">第 1 / 40 題</span>
    <button class="ctrl-btn" id="langBtn">English</button>
    <button class="ctrl-btn" id="themeBtn">🌙</button>
  </div>
</header>

<main>
  <div id="quizView">
    <div class="question-card" id="questionCard"></div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn">上一題</button>
      <button class="submit-btn hidden" id="submitBtn">提交測驗</button>
    </div>
  </div>
  <div id="resultView" class="results hidden"></div>
</main>

<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

const i18n = {
  zh: { appTitle:"微積分互動測驗", langBtn:"English", prev:"上一題", submit:"提交測驗",
    progress:(c,t)=>`第 ${c} / ${t} 題`, qLabel:(n)=>`第 ${n} 題`,
    resultTitle:"測驗結果", totalScore:"總分", correctCount:"正確題數", wrongCount:"錯誤題數",
    easy:"簡單", medium:"中等", hard:"困難", trap:"陷阱",
    byDifficulty:"各難度正確率",
    percentile:(p)=>`你的成績超越了約 ${p}% 的測試者`,
    grades:["🏆 頂尖專家","⭐ 進階掌握","📘 中等水準","📗 基礎尚可","📕 需要加強"],
    reviewTitle:"錯題回顧", yourAns:"你的選擇", correctAns:"正確答案",
    retake:"重新測驗", copy:"複製結果", copied:"已複製！", allCorrect:"太厲害了，全部答對！",
    summary:(s,c)=>`我的微積分測驗成績：${s}/670 分，答對 ${c}/40 題。` },
  en: { appTitle:"Calculus Interactive Quiz", langBtn:"中文", prev:"Previous", submit:"Submit Quiz",
    progress:(c,t)=>`Question ${c} / ${t}`, qLabel:(n)=>`Question ${n}`,
    resultTitle:"Quiz Results", totalScore:"Total Score", correctCount:"Correct", wrongCount:"Incorrect",
    easy:"Easy", medium:"Medium", hard:"Hard", trap:"Trap",
    byDifficulty:"Accuracy by Difficulty",
    percentile:(p)=>`You scored higher than about ${p}% of test-takers`,
    grades:["🏆 Top Expert","⭐ Advanced","📘 Intermediate","📗 Basic","📕 Needs Improvement"],
    reviewTitle:"Review of Mistakes", yourAns:"Your answer", correctAns:"Correct answer",
    retake:"Retake Quiz", copy:"Copy Result", copied:"Copied!", allCorrect:"Excellent — all correct!",
    summary:(s,c)=>`My Calculus quiz score: ${s}/670, ${c}/40 correct.` },
};

let lang = "zh";
let current = 0;
const answers = new Array(questions.length).fill(null);
const LETTERS = ["A","B","C","D"];

// Theme init
(function(){
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
  document.getElementById("themeBtn").textContent = prefersDark ? "☀️" : "🌙";
})();

const $ = id => document.getElementById(id);

function renderQuestion() {
  const t = i18n[lang];
  const q = questions[current];
  const data = q[lang];
  const card = $("questionCard");
  card.classList.add("fade");
  setTimeout(() => {
    let html = `<div class="q-number">${t.qLabel(current+1)}</div>`;
    html += `<div class="q-text">${data.question}</div><div class="options">`;
    data.options.forEach((opt, i) => {
      const sel = answers[current] === i ? " selected" : "";
      html += `<div class="option${sel}" data-i="${i}"><span class="label">${LETTERS[i]}</span><span>${opt}</span></div>`;
    });
    html += `</div>`;
    card.innerHTML = html;
    card.querySelectorAll(".option").forEach(el => {
      el.addEventListener("click", () => selectOption(parseInt(el.dataset.i)));
    });
    card.classList.remove("fade");
  }, 120);
  $("progressText").textContent = t.progress(current+1, questions.length);
  $("prevBtn").disabled = current === 0;
  $("prevBtn").textContent = t.prev;
  const isLast = current === questions.length - 1;
  const submitBtn = $("submitBtn");
  if (isLast && answers[current] !== null) submitBtn.classList.remove("hidden");
  else submitBtn.classList.add("hidden");
  submitBtn.textContent = t.submit;
  const pct = ((current+1) / questions.length) * 100;
  $("progressBar").style.width = pct + "%";
}

function selectOption(i) {
  answers[current] = i;
  const card = $("questionCard");
  card.querySelectorAll(".option").forEach(el => {
    el.classList.toggle("selected", parseInt(el.dataset.i) === i);
  });
  const isLast = current === questions.length - 1;
  if (isLast) {
    $("submitBtn").classList.remove("hidden");
    return;
  }
  setTimeout(() => {
    current++;
    renderQuestion();
  }, 400);
}

function normalCDF(z) {
  // Abramowitz-Stegun approximation
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d = 0.3989423 * Math.exp(-z*z/2);
  let p = d * t * (0.3193815 + t*(-0.3565638 + t*(1.781478 + t*(-1.821256 + t*1.330274))));
  return z > 0 ? 1 - p : p;
}

function showResults() {
  const t = i18n[lang];
  let score = 0, correct = 0;
  const byDiff = { easy:[0,0], medium:[0,0], hard:[0,0], trap:[0,0] };
  const wrongList = [];
  questions.forEach((q, idx) => {
    byDiff[q.difficulty][1]++;
    if (answers[idx] === q.answer) {
      score += q.points; correct++;
      byDiff[q.difficulty][0]++;
    } else {
      wrongList.push({ q, idx });
    }
  });
  const wrong = questions.length - correct;

  const mean = 670 * 0.45, sd = 670 * 0.15;
  const z = (score - mean) / sd;
  let pct = Math.round(normalCDF(z) * 100);
  pct = Math.max(1, Math.min(99, pct));

  let gIdx;
  if (score >= 600) gIdx = 0;
  else if (score >= 500) gIdx = 1;
  else if (score >= 380) gIdx = 2;
  else if (score >= 250) gIdx = 3;
  else gIdx = 4;

  let html = `<h2>${t.resultTitle}</h2>`;
  html += `<div class="score-big">${score} / 670</div>`;
  html += `<div class="grade">${t.grades[gIdx]}</div>`;
  html += `<div class="stat-grid">`;
  html += `<div class="stat-box"><div class="k">${t.correctCount}</div><div class="v">${correct} / 40</div></div>`;
  html += `<div class="stat-box"><div class="k">${t.wrongCount}</div><div class="v">${wrong} / 40</div></div>`;
  html += `</div>`;
  html += `<div class="section-title">${t.byDifficulty}</div><div class="stat-grid">`;
  [["easy",10],["medium",15],["hard",10],["trap",5]].forEach(([d,tot]) => {
    html += `<div class="stat-box"><div class="k">${t[d]}</div><div class="v">${byDiff[d][0]} / ${tot}</div></div>`;
  });
  html += `</div>`;
  html += `<div class="percentile">${t.percentile(pct)}</div>`;

  html += `<div class="section-title">${t.reviewTitle}</div>`;
  if (wrongList.length === 0) {
    html += `<div class="review-item">${t.allCorrect}</div>`;
  } else {
    wrongList.forEach(({ q, idx }) => {
      const data = q[lang];
      const ua = answers[idx];
      html += `<div class="review-item">`;
      html += `<div class="review-q">${t.qLabel(idx+1)}. ${data.question}</div>`;
      html += `<div class="review-line user">${t.yourAns}: ${LETTERS[ua]}. ${data.options[ua]}</div>`;
      html += `<div class="review-line correct">${t.correctAns}: ${LETTERS[q.answer]}. ${data.options[q.answer]}</div>`;
      html += `<div class="review-exp">${data.explanation}</div>`;
      html += `</div>`;
    });
  }
  html += `<div class="result-actions">`;
  html += `<button class="submit-btn" id="retakeBtn">${t.retake}</button>`;
  html += `<button class="nav-btn" id="copyBtn">${t.copy}</button>`;
  html += `</div>`;

  $("resultView").innerHTML = html;
  $("quizView").classList.add("hidden");
  $("resultView").classList.remove("hidden");
  $("progressBar").style.width = "100%";
  $("progressText").textContent = t.progress(40, 40);

  $("retakeBtn").addEventListener("click", retake);
  $("copyBtn").addEventListener("click", () => {
    const txt = t.summary(score, correct);
    navigator.clipboard.writeText(txt).then(() => {
      $("copyBtn").textContent = t.copied;
      setTimeout(() => { $("copyBtn").textContent = t.copy; }, 1500);
    });
  });
  window.scrollTo(0, 0);
}

function retake() {
  current = 0;
  answers.fill(null);
  $("resultView").classList.add("hidden");
  $("quizView").classList.remove("hidden");
  renderQuestion();
  window.scrollTo(0, 0);
}

// Event bindings
$("prevBtn").addEventListener("click", () => {
  if (current > 0) { current--; renderQuestion(); }
});
$("submitBtn").addEventListener("click", showResults);
$("langBtn").addEventListener("click", () => {
  lang = lang === "zh" ? "en" : "zh";
  document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
  $("appTitle").textContent = i18n[lang].appTitle;
  $("langBtn").textContent = i18n[lang].langBtn;
  if (!$("resultView").classList.contains("hidden")) showResults();
  else renderQuestion();
});
$("themeBtn").addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  $("themeBtn").textContent = next === "dark" ? "☀️" : "🌙";
});

renderQuestion();
</script>
</body>
</html>
