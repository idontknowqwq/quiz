<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>控制系統 互動測驗</title>
<style>
:root {
  --bg: #FFFFFF;
  --bg2: #F9FAFB;
  --text: #1A1A1A;
  --text2: #6B7280;
  --border: #E5E7EB;
  --accent: #2563EB;
  --accent-bg: #EFF6FF;
  --correct: #16A34A;
  --correct-bg: #F0FDF4;
  --wrong: #DC2626;
  --wrong-bg: #FEF2F2;
  --hover: #F3F4F6;
  --progress-bg: #E5E7EB;
  --btn-bg: #F3F4F6;
  --btn-text: #1A1A1A;
}
[data-theme="dark"] {
  --bg: #111111;
  --bg2: #1C1C1C;
  --text: #E5E7EB;
  --text2: #9CA3AF;
  --border: #374151;
  --accent: #60A5FA;
  --accent-bg: #1E3A5F;
  --correct: #4ADE80;
  --correct-bg: #052E16;
  --wrong: #F87171;
  --wrong-bg: #450A0A;
  --hover: #27272A;
  --progress-bg: #374151;
  --btn-bg: #27272A;
  --btn-text: #E5E7EB;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.2s, color 0.2s;
}
#app { max-width: 760px; margin: 0 auto; padding: 0 16px 48px; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
  margin-bottom: 24px;
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
}
.header-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; min-width: 120px; }
.header-controls { display: flex; align-items: center; gap: 6px; }
.header-progress { font-size: 13px; color: var(--text2); white-space: nowrap; }
.btn-sm {
  background: var(--btn-bg); color: var(--btn-text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 10px; font-size: 12px; cursor: pointer; white-space: nowrap;
}
.btn-sm:hover { background: var(--hover); }

/* Progress bar */
.progress-bar-wrap { height: 4px; background: var(--progress-bg); border-radius: 2px; margin-bottom: 28px; }
.progress-bar-fill { height: 4px; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

/* Question card */
.question-card { opacity: 1; transition: opacity 0.25s; }
.question-card.fade { opacity: 0; }
.q-meta { font-size: 12px; color: var(--text2); margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }
.q-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600; border: 1px solid var(--border);
  color: var(--text2); background: var(--bg2);
}
.q-text { font-size: 17px; font-weight: 600; line-height: 1.6; margin-bottom: 20px; color: var(--text); }
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex; align-items: flex-start; gap: 12px;
  border: 1px solid var(--border); border-radius: 8px;
  padding: 13px 16px; cursor: pointer; background: var(--bg);
  transition: background 0.15s, border-color 0.15s;
}
.option:hover { background: var(--hover); }
.option.selected { border-color: var(--accent); background: var(--accent-bg); }
.option-label {
  flex-shrink: 0; width: 26px; height: 26px;
  border-radius: 50%; border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--text2);
  background: var(--bg2);
}
.option.selected .option-label { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.option-text { font-size: 15px; line-height: 1.5; color: var(--text); padding-top: 1px; }

/* Nav buttons */
.nav-row { display: flex; gap: 10px; margin-top: 24px; justify-content: space-between; align-items: center; }
.btn-nav {
  padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border); background: var(--btn-bg); color: var(--btn-text);
}
.btn-nav:hover { background: var(--hover); }
.btn-nav:disabled { opacity: 0.35; cursor: default; }
.btn-submit {
  padding: 12px 28px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
}
.btn-submit:hover { opacity: 0.88; }

/* Results */
#results { display: none; }
.result-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
.result-score { font-size: 48px; font-weight: 900; color: var(--accent); margin: 16px 0 4px; }
.result-score-sub { font-size: 15px; color: var(--text2); margin-bottom: 20px; }
.result-grade { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.result-percentile { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; text-align: center;
}
.stat-card .label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.stat-card .value { font-size: 22px; font-weight: 800; color: var(--text); }
.diff-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 14px; }
.diff-table th { text-align: left; padding: 8px 10px; background: var(--bg2); border-bottom: 1px solid var(--border); color: var(--text2); font-weight: 600; }
.diff-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
.section-title { font-size: 17px; font-weight: 700; margin: 28px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

/* Review */
.review-item { border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 14px; background: var(--bg2); }
.review-q { font-size: 14px; font-weight: 600; margin-bottom: 10px; line-height: 1.5; }
.review-opt { font-size: 13px; padding: 6px 10px; border-radius: 6px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 8px; }
.review-opt.user-wrong { background: var(--wrong-bg); color: var(--wrong); border: 1px solid var(--wrong); }
.review-opt.correct-ans { background: var(--correct-bg); color: var(--correct); border: 1px solid var(--correct); }
.review-explanation { font-size: 12px; color: var(--text2); margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.5; }
.result-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 24px; }
.btn-action {
  padding: 11px 22px; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border); background: var(--btn-bg); color: var(--btn-text);
}
.btn-action:hover { background: var(--hover); }
.btn-action.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-action.primary:hover { opacity: 0.88; }

@media (max-width: 520px) {
  .q-text { font-size: 15px; }
  .option-text { font-size: 14px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .result-score { font-size: 38px; }
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div class="header-title" id="headerTitle">控制系統 互動測驗</div>
      <div class="header-controls">
        <span class="header-progress" id="headerProgress">第 1 / 40 題</span>
        <button class="btn-sm" id="btnLang" onclick="toggleLang()">English</button>
        <button class="btn-sm" id="btnTheme" onclick="toggleTheme()">🌙 深色</button>
      </div>
    </div>
    <div class="progress-bar-wrap" style="margin-top:10px;margin-bottom:0">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div id="quiz">
    <div class="question-card" id="questionCard">
      <div class="q-meta">
        <span id="qNum" class="q-badge">Q1</span>
        <span id="qPts" class="q-badge"></span>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="nav-row">
        <button class="btn-nav" id="btnPrev" onclick="goTo(currentQ-1)" disabled>← <span class="nav-label">上一題</span></button>
        <button class="btn-submit" id="btnSubmit" style="display:none" onclick="submitQuiz()"><span id="submitLabel">提交測驗</span></button>
      </div>
    </div>
  </div>

  <div id="results">
    <div class="result-title" id="resultTitle">測驗結果</div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-score-sub" id="resultScoreSub"></div>
    <div class="result-grade" id="resultGrade"></div>
    <div class="result-percentile" id="resultPercentile"></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="label" id="lblCorrect">答對題數</div><div class="value" id="valCorrect"></div></div>
      <div class="stat-card"><div class="label" id="lblWrong">答錯題數</div><div class="value" id="valWrong"></div></div>
    </div>
    <div class="section-title" id="sectionDiff">各難度成績</div>
    <table class="diff-table">
      <thead><tr>
        <th id="thDiff">難度</th>
        <th id="thCorrect">答對</th>
        <th id="thScore">得分</th>
        <th id="thRate">正確率</th>
      </tr></thead>
      <tbody id="diffTableBody"></tbody>
    </table>
    <div class="section-title" id="sectionReview">錯題回顧</div>
    <div id="reviewContainer"></div>
    <div class="result-actions">
      <button class="btn-action primary" onclick="restartQuiz()" id="btnRestart">🔄 重新測驗</button>
      <button class="btn-action" onclick="copyResult()" id="btnCopy">📋 複製結果</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// 題目資料 (40題，難度混排，答案A/B/C/D各10題)
// ─────────────────────────────────────────
const questions = [
  // Q1 - Easy - Answer: A (0)
  {
    id: 1, difficulty: "easy", points: 10,
    zh: {
      question: "線性非時變（LTI）系統的轉移函數 G(s) 定義為何？",
      options: [
        "在零初始條件下，輸出拉普拉斯轉換與輸入拉普拉斯轉換之比",
        "在任意初始條件下，系統輸出與輸入的時域比值函數",
        "系統脈衝響應 h(t) 在時域中對所有時間的積分值",
        "系統輸出對外部擾動訊號之穩態比值，不考慮初始條件"
      ],
      explanation: "轉移函數定義在零初始條件下，G(s)=Y(s)/U(s)"
    },
    en: {
      question: "How is the transfer function G(s) of a linear time-invariant (LTI) system defined?",
      options: [
        "The ratio of the output Laplace transform to the input Laplace transform under zero initial conditions",
        "The ratio of system output to input in the time domain under arbitrary initial conditions",
        "The integral of the impulse response h(t) over all time in the time domain",
        "The steady-state ratio of the system output to external disturbances, ignoring initial conditions"
      ],
      explanation: "Transfer function is defined under zero initial conditions: G(s)=Y(s)/U(s)"
    },
    answer: 0
  },
  // Q2 - Medium - Answer: B (1)
  {
    id: 2, difficulty: "medium", points: 15,
    zh: {
      question: "標準二階系統 G(s) = ωn²/(s²+2ζωns+ωn²)，當阻尼比 ζ=0.5 時，單位步階響應的超越量（%OS）最接近？",
      options: [
        "約 5%，阻尼比足夠大使超越量極小",
        "約 16%，由公式 e^(−πζ/√(1−ζ²))×100% 計算得出",
        "約 30%，阻尼不足導致較大振盪超越",
        "約 45%，系統接近臨界阻尼邊界所致"
      ],
      explanation: "%OS=e^(−πζ/√(1−ζ²))×100%，ζ=0.5 時約 16.3% | %OS≈16.3% when ζ=0.5"
    },
    en: {
      question: "For a standard second-order system G(s) = ωn²/(s²+2ζωns+ωn²) with damping ratio ζ=0.5, the percent overshoot (%OS) of the unit step response is approximately:",
      options: [
        "About 5%, the damping ratio is large enough to minimize overshoot significantly",
        "About 16%, calculated from the formula e^(−πζ/√(1−ζ²))×100%",
        "About 30%, insufficient damping leads to a considerably large overshoot",
        "About 45%, the system is near the critical damping boundary condition"
      ],
      explanation: "%OS=e^(−πζ/√(1−ζ²))×100%; when ζ=0.5, %OS≈16.3%"
    },
    answer: 1
  },
  // Q3 - Hard - Answer: C (2)
  {
    id: 3, difficulty: "hard", points: 25,
    zh: {
      question: "特徵方程式 s⁴+2s³+3s²+4s+5=0，根據勞斯-赫維茲（Routh-Hurwitz）穩定判據，位於右半 s 平面（RHP）的根共有幾個？",
      options: [
        "0 個，勞斯陣列第一行無符號變化，系統穩定",
        "1 個，勞斯陣列第一行出現一次符號變化",
        "2 個，勞斯陣列第一行出現兩次符號變化",
        "4 個，所有根均位於右半平面，系統完全不穩定"
      ],
      explanation: "勞斯陣列第一行：1,2,1,−6,5，符號變化兩次，故有 2 個 RHP 根 | Routh first column: 1,2,1,−6,5; two sign changes → 2 RHP roots"
    },
    en: {
      question: "For the characteristic equation s⁴+2s³+3s²+4s+5=0, how many roots lie in the right half s-plane (RHP) according to the Routh-Hurwitz stability criterion?",
      options: [
        "0 roots; no sign changes in the Routh array first column, system is stable",
        "1 root; there is exactly one sign change in the Routh array first column",
        "2 roots; there are exactly two sign changes in the Routh array first column",
        "4 roots; all roots lie in the right half plane and the system is fully unstable"
      ],
      explanation: "Routh first column: 1, 2, 1, −6, 5; two sign changes → 2 RHP roots"
    },
    answer: 2
  },
  // Q4 - Trap - Answer: D (3)
  {
    id: 4, difficulty: "trap", points: 19,
    zh: {
      question: "在負回饋控制系統中，若持續增大比例增益 K，以下哪個描述最為正確？",
      options: [
        "響應速度不斷加快，且系統穩定性完全不受增益大小影響",
        "穩態誤差持續線性遞減，當 K 趨向無限大時誤差趨近於零",
        "超越量雖然持續增加，但只要 K 有限則系統始終維持穩定",
        "當增益超過某臨界值後，閉迴路極點進入右半平面而不穩定"
      ],
      explanation: "增益過大使閉迴路極點移至右半平面，導致不穩定；穩定裕度有限 | Excess gain moves closed-loop poles into RHP causing instability"
    },
    en: {
      question: "In a negative feedback control system, if the proportional gain K is continuously increased, which statement is most accurate?",
      options: [
        "Response speed keeps increasing and system stability is completely unaffected by gain magnitude",
        "Steady-state error decreases linearly; as K approaches infinity the error approaches zero",
        "Overshoot keeps increasing but as long as K is finite the system always remains stable",
        "Once gain exceeds a critical value, closed-loop poles enter the right half plane causing instability"
      ],
      explanation: "Excessive gain shifts closed-loop poles into the RHP, causing instability; stability margins are limited"
    },
    answer: 3
  },
  // Q5 - Medium - Answer: A (0)
  {
    id: 5, difficulty: "medium", points: 15,
    zh: {
      question: "線性非時變系統 BIBO（有界輸入有界輸出）穩定的充要條件是？",
      options: [
        "所有閉迴路特徵值（極點）均嚴格位於 s 平面的左半平面",
        "所有開迴路極點均嚴格位於 s 平面的左半平面不含虛軸",
        "開迴路轉移函數的增益裕度（GM）嚴格大於 0 dB",
        "奈奎斯特（Nyquist）圖不包圍且不通過 (−1, j0) 點"
      ],
      explanation: "BIBO 穩定充要條件：所有閉迴路極點在左半平面（LHP）| All closed-loop poles must lie in the LHP"
    },
    en: {
      question: "What is the necessary and sufficient condition for BIBO (bounded-input bounded-output) stability of a linear time-invariant system?",
      options: [
        "All closed-loop eigenvalues (poles) lie strictly in the left half of the s-plane",
        "All open-loop poles lie strictly in the left half of the s-plane excluding the imaginary axis",
        "The gain margin (GM) of the open-loop transfer function is strictly greater than 0 dB",
        "The Nyquist plot neither encircles nor passes through the point (−1, j0)"
      ],
      explanation: "BIBO stability requires all closed-loop poles to lie strictly in the left half plane (LHP)"
    },
    answer: 0
  },
  // Q6 - Easy - Answer: B (1)
  {
    id: 6, difficulty: "easy", points: 10,
    zh: {
      question: "一階系統 G(s)=1/(τs+1) 在單位步階輸入下，當時間 t=2τ 時，輸出值約為最終穩態值的多少百分比？",
      options: [
        "約 63.2%，此為一個時間常數 τ 時的輸出比例",
        "約 86.5%，由 1−e⁻²≈0.865 計算得出",
        "約 95.0%，此為三個時間常數 3τ 時的輸出比例",
        "約 99.3%，此為五個時間常數 5τ 時的輸出比例"
      ],
      explanation: "一階系統步階響應 y(t)=1−e^(−t/τ)，t=2τ 時 y=1−e⁻²≈86.5% | y(t)=1−e^(−t/τ); at t=2τ, y≈86.5%"
    },
    en: {
      question: "For a first-order system G(s)=1/(τs+1) under unit step input, the output at time t=2τ is approximately what percentage of the final steady-state value?",
      options: [
        "About 63.2%, which is the output fraction at one time constant τ",
        "About 86.5%, calculated from 1−e⁻²≈0.865",
        "About 95.0%, which is the output fraction at three time constants 3τ",
        "About 99.3%, which is the output fraction at five time constants 5τ"
      ],
      explanation: "First-order step response y(t)=1−e^(−t/τ); at t=2τ, y=1−e⁻²≈86.5%"
    },
    answer: 1
  },
  // Q7 - Hard - Answer: C (2)
  {
    id: 7, difficulty: "hard", points: 25,
    zh: {
      question: "開迴路轉移函數 G(s)H(s)=K/[s(s+2)(s+4)] 的根軌跡，其三條漸近線的角度分別為？",
      options: [
        "0°、90°、180°，均勻分布於正實軸方向及虛軸方向",
        "45°、135°、225°，從漸近線中心以 90° 間隔向外延伸",
        "60°、180°、300°，依公式 (2k+1)×180°/(n−m) 計算得出",
        "30°、90°、270°，依系統極點在實軸上的位置偏移決定"
      ],
      explanation: "n=3 個極點，m=0 個零點，漸近線角度=(2k+1)×180°/3，k=0,1,2 得 60°,180°,300° | Angles=(2k+1)×180°/3 for k=0,1,2"
    },
    en: {
      question: "For the root locus of G(s)H(s)=K/[s(s+2)(s+4)], what are the angles of the three asymptotes?",
      options: [
        "0°, 90°, 180°, uniformly distributed toward the positive real axis and imaginary axis",
        "45°, 135°, 225°, extending from the asymptote centroid at 90° intervals",
        "60°, 180°, 300°, computed from the formula (2k+1)×180°/(n−m)",
        "30°, 90°, 270°, determined by the locations of the system poles on the real axis"
      ],
      explanation: "n=3 poles, m=0 zeros; asymptote angles=(2k+1)×180°/3 for k=0,1,2 → 60°,180°,300°"
    },
    answer: 2
  },
  // Q8 - Medium - Answer: D (3)
  {
    id: 8, difficulty: "medium", points: 15,
    zh: {
      question: "若系統開迴路頻率響應在增益交越頻率 ωgc 處的相位角為 −150°，則系統的相位裕度（Phase Margin）為？",
      options: [
        "相位裕度為 −150°，即為增益交越頻率處的相位角本身",
        "相位裕度為 −30°，由 −180° 加上交越頻率相位角計算",
        "相位裕度為 150°，等於相位角的絕對值，不考慮符號",
        "相位裕度為 30°，由公式 PM=180°+∠G(jωgc) 計算得出"
      ],
      explanation: "PM=180°+∠G(jωgc)=180°+(−150°)=30° | PM=180°+phase at gain crossover=30°"
    },
    en: {
      question: "If the phase angle of a system's open-loop frequency response at the gain crossover frequency ωgc is −150°, what is the phase margin (PM)?",
      options: [
        "The phase margin is −150°, equal to the phase angle at the gain crossover frequency itself",
        "The phase margin is −30°, computed by adding −180° to the crossover frequency phase angle",
        "The phase margin is 150°, equal to the absolute value of the phase angle ignoring sign",
        "The phase margin is 30°, computed from the formula PM=180°+∠G(jωgc)"
      ],
      explanation: "PM=180°+∠G(jωgc)=180°+(−150°)=30°"
    },
    answer: 3
  },
  // Q9 - Easy - Answer: A (0)
  {

// ─────────────────────────────────────────
// 語言 & 主題狀態
// ─────────────────────────────────────────
let lang = 'zh';
let currentQ = 0;
let userAnswers = new Array(40).fill(-1);
let submitted = false;
let transitioning = false;

// ─────────────────────────────────────────
// 主題初始化
// ─────────────────────────────────────────
(function initTheme() {
  const stored = localStorage.getItem('cs_quiz_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = stored || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeBtn(theme);
})();

function updateThemeBtn(theme) {
  const btn = document.getElementById('btnTheme');
  if (btn) btn.textContent = theme === 'dark' ? '☀️ 淺色' : '🌙 深色';
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('cs_quiz_theme', next);
  updateThemeBtn(next);
}

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  document.getElementById('btnLang').textContent = lang === 'zh' ? 'English' : '中文';
  document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh-TW' : 'en');
  if (submitted) {
    renderResults();
  } else {
    renderQuestion(currentQ, false);
    updateUI();
  }
}

// ─────────────────────────────────────────
// 渲染題目
// ─────────────────────────────────────────
function renderQuestion(idx, animate) {
  const q = questions[idx];
  const data = q[lang];
  const card = document.getElementById('questionCard');

  if (animate) {
    card.classList.add('fade');
    setTimeout(() => {
      _setQuestion(q, data, idx);
      card.classList.remove('fade');
    }, 220);
  } else {
    _setQuestion(q, data, idx);
  }
}

function _setQuestion(q, data, idx) {
  document.getElementById('qNum').textContent = `Q${idx + 1}`;
  const ptsLabel = { easy: lang==='zh'?'簡單':'Easy', medium: lang==='zh'?'中等':'Med', hard: lang==='zh'?'困難':'Hard', trap: lang==='zh'?'陷阱':'Trap' };
  document.getElementById('qPts').textContent = `${q.points} ${lang==='zh'?'分':'pts'}`;
  document.getElementById('qText').textContent = data.question;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  data.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (userAnswers[idx] === i ? ' selected' : '');
    div.innerHTML = `<div class="option-label">${labels[i]}</div><div class="option-text">${opt}</div>`;
    div.onclick = () => selectOption(idx, i);
    container.appendChild(div);
  });
}

function updateUI() {
  const idx = currentQ;
  document.getElementById('headerProgress').textContent = lang === 'zh'
    ? `第 ${idx+1} / 40 題` : `Q ${idx+1} / 40`;
  document.getElementById('headerTitle').textContent = lang === 'zh'
    ? '控制系統 互動測驗' : 'Control Systems Quiz';
  document.getElementById('progressFill').style.width = ((idx+1)/40*100) + '%';
  document.getElementById('btnPrev').disabled = idx === 0;
  const prevBtn = document.getElementById('btnPrev');
  prevBtn.innerHTML = lang === 'zh' ? '← 上一題' : '← Prev';

  const submitBtn = document.getElementById('btnSubmit');
  if (idx === 39) {
    submitBtn.style.display = 'inline-block';
    document.getElementById('submitLabel').textContent = lang === 'zh' ? '提交測驗 ✓' : 'Submit Quiz ✓';
  } else {
    submitBtn.style.display = 'none';
  }
}

function selectOption(qIdx, optIdx) {
  if (transitioning) return;
  userAnswers[qIdx] = optIdx;

  // 視覺更新
  const options = document.querySelectorAll('.option');
  options.forEach((el, i) => {
    el.classList.toggle('selected', i === optIdx);
  });

  // 最後一題不自動跳轉
  if (qIdx === 39) return;

  // 0.4 秒後自動跳到下一題
  transitioning = true;
  setTimeout(() => {
    transitioning = false;
    goTo(qIdx + 1);
  }, 400);
}

function goTo(idx) {
  if (idx < 0 || idx >= 40) return;
  currentQ = idx;
  renderQuestion(idx, true);
  updateUI();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────
// 提交測驗
// ─────────────────────────────────────────
function submitQuiz() {
  submitted = true;
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  renderResults();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────
// 計算成績
// ─────────────────────────────────────────
function calcResults() {
  const diffStats = { easy: {correct:0,total:10,pts:0,maxPts:100}, medium: {correct:0,total:15,pts:0,maxPts:225}, hard: {correct:0,total:10,pts:0,maxPts:250}, trap: {correct:0,total:5,pts:0,maxPts:95} };
  let totalScore = 0, correctCount = 0;
  const wrongQuestions = [];

  questions.forEach((q, i) => {
    const isCorrect = userAnswers[i] === q.answer;
    if (isCorrect) {
      totalScore += q.points;
      correctCount++;
      diffStats[q.difficulty].correct++;
      diffStats[q.difficulty].pts += q.points;
    } else {
      wrongQuestions.push({ q, idx: i, userAns: userAnswers[i] });
    }
  });

  // 常態分布 CDF 計算百分位
  const mean = 670 * 0.45;   // 301.5
  const std = 670 * 0.15;    // 100.5
  const z = (totalScore - mean) / std;
  const percentile = Math.round(normalCDF(z) * 100);

  return { totalScore, correctCount, wrongQuestions, diffStats, percentile };
}

function normalCDF(z) {
  // Abramowitz & Stegun 近似
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d = 0.3989422820 * Math.exp(-z * z / 2);
  const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.7814779 + t * (-1.8212560 + t * 1.3302744))));
  return z > 0 ? 1 - p : p;
}

// ─────────────────────────────────────────
// 渲染結果頁
// ─────────────────────────────────────────
function renderResults() {
  const { totalScore, correctCount, wrongQuestions, diffStats, percentile } = calcResults();
  const isZh = lang === 'zh';

  document.getElementById('resultTitle').textContent = isZh ? '測驗結果' : 'Quiz Results';
  document.getElementById('resultScore').textContent = `${totalScore} / 670`;
  document.getElementById('resultScoreSub').textContent = isZh
    ? `答對 ${correctCount} 題，答錯 ${40-correctCount} 題`
    : `${correctCount} correct, ${40-correctCount} incorrect`;

  // 等級
  let grade;
  if (totalScore >= 600) grade = isZh ? '🏆 頂尖專家' : '🏆 Top Expert';
  else if (totalScore >= 500) grade = isZh ? '⭐ 進階掌握' : '⭐ Advanced';
  else if (totalScore >= 380) grade = isZh ? '📘 中等水準' : '📘 Intermediate';
  else if (totalScore >= 250) grade = isZh ? '📗 基礎尚可' : '📗 Basic';
  else grade = isZh ? '📕 需要加強' : '📕 Needs Improvement';
  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('resultPercentile').textContent = isZh
    ? `你的成績超越了約 ${percentile}% 的測試者`
    : `Your score surpasses approximately ${percentile}% of test takers`;

  // 統計卡
  document.getElementById('lblCorrect').textContent = isZh ? '答對題數' : 'Correct';
  document.getElementById('valCorrect').textContent = `${correctCount} / 40`;
  document.getElementById('lblWrong').textContent = isZh ? '答錯題數' : 'Incorrect';
  document.getElementById('valWrong').textContent = `${40-correctCount} / 40`;

  // 難度表格
  document.getElementById('sectionDiff').textContent = isZh ? '各難度成績' : 'Performance by Difficulty';
  document.getElementById('thDiff').textContent = isZh ? '難度' : 'Difficulty';
  document.getElementById('thCorrect').textContent = isZh ? '答對' : 'Correct';
  document.getElementById('thScore').textContent = isZh ? '得分' : 'Score';
  document.getElementById('thRate').textContent = isZh ? '正確率' : 'Accuracy';

  const diffNames = {
    easy: isZh ? '簡單 Easy' : 'Easy',
    medium: isZh ? '中等 Med' : 'Medium',
    hard: isZh ? '困難 Hard' : 'Hard',
    trap: isZh ? '陷阱 Trap' : 'Trap'
  };
  const tbody = document.getElementById('diffTableBody');
  tbody.innerHTML = '';
  ['easy','medium','hard','trap'].forEach(d => {
    const s = diffStats[d];
    const rate = Math.round(s.correct / s.total * 100);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${diffNames[d]}</td><td>${s.correct} / ${s.total}</td><td>${s.pts} / ${s.maxPts}</td><td>${rate}%</td>`;
    tbody.appendChild(tr);
  });

  // 錯題回顧
  document.getElementById('sectionReview').textContent = isZh ? '錯題回顧' : 'Review Incorrect Answers';
  const container = document.getElementById('reviewContainer');
  container.innerHTML = '';
  if (wrongQuestions.length === 0) {
    container.innerHTML = `<p style="color:var(--correct);font-weight:700;font-size:16px">${isZh ? '🎉 全部答對！' : '🎉 Perfect score!'}</p>`;
  } else {
    const labels = ['A','B','C','D'];
    wrongQuestions.forEach(({ q, idx, userAns }) => {
      const data = q[lang];
      const div = document.createElement('div');
      div.className = 'review-item';
      let html = `<div class="review-q">Q${idx+1}. ${data.question}</div>`;
      if (userAns >= 0) {
        html += `<div class="review-opt user-wrong">❌ ${isZh?'你的選擇':'Your answer'}: ${labels[userAns]}. ${data.options[userAns]}</div>`;
      } else {
        html += `<div class="review-opt user-wrong">— ${isZh?'未作答':'Not answered'}</div>`;
      }
      html += `<div class="review-opt correct-ans">✓ ${isZh?'正確答案':'Correct'}: ${labels[q.answer]}. ${data.options[q.answer]}</div>`;
      html += `<div class="review-explanation">💡 ${data.explanation}</div>`;
      div.innerHTML = html;
      container.appendChild(div);
    });
  }

  // 按鈕文字
  document.getElementById('btnRestart').textContent = isZh ? '🔄 重新測驗' : '🔄 Retake Quiz';
  document.getElementById('btnCopy').textContent = isZh ? '📋 複製結果' : '📋 Copy Result';
}

function restartQuiz() {
  userAnswers = new Array(40).fill(-1);
  currentQ = 0;
  submitted = false;
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion(0, false);
  updateUI();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyResult() {
  const { totalScore, correctCount, diffStats, percentile } = calcResults();
  const isZh = lang === 'zh';
  let text;
  if (isZh) {
    text = `控制系統 互動測驗 結果\n═══════════════════\n總分：${totalScore} / 670\n答對：${correctCount} / 40 題\n百分位：超越約 ${percentile}% 的測試者\n簡單：${diffStats.easy.correct}/10 | 中等：${diffStats.medium.correct}/15 | 困難：${diffStats.hard.correct}/10 | 陷阱：${diffStats.trap.correct}/5`;
  } else {
    text = `Control Systems Quiz Result\n═══════════════════\nTotal: ${totalScore} / 670\nCorrect: ${correctCount} / 40\nPercentile: surpasses ~${percentile}% of test takers\nEasy: ${diffStats.easy.correct}/10 | Med: ${diffStats.medium.correct}/15 | Hard: ${diffStats.hard.correct}/10 | Trap: ${diffStats.trap.correct}/5`;
  }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopy');
    const orig = btn.textContent;
    btn.textContent = isZh ? '✓ 已複製！' : '✓ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  }).catch(() => {
    alert(text);
  });
}

// ─────────────────────────────────────────
// 初始化
// ─────────────────────────────────────────
renderQuestion(0, false);
updateUI();
</script>
