<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微分方程互動測驗 | Differential Equations Quiz</title>
<style>
  :root {
    --bg: #FFFFFF; --text: #1A1A1A; --text-sec: #6B7280; --border: #E5E7EB;
    --accent: #2563EB; --option-bg: #FFFFFF; --option-hover: #EFF6FF;
    --selected-bg: #DBEAFE; --selected-border: #2563EB;
    --progress-bg: #E5E7EB; --progress-fill: #2563EB;
    --correct: #16A34A; --correct-bg: #DCFCE7;
    --wrong: #DC2626; --wrong-bg: #FEE2E2;
    --btn-bg: #2563EB; --btn-text: #FFFFFF; --btn-hover: #1D4ED8;
    --card-bg: #F9FAFB;
  }
  [data-theme="dark"] {
    --bg: #111111; --text: #E5E7EB; --text-sec: #9CA3AF; --border: #374151;
    --accent: #60A5FA; --option-bg: #1F2937; --option-hover: #1E3A5F;
    --selected-bg: #1E3A5F; --selected-border: #60A5FA;
    --progress-bg: #374151; --progress-fill: #60A5FA;
    --correct: #4ADE80; --correct-bg: #14532D;
    --wrong: #F87171; --wrong-bg: #450A0A;
    --btn-bg: #60A5FA; --btn-text: #111111; --btn-hover: #93C5FD;
    --card-bg: #1F2937;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }
  .header { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; z-index: 100; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .progress-text { font-size: 13px; color: var(--text-sec); }
  .btn-small { font-size: 12px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--option-bg); color: var(--text); cursor: pointer; }
  .btn-small:hover { background: var(--option-hover); }
  .main { max-width: 720px; margin: 0 auto; padding: 24px 20px 60px; }
  .question-card { background: var(--option-bg); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 16px; opacity: 1; transition: opacity 0.2s; }
  .question-card.fade { opacity: 0; }
  .question-num { font-size: 12px; color: var(--text-sec); margin-bottom: 10px; }
  .question-text { font-size: 17px; line-height: 1.65; font-weight: 500; }
  .options { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--option-bg); cursor: pointer; transition: background 0.12s, border-color 0.12s; }
  .option:hover { background: var(--option-hover); }
  .option.selected { background: var(--selected-bg); border-color: var(--selected-border); }
  .option-label { font-size: 13px; font-weight: 700; color: var(--accent); min-width: 20px; padding-top: 1px; }
  .option-text { font-size: 15px; line-height: 1.55; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 16px; }
  .btn { padding: 10px 22px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-primary { background: var(--btn-bg); color: var(--btn-text); }
  .btn-primary:hover { background: var(--btn-hover); }
  .btn-secondary { background: transparent; color: var(--text-sec); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--option-hover); color: var(--text); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .progress-bar-wrap { position: fixed; bottom: 0; left: 0; right: 0; height: 5px; background: var(--progress-bg); z-index: 99; }
  .progress-bar-fill { height: 100%; background: var(--progress-fill); transition: width 0.3s; }
  .result-page { display: none; }
  .result-page.show { display: block; }
  .quiz-page.hide { display: none; }
  .score-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 20px; text-align: center; }
  .score-big { font-size: 52px; font-weight: 800; color: var(--accent); line-height: 1; }
  .score-label { font-size: 14px; color: var(--text-sec); margin-top: 6px; }
  .score-grade { font-size: 22px; font-weight: 700; margin-top: 14px; }
  .score-percentile { font-size: 14px; color: var(--text-sec); margin-top: 6px; }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 700; }
  .stat-lbl { font-size: 12px; color: var(--text-sec); margin-top: 3px; }
  .diff-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
  .diff-table th, .diff-table td { border: 1px solid var(--border); padding: 9px 12px; text-align: center; }
  .diff-table th { background: var(--card-bg); font-weight: 600; }
  .review-section { margin-bottom: 20px; }
  .review-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
  .review-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .review-q { font-size: 14px; font-weight: 500; margin-bottom: 10px; line-height: 1.55; }
  .review-opt { font-size: 13px; padding: 6px 10px; border-radius: 6px; margin-bottom: 5px; }
  .review-opt.wrong { background: var(--wrong-bg); color: var(--wrong); }
  .review-opt.correct { background: var(--correct-bg); color: var(--correct); }
  .review-exp { font-size: 12px; color: var(--text-sec); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .result-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  @media (max-width: 520px) { .header-title { font-size: 13px; } .question-text { font-size: 15px; } .score-big { font-size: 40px; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-title" id="headerTitle">微分方程 測驗</div>
  <div class="header-right">
    <span class="progress-text" id="progressText">第 1 / 40 題</span>
    <button class="btn-small" id="langBtn" onclick="toggleLang()">English</button>
    <button class="btn-small" id="themeBtn" onclick="toggleTheme()">🌙 深色</button>
  </div>
</div>

<div class="main quiz-page" id="quizPage">
  <div class="question-card" id="questionCard">
    <div class="question-num" id="questionNum"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
  </div>
  <div class="nav-row">
    <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">&#8592; <span id="prevLabel">上一題</span></button>
    <button class="btn btn-primary" id="submitBtn" onclick="submitQuiz()" style="display:none">
      <span id="submitLabel">提交測驗</span>
    </button>
  </div>
</div>

<div class="main result-page" id="resultPage">
  <div class="score-card">
    <div class="score-big" id="scoreBig"></div>
    <div class="score-label" id="scoreLabel">/ 670 分</div>
    <div class="score-grade" id="scoreGrade"></div>
    <div class="score-percentile" id="scorePercentile"></div>
  </div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-val" id="statCorrect"></div><div class="stat-lbl" id="statCorrectLbl">答對題數</div></div>
    <div class="stat-box"><div class="stat-val" id="statWrong"></div><div class="stat-lbl" id="statWrongLbl">答錯題數</div></div>
  </div>
  <table class="diff-table">
    <thead><tr><th id="dh1">難度</th><th id="dh2">答對</th><th id="dh3">總題數</th><th id="dh4">得分</th></tr></thead>
    <tbody id="diffBody"></tbody>
  </table>
  <div class="result-btns">
    <button class="btn btn-primary" onclick="restartQuiz()"><span id="restartLabel">重新測驗</span></button>
    <button class="btn btn-secondary" onclick="copyResult()"><span id="copyLabel">複製結果</span></button>
  </div>
  <div class="review-section">
    <div class="review-title" id="reviewTitle">錯題回顧</div>
    <div id="reviewContainer"></div>
  </div>
</div>

<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>

<script>
// ── Language & Theme ──────────────────────────────────────────────
let lang = 'zh';
let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
document.documentElement.setAttribute('data-theme', theme);

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  document.getElementById('langBtn').textContent = lang === 'zh' ? 'English' : '中文';
  document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
  if (resultShown) renderResult(); else renderQuestion();
  updateStaticUI();
}
function toggleTheme() {
  theme = theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️ 淺色' : '🌙 深色';
}

// ── Questions (40 題) ─────────────────────────────────────────────
// 答案分布：A=10, B=10, C=10, D=10
// 難度：easy×10, medium×15, hard×10, trap×5
// 分數：easy=10, medium=15, hard=25, trap=19 → 總計 670
const questions = [
  // ── EASY (10 題, 每題 10 分) ──────────────────────────────────
  {
    id:1, difficulty:"easy", points:10,
    zh:{
      question:"以下哪個方程式為一階常微分方程（ODE）？",
      options:["dy/dx + 3y = x²","∂²u/∂x² + ∂²u/∂y² = 0","d²y/dx² − 5y = sin x","y''' + y' = e^x"],
      explanation:"一階ODE只含一階導數。dy/dx + 3y = x² 最高階為一階。"
    },
    en:{
      question:"Which of the following is a first-order ordinary differential equation (ODE)?",
      options:["dy/dx + 3y = x²","∂²u/∂x² + ∂²u/∂y² = 0","d²y/dx² − 5y = sin x","y''' + y' = eˣ"],
      explanation:"A first-order ODE contains only a first-order derivative. dy/dx + 3y = x² has highest order one."
    },
    answer:0  // A
  },
  {
    id:2, difficulty:"easy", points:10,
    zh:{
      question:"微分方程 dy/dx = ky（k 為常數）的通解為何？",
      options:["y = kx + C","y = Ce^(kx)","y = C·sin(kx)","y = Ce^(−kx)"],
      explanation:"分離變數後積分得 y = Ce^(kx)，k > 0 為指數成長，k < 0 為衰退。"
    },
    en:{
      question:"What is the general solution of dy/dx = ky (k is a constant)?",
      options:["y = kx + C","y = Ce^(kx)","y = C·sin(kx)","y = Ce^(−kx)"],
      explanation:"Separating variables and integrating gives y = Ce^(kx). This models exponential growth or decay."
    },
    answer:1  // B
  },
  {
    id:3, difficulty:"easy", points:10,
    zh:{
      question:"方程式 y'' + 4y = 0 的特徵方程式（characteristic equation）為何？",
      options:["r² + 4 = 0","r² + 4r = 0","r + 4 = 0","r² − 4 = 0"],
      explanation:"將 y = e^(rx) 代入得 r²e^(rx) + 4e^(rx) = 0，除去 e^(rx) 得特徵方程式 r² + 4 = 0。"
    },
    en:{
      question:"What is the characteristic equation of y'' + 4y = 0?",
      options:["r² + 4 = 0","r² + 4r = 0","r + 4 = 0","r² − 4 = 0"],
      explanation:"Substituting y = e^(rx) and dividing by e^(rx) gives the characteristic equation r² + 4 = 0."
    },
    answer:0  // A
  },
  {
    id:4, difficulty:"easy", points:10,
    zh:{
      question:"以下哪個敘述正確描述了「線性微分方程」的定義？",
      options:["方程中的係數必須全為常數","方程中所有導數項及未知函數均以一次冪出現且不相乘","方程的解必須能用初等函數表示","方程只能有一個因變數與一個自變數"],
      explanation:"線性ODE要求未知函數及其各階導數均為一次冪且不相乘，係數可以是自變數的函數。"
    },
    en:{
      question:"Which statement correctly defines a 'linear differential equation'?",
      options:["The coefficients must all be constants","All derivative terms and the unknown function appear to the first power and are not multiplied together","The solution must be expressible in elementary functions","The equation can only have one dependent and one independent variable"],
      explanation:"A linear ODE requires the unknown and its derivatives to appear to the first power without being multiplied together; coefficients may be functions of the independent variable."
    },
    answer:1  // B
  },
  {
    id:5, difficulty:"easy", points:10,
    zh:{
      question:"微分方程 dy/dx = (x + 1)/(y + 2) 最適合用哪種方法求解？",
      options:["可分離變數法，將 (y+2)dy = (x+1)dx 後積分","齊次代換法，令 v = y/x","積分因子法，求積分因子後乘以整式","恰當方程法，直接求位函數 F(x,y)"],
      explanation:"dy/dx = (x+1)/(y+2) 可改寫為 (y+2)dy = (x+1)dx，屬可分離變數，直接積分即可。"
    },
    en:{
      question:"dy/dx = (x + 1)/(y + 2): which method is best suited to solve it?",
      options:["Separation of variables: write (y+2)dy = (x+1)dx and integrate","Homogeneous substitution, let v = y/x","Integrating factor method, find an integrating factor","Exact equation method, find potential function F(x,y) directly"],
      explanation:"Rewriting as (y+2)dy = (x+1)dx shows it is separable — integrate each side directly."
    },
    answer:0  // A
  },
  {
    id:6, difficulty:"easy", points:10,
    zh:{
      question:"初始值問題（IVP）中，初始條件的主要作用是？",
      options:["決定微分方程的型態（線性或非線性）","從通解中確定任意常數的值","使方程從偏微分方程轉為常微分方程","消除方程中的奇異解"],
      explanation:"通解含任意常數，初始條件提供特定點的函數值，從而唯一確定這些常數。"
    },
    en:{
      question:"In an initial value problem (IVP), what is the primary role of the initial condition?",
      options:["Determine whether the ODE is linear or nonlinear","Determine the values of arbitrary constants in the general solution","Convert a PDE into an ODE","Eliminate singular solutions from the equation"],
      explanation:"The general solution contains arbitrary constants; initial conditions specify values at a particular point to uniquely determine those constants."
    },
    answer:1  // B
  },
  {
    id:7, difficulty:"easy", points:10,
    zh:{
      question:"Laplace 轉換 L{1} = ？（s > 0）",
      options:["1/s","1","1/s²","s"],
      explanation:"L{1} = ∫₀^∞ e^(−st)·1 dt = [−e^(−st)/s]₀^∞ = 1/s，s > 0。"
    },
    en:{
      question:"What is the Laplace transform L{1} for s > 0?",
      options:["1/s","1","1/s²","s"],
      explanation:"L{1} = ∫₀^∞ e^(−st) dt = 1/s for s > 0."
    },
    answer:0  // A
  },
  {
    id:8, difficulty:"easy", points:10,
    zh:{
      question:"方程式 y'' − y' − 6y = 0 的特徵根為？",
      options:["r = −3, r = 2","r = 3, r = −2","r = 3, r = 2","r = −3, r = −2"],
      explanation:"特徵方程 r² − r − 6 = (r−3)(r+2) = 0，故根為 r = 3 與 r = −2。"
    },
    en:{
      question:"What are the characteristic roots of y'' − y' − 6y = 0?",
      options:["r = −3, r = 2","r = 3, r = −2","r = 3, r = 2","r = −3, r = −2"],
      explanation:"Characteristic equation: r² − r − 6 = (r−3)(r+2) = 0, giving r = 3 and r = −2."
    },
    answer:1  // B
  },
  {
    id:9, difficulty:"easy", points:10,
    zh:{
      question:"微分方程 dy/dx = x，初始條件 y(0) = 3，其特解為？",
      options:["y = x²/2 + 3","y = x² + 3","y = x²/2","y = x²/2 − 3"],
      explanation:"積分得通解 y = x²/2 + C，代入 y(0) = 3 得 C = 3，故特解為 y = x²/2 + 3。"
    },
    en:{
      question:"What is the particular solution of dy/dx = x with initial condition y(0) = 3?",
      options:["y = x²/2 + 3","y = x² + 3","y = x²/2","y = x²/2 − 3"],
      explanation:"Integrating gives y = x²/2 + C; applying y(0) = 3 gives C = 3, so y = x²/2 + 3."
    },
    answer:0  // A
  },
  {
    id:10, difficulty:"easy", points:10,
    zh:{
      question:"「齊次線性微分方程」（homogeneous linear ODE）的特徵是？",
      options:["所有係數均相同","方程可用代換 y = vx 化簡","方程右側（非齊次項）等於零","特徵根全為實數"],
      explanation:"齊次線性ODE是指 Ly = 0 形式，即方程右端的強迫函數為零。"
    },
    en:{
      question:"What characterizes a 'homogeneous linear ODE'?",
      options:["All coefficients are equal","The equation can be simplified by substitution y = vx","The right-hand side (forcing term) is zero","All characteristic roots are real"],
      explanation:"A homogeneous linear ODE has the form Ly = 0, meaning the forcing function on the right-hand side is zero."
    },
    answer:2  // C
  },

  // ── MEDIUM (15 題, 每題 15 分) ────────────────────────────────
  {
    id:11, difficulty:"medium", points:15,
    zh:{
      question:"求 y' + (2/x)y = x³（x > 0）的通解。積分因子為何？通解為何？",
      options:["積分因子 x，通解 y = x⁴/6 + C/x","積分因子 x²，通解 y = x³/5 + C/x²","積分因子 e^x，通解含 e^x 項","積分因子 1/x²，通解 y = x³/5 + Cx²"],
      explanation:"積分因子 μ = e^∫(2/x)dx = x²；兩側乘以 x² 積分得 x²y = x⁵/5 + C，故 y = x³/5 + C/x²。"
    },
    en:{
      question:"Find the general solution of y' + (2/x)y = x³ (x > 0). What is the integrating factor and the general solution?",
      options:["Integrating factor x, general solution y = x⁴/6 + C/x","Integrating factor x², general solution y = x³/5 + C/x²","Integrating factor e^x, solution involves e^x","Integrating factor 1/x², general solution y = x³/5 + Cx²"],
      explanation:"Integrating factor μ = e^∫(2/x)dx = x². Multiplying and integrating gives x²y = x⁵/5 + C, so y = x³/5 + C/x²."
    },
    answer:1  // B
  },
  {
    id:12, difficulty:"medium", points:15,
    zh:{
      question:"方程 y'' + 2y' + 5y = 0 的通解包含哪種函數形式？",
      options:["純指數函數：C₁e^(r₁x) + C₂e^(r₂x)","多項式乘指數：(C₁ + C₂x)e^(−x)","指數乘三角：e^(−x)(C₁cos2x + C₂sin2x)","雙曲函數：C₁cosh(2x) + C₂sinh(2x)"],
      explanation:"特徵方程 r² + 2r + 5 = 0，根 r = −1 ± 2i（複數根），通解為 e^(−x)(C₁cos2x + C₂sin2x)。"
    },
    en:{
      question:"The general solution of y'' + 2y' + 5y = 0 contains which type of functions?",
      options:["Pure exponentials: C₁e^(r₁x) + C₂e^(r₂x)","Polynomial times exponential: (C₁ + C₂x)e^(−x)","Exponential times trig: e^(−x)(C₁cos2x + C₂sin2x)","Hyperbolic functions: C₁cosh(2x) + C₂sinh(2x)"],
      explanation:"Characteristic equation r² + 2r + 5 = 0 gives r = −1 ± 2i (complex roots), so the solution is e^(−x)(C₁cos2x + C₂sin2x)."
    },
    answer:2  // C
  },
  {
    id:13, difficulty:"medium", points:15,
    zh:{
      question:"方程 y'' − 4y' + 4y = 0 的通解為何？（注意特徵根的重數）",
      options:["y = C₁e^(2x) + C₂e^(−2x)","y = C₁cos(2x) + C₂sin(2x)","y = (C₁ + C₂x)e^(2x)","y = C₁e^(4x) + C₂xe^(4x)"],
      explanation:"特徵方程 r² − 4r + 4 = (r−2)² = 0，重根 r = 2，通解為 (C₁ + C₂x)e^(2x)。"
    },
    en:{
      question:"What is the general solution of y'' − 4y' + 4y = 0? (Note the multiplicity of the characteristic root.)",
      options:["y = C₁e^(2x) + C₂e^(−2x)","y = C₁cos(2x) + C₂sin(2x)","y = (C₁ + C₂x)e^(2x)","y = C₁e^(4x) + C₂xe^(4x)"],
      explanation:"Characteristic equation (r−2)² = 0 gives repeated root r = 2, so the general solution is (C₁ + C₂x)e^(2x)."
    },
    answer:2  // C
  },
  {
    id:14, difficulty:"medium", points:15,
    zh:{
      question:"用未定係數法求 y'' + y = cos x 的特解時，應假設的特解形式為？",
      options:["yₚ = A cos x + B sin x","yₚ = x(A cos x + B sin x)","yₚ = Ax cos x + B","yₚ = A + Bx cos x + Cx sin x"],
      explanation:"cos x 對應特徵根 ±i，已是齊次解，需乘以 x 修正：yₚ = x(A cos x + B sin x)。"
    },
    en:{

// ── 答案分布驗證（內部）: A=10, B=10, C=10, D=10 ────────────────
// A(0): 1,3,5,7,9,18,21,23,34,37
// B(1): 2,4,6,8,11,14,16,25,29,38
// C(2): 10,12,13,15,19,22,24,26,33,36
// D(3): 17,20,27,28,30,31,32,35,39,40

// ── Shuffle ────────────────────────────────────────────────────────
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── State ──────────────────────────────────────────────────────────
let shuffledQuestions = shuffleArray(questions);
let currentIdx = 0;
let userAnswers = new Array(40).fill(-1);
let resultShown = false;
let transitioning = false;

// ── UI ─────────────────────────────────────────────────────────────
function updateStaticUI() {
  const z = lang === 'zh';
  document.getElementById('headerTitle').textContent = z ? '微分方程 測驗' : 'Differential Equations Quiz';
  document.getElementById('prevLabel').textContent = z ? '上一題' : 'Previous';
  document.getElementById('submitLabel').textContent = z ? '提交測驗' : 'Submit Quiz';
  document.getElementById('restartLabel').textContent = z ? '重新測驗' : 'Restart Quiz';
  document.getElementById('copyLabel').textContent = z ? '複製結果' : 'Copy Result';
  document.getElementById('reviewTitle').textContent = z ? '錯題回顧' : 'Wrong Answer Review';
  document.getElementById('statCorrectLbl').textContent = z ? '答對題數' : 'Correct';
  document.getElementById('statWrongLbl').textContent = z ? '答錯題數' : 'Wrong';
  document.getElementById('dh1').textContent = z ? '難度' : 'Difficulty';
  document.getElementById('dh2').textContent = z ? '答對' : 'Correct';
  document.getElementById('dh3').textContent = z ? '總題數' : 'Total';
  document.getElementById('dh4').textContent = z ? '得分' : 'Score';
  document.getElementById('progressText').textContent = z
    ? `第 ${currentIdx + 1} / 40 題` : `Q ${currentIdx + 1} / 40`;
}

function renderQuestion() {
  const q = shuffledQuestions[currentIdx];
  const data = q[lang];
  const z = lang === 'zh';
  document.getElementById('questionNum').textContent =
    z ? `第 ${currentIdx + 1} 題 / 共 40 題` : `Question ${currentIdx + 1} of 40`;
  document.getElementById('questionText').textContent = data.question;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  ['A','B','C','D'].forEach((lbl, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (userAnswers[currentIdx] === i ? ' selected' : '');
    div.innerHTML = `<span class="option-label">${lbl}</span><span class="option-text">${data.options[i]}</span>`;
    div.addEventListener('click', () => selectOption(i));
    container.appendChild(div);
  });

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.style.display = (currentIdx === 39 && userAnswers[39] !== -1) ? 'inline-block' : 'none';
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  updateProgress();
  updateStaticUI();
}

function selectOption(idx) {
  if (transitioning) return;
  userAnswers[currentIdx] = idx;
  document.querySelectorAll('.option').forEach((el, i) => el.classList.toggle('selected', i === idx));

  if (currentIdx === 39) {
    document.getElementById('submitBtn').style.display = 'inline-block';
    updateProgress();
    return;
  }
  transitioning = true;
  setTimeout(() => {
    const card = document.getElementById('questionCard');
    card.classList.add('fade');
    setTimeout(() => {
      currentIdx++;
      renderQuestion();
      card.classList.remove('fade');
      transitioning = false;
    }, 200);
  }, 400);
}

function prevQuestion() {
  if (currentIdx === 0 || transitioning) return;
  transitioning = true;
  const card = document.getElementById('questionCard');
  card.classList.add('fade');
  setTimeout(() => {
    currentIdx--;
    renderQuestion();
    card.classList.remove('fade');
    transitioning = false;
  }, 200);
}

function updateProgress() {
  const answered = userAnswers.filter(a => a !== -1).length;
  document.getElementById('progressFill').style.width = (answered / 40 * 100) + '%';
  const z = lang === 'zh';
  document.getElementById('progressText').textContent = z
    ? `第 ${currentIdx + 1} / 40 題` : `Q ${currentIdx + 1} / 40`;
}

// ── Result ─────────────────────────────────────────────────────────
function normalCDF(z) {
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d = 0.3989423 * Math.exp(-z * z / 2);
  const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.7814779 + t * (-1.8212560 + t * 1.3302744))));
  return z >= 0 ? 1 - p : p;
}

function submitQuiz() {
  resultShown = true;
  document.getElementById('quizPage').classList.add('hide');
  document.getElementById('resultPage').classList.add('show');
  renderResult();
}

function renderResult() {
  const z = lang === 'zh';
  let totalScore = 0, correct = 0;
  const ds = { easy:{c:0,t:10,pts:0}, medium:{c:0,t:15,pts:0}, hard:{c:0,t:10,pts:0}, trap:{c:0,t:5,pts:0} };

  shuffledQuestions.forEach((q, i) => {
    const ok = userAnswers[i] === q.answer;
    if (ok) { totalScore += q.points; correct++; ds[q.difficulty].c++; }
    if (ok) ds[q.difficulty].pts += q.points;
  });

  document.getElementById('scoreBig').textContent = totalScore;
  document.getElementById('scoreLabel').textContent = z ? '/ 670 分' : '/ 670 points';
  document.getElementById('statCorrect').textContent = correct + '/40';
  document.getElementById('statWrong').textContent = (40 - correct) + '/40';

  let grade;
  if (totalScore >= 600) grade = z ? '🏆 頂尖專家（Top Expert）' : '🏆 Top Expert';
  else if (totalScore >= 500) grade = z ? '⭐ 進階掌握（Advanced）' : '⭐ Advanced';
  else if (totalScore >= 380) grade = z ? '📘 中等水準（Intermediate）' : '📘 Intermediate';
  else if (totalScore >= 250) grade = z ? '📗 基礎尚可（Basic）' : '📗 Basic';
  else grade = z ? '📕 需要加強（Needs Improvement）' : '📕 Needs Improvement';
  document.getElementById('scoreGrade').textContent = grade;

  const pct = Math.round(normalCDF((totalScore - 301.5) / 100.5) * 100);
  document.getElementById('scorePercentile').textContent = z
    ? `你的成績超越了約 ${pct}% 的測試者`
    : `Your score surpasses approximately ${pct}% of test takers`;

  const dn = z
    ? { easy:'簡單 Easy', medium:'中等 Med', hard:'困難 Hard', trap:'陷阱 Trap' }
    : { easy:'Easy', medium:'Medium', hard:'Hard', trap:'Trap' };
  const maxPts = { easy:100, medium:225, hard:250, trap:95 };
  const tbody = document.getElementById('diffBody');
  tbody.innerHTML = '';
  ['easy','medium','hard','trap'].forEach(d => {
    const s = ds[d];
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${dn[d]}</td><td>${s.c}/${s.t}</td><td>${s.t}</td><td>${s.pts}/${maxPts[d]}</td>`;
    tbody.appendChild(tr);
  });

  const container = document.getElementById('reviewContainer');
  container.innerHTML = '';
  const labels = ['A','B','C','D'];
  let hasWrong = false;
  shuffledQuestions.forEach((q, i) => {
    if (userAnswers[i] !== q.answer) {
      hasWrong = true;
      const data = q[lang];
      const ua = userAnswers[i];
      const div = document.createElement('div');
      div.className = 'review-item';
      div.innerHTML = `
        <div class="review-q">${i+1}. ${data.question}</div>
        ${ua !== -1
          ? `<div class="review-opt wrong">✗ ${z?'你的答案':'Your answer'}: ${labels[ua]}. ${data.options[ua]}</div>`
          : `<div class="review-opt wrong">${z?'（未作答）':'(Not answered)'}</div>`}
        <div class="review-opt correct">✓ ${z?'正確答案':'Correct answer'}: ${labels[q.answer]}. ${data.options[q.answer]}</div>
        <div class="review-exp">${data.explanation}</div>
      `;
      container.appendChild(div);
    }
  });
  if (!hasWrong) {
    container.innerHTML = `<div style="color:var(--correct);font-size:15px;font-weight:600;">${z?'🎉 全部答對！':'🎉 All correct!'}</div>`;
  }
  document.getElementById('reviewTitle').textContent = z ? '錯題回顧' : 'Wrong Answer Review';
  updateStaticUI();
}

function restartQuiz() {
  shuffledQuestions = shuffleArray(questions);
  currentIdx = 0;
  userAnswers = new Array(40).fill(-1);
  resultShown = false;
  transitioning = false;
  document.getElementById('quizPage').classList.remove('hide');
  document.getElementById('resultPage').classList.remove('show');
  document.getElementById('progressFill').style.width = '0%';
  renderQuestion();
}

function copyResult() {
  const z = lang === 'zh';
  let total = 0, correct = 0;
  shuffledQuestions.forEach((q, i) => { if (userAnswers[i] === q.answer) { total += q.points; correct++; } });
  const pct = Math.round(normalCDF((total - 301.5) / 100.5) * 100);
  const text = z
    ? `【微分方程測驗成績】\n得分：${total}/670\n答對：${correct}/40 題\n超越約 ${pct}% 的測試者`
    : `[Differential Equations Quiz]\nScore: ${total}/670\nCorrect: ${correct}/40\nSurpasses ~${pct}% of test takers`;
  navigator.clipboard.writeText(text).then(() => {
    const lbl = document.getElementById('copyLabel');
    lbl.textContent = z ? '已複製！' : 'Copied!';
    setTimeout(() => { lbl.textContent = z ? '複製結果' : 'Copy Result'; }, 2000);
  });
}

// ── Init ───────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (theme === 'dark') document.getElementById('themeBtn').textContent = '☀️ 淺色';
  renderQuestion();
});
</script>
