<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資料結構與演算法 測驗</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --muted: #6B7280;
    --border: #E5E7EB;
    --accent: #2563EB;
    --accent-text: #FFFFFF;
    --track: #E5E7EB;
    --correct: #16A34A;
    --wrong: #DC2626;
    --surface: #FFFFFF;
  }
  [data-theme="dark"] {
    --bg: #111111;
    --text: #E5E7EB;
    --muted: #9CA3AF;
    --border: #374151;
    --accent: #60A5FA;
    --accent-text: #111111;
    --track: #374151;
    --correct: #4ADE80;
    --wrong: #F87171;
    --surface: #111111;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 20px 120px; }

  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .bar {
    max-width: 760px; margin: 0 auto; padding: 14px 20px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .title { font-size: 17px; font-weight: 700; margin: 0; flex: 1 1 auto; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .btn {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 12px;
    font-size: 13px; cursor: pointer; font-family: inherit;
    transition: background-color 0.15s ease, color 0.15s ease;
  }
  .btn:hover { background: var(--border); }
  .progress-text { font-size: 13px; color: var(--muted); flex-basis: 100%; }

  .card { padding-top: 28px; }
  .qbox { opacity: 1; transition: opacity 0.25s ease; }
  .qbox.fade { opacity: 0; }
  .question { font-size: 19px; font-weight: 600; margin: 0 0 22px; }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
    font-size: 15px; cursor: pointer; text-align: left;
    font-family: inherit; line-height: 1.5;
    transition: background-color 0.15s ease, border-color 0.15s ease;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .option:hover { background: var(--track); }
  .option .label { font-weight: 700; color: var(--muted); flex: 0 0 auto; }
  .option.selected {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--accent-text);
  }
  .option.selected .label { color: var(--accent-text); }

  .nav { margin-top: 26px; display: flex; gap: 12px; }
  .nav .btn { padding: 10px 18px; font-size: 14px; }
  .btn-primary {
    background: var(--accent); color: var(--accent-text);
    border-color: var(--accent); font-weight: 600;
  }
  .btn-primary:hover { background: var(--accent); opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .pbar-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 6px; background: var(--track);
  }
  .pbar { height: 100%; width: 0%; background: var(--accent); transition: width 0.25s ease; }

  /* Results */
  .results h2 { font-size: 24px; margin: 24px 0 4px; }
  .score-big { font-size: 44px; font-weight: 800; margin: 6px 0; }
  .grade { font-size: 22px; font-weight: 700; margin: 10px 0; }
  .pct { font-size: 16px; color: var(--muted); margin: 4px 0 24px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 26px; }
  .stat {
    border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px;
  }
  .stat .k { font-size: 13px; color: var(--muted); }
  .stat .v { font-size: 20px; font-weight: 700; }
  .section-title { font-size: 18px; font-weight: 700; margin: 28px 0 14px; }
  .review-item { border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
  .review-q { font-weight: 600; margin: 0 0 10px; }
  .review-line { font-size: 14px; margin: 4px 0; }
  .your { color: var(--wrong); }
  .correct-ans { color: var(--correct); }
  .explain { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .hidden { display: none; }
  @media (max-width: 480px) {
    .stat-grid { grid-template-columns: 1fr; }
    .question { font-size: 17px; }
  }
</style>
</head>
<body>
<header>
  <div class="bar">
    <h1 class="title" id="appTitle">資料結構與演算法 測驗</h1>
    <div class="controls">
      <button class="btn" id="langBtn">English</button>
      <button class="btn" id="themeBtn">🌙</button>
    </div>
    <div class="progress-text" id="progressText">第 1 / 40 題</div>
  </div>
</header>

<div class="wrap">
  <div class="card" id="quizCard">
    <div class="qbox" id="qbox">
      <p class="question" id="questionText"></p>
      <div class="options" id="optionsBox"></div>
    </div>
    <div class="nav">
      <button class="btn" id="prevBtn">上一題</button>
      <button class="btn btn-primary hidden" id="submitBtn">提交測驗</button>
    </div>
  </div>

  <div class="results hidden" id="resultsCard"></div>
</div>

<div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>

<script>
const questions = [
  { id:1, difficulty:"easy", points:10, answer:0,
    zh:{question:"在陣列中以索引存取單一元素的時間複雜度為何？", options:["O(1)","O(n)","O(log n)","O(n²)"], explanation:"陣列以基底位址加偏移量直接定位，故為常數時間。"},
    en:{question:"What is the time complexity of accessing a single array element by index?", options:["O(1)","O(n)","O(log n)","O(n²)"], explanation:"Arrays use base address plus offset, giving constant time."} },

  { id:2, difficulty:"medium", points:15, answer:1,
    zh:{question:"評估後綴（postfix）運算式時，最適合使用哪種資料結構？", options:["佇列（queue）","堆疊（stack）","雜湊表（hash table）","堆積（heap）"], explanation:"後綴運算式以堆疊暫存運算元，遇運算子時彈出計算。"},
    en:{question:"Which data structure best evaluates a postfix expression?", options:["A queue","A stack","A hash table","A heap"], explanation:"A stack holds operands and pops them when an operator appears."} },

  { id:3, difficulty:"hard", points:25, answer:2,
    zh:{question:"對 n 個元素建立二元堆積（build-heap）的最壞時間複雜度為何？", options:["O(n log n)","O(log n)","O(n)","O(n²)"], explanation:"由下而上建堆的緊密分析為線性時間。"},
    en:{question:"What is the worst-case time to build a binary heap from n elements?", options:["O(n log n)","O(log n)","O(n)","O(n²)"], explanation:"The tight bottom-up analysis yields linear time."} },

  { id:4, difficulty:"easy", points:10, answer:3,
    zh:{question:"相較於陣列，鏈結串列（linked list）的主要優點是什麼？", options:["可在常數時間隨機存取元素","整體記憶體使用較為緊湊","對快取的局部性表現較佳","插入刪除時無需搬移其他元素"], explanation:"鏈結串列只需調整指標即可插入或刪除節點。"},
    en:{question:"What is the main advantage of a linked list over an array?", options:["Constant-time random element access","More compact overall memory usage","Better locality for the CPU cache","Inserts and deletes shift nothing"], explanation:"Only pointers are adjusted to insert or delete a node."} },

  { id:5, difficulty:"trap", points:19, answer:1,
    zh:{question:"關於大 O 記號，下列敘述何者正確？", options:["它描述演算法的平均情況執行時間","它描述執行時間成長率的上界","它代表演算法實際的執行秒數","它只適用於遞迴演算法的分析"], explanation:"大 O 描述成長率上界，與實際秒數及平均情況無關。"},
    en:{question:"Which statement about Big-O notation is correct?", options:["It describes the average-case running time","It describes an upper bound on growth rate","It represents the actual seconds of runtime","It applies only to recursive algorithms"], explanation:"Big-O bounds growth rate, not actual seconds or average case."} },

    en:{question:"Which is a technique for resolving hash table collisions?", options:["Separate chaining","Binary searching","Path compression","Result memoization"], explanation:"Separate chaining stores colliding keys in a per-bucket list."} },

  { id:7, difficulty:"hard", points:25, answer:3,
    zh:{question:"Dijkstra 最短路徑演算法在何種情況下可能失效？", options:["圖中含有大量節點時","圖為無向且連通時","邊權重皆為正整數時","圖中存在負權重邊時"], explanation:"負權邊會破壞貪婪選擇的正確性，需改用 Bellman-Ford。"},
    en:{question:"In which case can Dijkstra's shortest-path algorithm fail?", options:["When the graph has many nodes","When the graph is undirected","When all edge weights are positive","When negative-weight edges exist"], explanation:"Negative edges break the greedy choice; use Bellman-Ford instead."} },

  { id:8, difficulty:"medium", points:15, answer:2,
    zh:{question:"在陣列上執行二分搜尋（binary search）的前提條件為何？", options:["陣列元素必須皆為整數","陣列長度須為 2 的次方","陣列元素必須已排序","陣列不可含有重複元素"], explanation:"二分搜尋依賴有序性才能每次排除一半範圍。"},
    en:{question:"What is the precondition for binary search on an array?", options:["All elements must be integers","The length must be a power of two","The elements must be sorted","No duplicate values are allowed"], explanation:"Binary search relies on order to discard half each step."} },

  { id:9, difficulty:"easy", points:10, answer:1,
    zh:{question:"佇列（queue）遵循何種存取原則？", options:["後進先出（LIFO）","先進先出（FIFO）","隨機順序存取","依優先權存取"], explanation:"佇列由尾端加入、前端移除，先進者先出。"},
    en:{question:"Which access principle does a queue follow?", options:["Last-in, first-out (LIFO)","First-in, first-out (FIFO)","Random-order access","Priority-based access"], explanation:"A queue inserts at the rear and removes from the front."} },

  { id:10, difficulty:"medium", points:15, answer:0,
    zh:{question:"合併排序（merge sort）在最壞情況下的時間複雜度為何？", options:["O(n log n)","O(n²)","O(n)","O(log n)"], explanation:"每層合併為 O(n)，共有 log n 層。"},
    en:{question:"What is the worst-case time complexity of merge sort?", options:["O(n log n)","O(n²)","O(n)","O(log n)"], explanation:"Each merge level costs O(n) across log n levels."} },

  { id:11, difficulty:"hard", points:25, answer:2,
    zh:{question:"未平衡的二元搜尋樹在最壞情況下搜尋的時間複雜度為何？", options:["O(log n)","O(1)","O(n)","O(n log n)"], explanation:"退化成鏈狀時樹高為 n，搜尋需線性時間。"},
    en:{question:"What is the worst-case search time in an unbalanced binary search tree?", options:["O(log n)","O(1)","O(n)","O(n log n)"], explanation:"When degenerate into a chain, height is n, so search is linear."} },

  { id:12, difficulty:"easy", points:10, answer:3,

    en:{question:"What is the operation that adds an element to the top of a stack called?", options:["dequeue","peek","poll","push"], explanation:"push adds and pop removes from the top of a stack."} },

  { id:13, difficulty:"trap", points:19, answer:0,
    zh:{question:"關於遞迴與迴圈，下列敘述何者正確？", options:["任何遞迴都可改寫為等價迴圈","遞迴一定比迴圈執行得更快速","遞迴過程完全不使用額外空間","只有遞迴才能走訪樹狀結構"], explanation:"遞迴可用顯式堆疊轉為迭代，兩者計算能力等價。"},
    en:{question:"Which statement about recursion versus iteration is correct?", options:["Any recursion can be rewritten as a loop","Recursion always runs faster than a loop","Recursion uses no extra memory at all","Only recursion can traverse a tree"], explanation:"Recursion converts to iteration via an explicit stack; equally powerful."} },

  { id:14, difficulty:"medium", points:15, answer:1,

    en:{question:"What is the space complexity of an adjacency matrix for a graph with V vertices?", options:["O(V + E)","O(V²)","O(E²)","O(V log V)"], explanation:"An adjacency matrix needs V×V storage regardless of edges."} },

  { id:15, difficulty:"hard", points:25, answer:3,
    zh:{question:"快速排序（quicksort）在何種情況下會退化為 O(n²)？", options:["當輸入的資料量非常龐大時","當樞紐每次都選到中位數時","當陣列中元素皆相異時","當每次樞紐都選到極值時"], explanation:"樞紐持續為最大或最小值時，分割極度不平均。"},
    en:{question:"When does quicksort degrade to O(n²)?", options:["When the input is very large","When the pivot is always the median","When all elements are distinct","When the pivot is always an extreme"], explanation:"A pivot that is always the max or min makes partitions unbalanced."} },

  { id:16, difficulty:"easy", points:10, answer:2,

    en:{question:"What is the definition of a leaf node in a tree?", options:["The node at the very top of the tree","The node holding the most children","The node having no children at all","The node joining two subtrees"], explanation:"A leaf is a terminal node with no children."} },

  { id:17, difficulty:"medium", points:15, answer:0,

    en:{question:"With an ideal hash function, what is the average lookup time in a hash table?", options:["O(1)","O(n)","O(log n)","O(n log n)"], explanation:"With even distribution, average lookup is constant time."} },

  { id:18, difficulty:"hard", points:25, answer:1,
    zh:{question:"深度優先搜尋（DFS）若以非遞迴方式實作，通常使用何種結構？", options:["優先佇列（priority queue）","堆疊（stack）","雜湊表（hash table）","佇列（queue）"], explanation:"DFS 以堆疊維護待走訪節點，與 BFS 用佇列相對。"},
    en:{question:"When implemented iteratively, which structure does DFS typically use?", options:["A priority queue","A stack","A hash table","A queue"], explanation:"DFS keeps pending nodes on a stack, unlike BFS which uses a queue."} },

  { id:19, difficulty:"medium", points:15, answer:3,

    en:{question:"What does it mean for a sorting algorithm to be stable?", options:["It never causes a memory overflow","Its time cost is input-independent","Its output is always ascending","Equal keys keep their relative order"], explanation:"A stable sort preserves the original order of equal-key elements."} },

  { id:20, difficulty:"easy", points:10, answer:2,

    en:{question:"At most how many children can a node have in a binary tree?", options:["At most one","At most three","At most two","No upper limit"], explanation:"Each node in a binary tree has at most two children (left, right)."} },

  { id:21, difficulty:"trap", points:19, answer:1,

    en:{question:"Regarding appending to the end of a dynamic array, which is correct?", options:["Every append reallocates the memory","Its amortized cost is O(1) per append","Each append always costs O(n) time","It rejects new items once capacity fills"], explanation:"Doubling capacity makes the amortized append cost constant."} },

  { id:23, difficulty:"hard", points:25, answer:2,

  { id:24, difficulty:"easy", points:10, answer:3,

    en:{question:"Which scenario is best modeled by a queue?", options:["The return order of function calls","A web browser's back-button history","Matching parentheses in expressions","A printer's job scheduling order"], explanation:"Print jobs are served first-come first-served, i.e. FIFO."} },

  { id:25, difficulty:"medium", points:15, answer:1,

    en:{question:"What is the main purpose of a hash function?", options:["To sort data by their size","To compress data to save space","To map a key to a storage slot","To encrypt data for privacy"], explanation:"A hash function turns a key into an array index for fast lookup."} },

  { id:28, difficulty:"medium", points:15, answer:3,

let lang = "zh";
let current = 0;
const answers = new Array(questions.length).fill(null);
const LETTERS = ["A","B","C","D"];

const el = id => document.getElementById(id);

// theme
function initTheme(){
  const saved = matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  setTheme(saved);
}
function setTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  el("themeBtn").textContent = t === "dark" ? "☀️" : "🌙";
}
el("themeBtn").onclick = ()=>{
  const cur = document.documentElement.getAttribute("data-theme");
  setTheme(cur === "dark" ? "light" : "dark");
};

el("langBtn").onclick = ()=>{
  lang = lang === "zh" ? "en" : "zh";
  document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
  applyLang();
  if (el("resultsCard").classList.contains("hidden")) renderQuestion(false);
  else renderResults();
};

function applyLang(){
  const t = i18n[lang];
  el("appTitle").textContent = t.title;
  document.title = t.title;
  el("langBtn").textContent = t.langBtn;
  el("prevBtn").textContent = t.prev;
  el("submitBtn").textContent = t.submit;
}

function renderQuestion(fade=true){
  const t = i18n[lang];
  const q = questions[current];
  const data = q[lang];
  const draw = ()=>{
    el("questionText").textContent = data.question;
    const box = el("optionsBox");
    box.innerHTML = "";
    data.options.forEach((opt, idx)=>{
      const b = document.createElement("button");
      b.className = "option" + (answers[current] === idx ? " selected" : "");
      b.innerHTML = `<span class="label">${LETTERS[idx]}</span><span>${opt}</span>`;
      b.onclick = ()=> selectOption(idx);
      box.appendChild(b);
    });
    el("progressText").textContent = t.progress(current+1, questions.length);
    el("prevBtn").disabled = current === 0;
    const isLast = current === questions.length - 1;
    el("submitBtn").classList.toggle("hidden", !(isLast && answers[current] !== null));
    el("pbar").style.width = ((current) / (questions.length-1) * 100) + "%";
    el("qbox").classList.remove("fade");
  };
  if (fade){
    el("qbox").classList.add("fade");
    setTimeout(draw, 200);
  } else draw();
}

function selectOption(idx){
  answers[current] = idx;
  // show selection
  const opts = el("optionsBox").children;
  for (let i=0;i<opts.length;i++) opts[i].classList.toggle("selected", i===idx);
  const isLast = current === questions.length - 1;
  if (isLast){
    el("submitBtn").classList.remove("hidden");
    return;
  }
  setTimeout(()=>{ current++; renderQuestion(true); }, 400);
}

el("prevBtn").onclick = ()=>{ if(current>0){ current--; renderQuestion(true);} };
el("submitBtn").onclick = ()=> showResults();

// normal CDF
function normalCDF(x, mean, sd){
  const z = (x - mean) / (sd * Math.SQRT2);
  return 0.5 * (1 + erf(z));
}
function erf(x){
  const t = 1 / (1 + 0.3275911 * Math.abs(x));
  const y = 1 - (((((1.061405429*t - 1.453152027)*t) + 1.421413741)*t - 0.284496736)*t + 0.254829592)*t*Math.exp(-x*x);
  return x >= 0 ? y : -y;
}

function computeResults(){
  let score=0, correct=0;
  const byDiff = {easy:[0,0], medium:[0,0], hard:[0,0], trap:[0,0]};
  const wrong = [];
  questions.forEach((q,i)=>{
    byDiff[q.difficulty][1]++;
    if (answers[i] === q.answer){ score += q.points; correct++; byDiff[q.difficulty][0]++; }
    else wrong.push(i);
  });
  const mean = 670*0.45, sd = 670*0.15;
  const pct = Math.round(normalCDF(score, mean, sd) * 100);
  let grade;
  if (score>=600) grade=0; else if(score>=500) grade=1; else if(score>=380) grade=2; else if(score>=250) grade=3; else grade=4;
  return {score, correct, wrong: questions.length-correct, byDiff, pct, grade, wrongList: wrong};
}

function showResults(){
  el("quizCard").classList.add("hidden");
  el("resultsCard").classList.remove("hidden");
  el("pbar").style.width = "100%";
  renderResults();
}

function renderResults(){
  const t = i18n[lang];
  const r = computeResults();
  const totalQ = questions.length;
  let html = `<h2>${t.resultTitle}</h2>`;
  html += `<div class="score-big">${r.score} / 670</div>`;
  html += `<div class="grade">${t.grades[r.grade]}</div>`;
  html += `<div class="pct">${t.percentile(r.pct)}</div>`;
  html += `<div class="stat-grid">`;
  html += `<div class="stat"><div class="k">${t.correctCount}</div><div class="v">${r.correct} / ${totalQ}</div></div>`;
  html += `<div class="stat"><div class="k">${t.wrongCount}</div><div class="v">${r.wrong} / ${totalQ}</div></div>`;
  html += `</div>`;
  html += `<div class="section-title">${t.byDifficulty}</div>`;
  html += `<div class="stat-grid">`;
  ["easy","medium","hard","trap"].forEach(d=>{
    html += `<div class="stat"><div class="k">${t[d]}</div><div class="v">${r.byDiff[d][0]} / ${r.byDiff[d][1]}</div></div>`;
  });
  html += `</div>`;

  html += `<div class="section-title">${t.reviewTitle}</div>`;
  if (r.wrongList.length === 0){
    html += `<p class="review-line">${t.noWrong}</p>`;
  } else {
    r.wrongList.forEach(i=>{
      const q = questions[i];
      const data = q[lang];
      const ya = answers[i];
      const yourText = ya===null ? "—" : `${LETTERS[ya]}. ${data.options[ya]}`;
      html += `<div class="review-item">`;
      html += `<p class="review-q">${i+1}. ${data.question}</p>`;
      html += `<p class="review-line your">${t.yourAns}: ${yourText}</p>`;
      html += `<p class="review-line correct-ans">${t.correctAns}: ${LETTERS[q.answer]}. ${data.options[q.answer]}</p>`;
      html += `<p class="explain">${data.explanation}</p>`;
      html += `</div>`;
    });
  }

  html += `<div class="nav">`;
  html += `<button class="btn btn-primary" id="retryBtn">${t.retry}</button>`;
  html += `<button class="btn" id="copyBtn">${t.copy}</button>`;
  html += `</div>`;

  el("resultsCard").innerHTML = html;
  el("retryBtn").onclick = ()=>{
    answers.fill(null);
    current = 0;
    el("resultsCard").classList.add("hidden");
    el("quizCard").classList.remove("hidden");
    renderQuestion(false);
  };
  el("copyBtn").onclick = ()=>{
    const txt = t.copyText(r.score, r.correct);
    navigator.clipboard.writeText(txt).then(()=>{
      el("copyBtn").textContent = t.copied;
      setTimeout(()=> el("copyBtn").textContent = t.copy, 1500);
    });
  };
}

initTheme();
applyLang();
renderQuestion(false);
