<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計算機組織與架構 測驗</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --muted: #6B7280;
    --border: #E5E7EB;
    --accent: #2563EB;
    --accent-text: #FFFFFF;
    --option-bg: #FFFFFF;
    --option-hover: #F3F4F6;
    --track: #E5E7EB;
    --correct: #16A34A;
    --wrong: #DC2626;
    --correct-bg: #ECFDF5;
    --wrong-bg: #FEF2F2;
  }
  [data-theme="dark"] {
    --bg: #111111;
    --text: #E5E7EB;
    --muted: #9CA3AF;
    --border: #374151;
    --accent: #60A5FA;
    --accent-text: #111111;
    --option-bg: #1A1A1A;
    --option-hover: #1F2937;
    --track: #374151;
    --correct: #34D399;
    --wrong: #F87171;
    --correct-bg: #1A2E22;
    --wrong-bg: #2E1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", "PingFang TC", "Microsoft JhengHei", Roboto, sans-serif;
    line-height: 1.6;
    transition: background-color .2s, color .2s;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  h1 { font-size: 18px; font-weight: 700; }
  .controls { display: flex; gap: 8px; }
  .btn {
    background: var(--option-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 12px; font-size: 14px; cursor: pointer; font-family: inherit;
    transition: background-color .15s;
  }
  .btn:hover { background: var(--option-hover); }
  .btn-primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
  .btn-primary:hover { opacity: .9; background: var(--accent); }
  .progress-info { color: var(--muted); font-size: 14px; margin: 18px 0 8px; }
  .qcard { flex: 1; }
  .qfade { opacity: 1; transition: opacity .25s; }
  .qfade.hide { opacity: 0; }
  .qnum { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
  .qtext { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--option-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; font-size: 15px; cursor: pointer; text-align: left;
    font-family: inherit; transition: background-color .15s, border-color .15s;
  }
  .option:hover { background: var(--option-hover); }
  .option .label { font-weight: 700; color: var(--muted); flex-shrink: 0; }
  .option.selected { border-color: var(--accent); background: var(--option-hover); }
  .option.selected .label { color: var(--accent); }
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 12px; }
  .barwrap { margin-top: 20px; }
  .bar-track { background: var(--track); height: 6px; border-radius: 99px; overflow: hidden; }
  .bar-fill { background: var(--accent); height: 100%; width: 0; transition: width .25s; }
  /* results */
  .results h2 { font-size: 22px; margin-bottom: 4px; }
  .score-big { font-size: 40px; font-weight: 800; color: var(--accent); margin: 8px 0; }
  .grade { font-size: 20px; font-weight: 700; margin: 6px 0 18px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
  .stat {
    border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; background: var(--option-bg);
  }
  .stat .k { color: var(--muted); font-size: 13px; }
  .stat .v { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .percentile { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin: 16px 0; background: var(--option-bg); }
  .review-title { font-size: 17px; font-weight: 700; margin: 24px 0 12px; }
  .review-item { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; background: var(--option-bg); }
  .review-q { font-weight: 600; margin-bottom: 10px; }
  .ans-line { font-size: 14px; padding: 4px 0; }
  .ans-wrong { color: var(--wrong); }
  .ans-correct { color: var(--correct); }
  .explain { color: var(--muted); font-size: 13px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .result-actions { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
  .hidden { display: none !important; }
  .copied { color: var(--correct); font-size: 13px; margin-left: 8px; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 16px 0; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title">計算機組織與架構 測驗</h1>
    <div class="controls">
      <button class="btn" id="langBtn">English</button>
      <button class="btn" id="themeBtn">🌙 深色</button>
    </div>
  </header>

  <!-- QUIZ VIEW -->
  <div id="quizView">
    <div class="progress-info" id="progressInfo">第 1 / 40 題</div>
    <div class="qcard">
      <div class="qfade" id="qfade">
        <div class="qnum" id="qnum"></div>
        <div class="qtext" id="qtext"></div>
        <div class="options" id="options"></div>
      </div>
      <div class="nav">
        <button class="btn" id="prevBtn">上一題</button>
        <button class="btn btn-primary hidden" id="submitBtn">提交測驗</button>
      </div>
    </div>
    <div class="barwrap">
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    </div>
  </div>

  <!-- RESULTS VIEW -->
  <div id="resultView" class="results hidden"></div>

  <footer id="footer">© 計算機組織與架構 互動測驗</footer>
</div>

const LETTERS = ["A","B","C","D"];

/* ===================== STATE ===================== */
let lang = "zh";
let current = 0;
const answers = new Array(questions.length).fill(null);

/* ===================== ELEMENTS ===================== */
const el = (id)=>document.getElementById(id);

/* ===================== THEME ===================== */
function initTheme(){
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  setTheme(prefersDark ? "dark" : "light");
}
function setTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  el("themeBtn").textContent = t==="dark" ? UI[lang].themeLight : UI[lang].themeDark;
}
el("themeBtn").addEventListener("click", ()=>{
  const cur = document.documentElement.getAttribute("data-theme");
  setTheme(cur==="dark" ? "light" : "dark");
});

/* ===================== LANGUAGE ===================== */
el("langBtn").addEventListener("click", ()=>{
  lang = lang==="zh" ? "en" : "zh";
  document.documentElement.lang = lang==="zh" ? "zh-Hant" : "en";
  applyStaticText();
  if(!el("resultView").classList.contains("hidden")) renderResults();
  else renderQuestion(false);
});
function applyStaticText(){
  const u = UI[lang];
  el("title").textContent = u.title;
  el("langBtn").textContent = u.langBtn;
  document.title = u.title;
  const t = document.documentElement.getAttribute("data-theme");
  el("themeBtn").textContent = t==="dark" ? u.themeLight : u.themeDark;
  el("prevBtn").textContent = u.prev;
  el("submitBtn").textContent = u.submit;
}

/* ===================== QUIZ RENDER ===================== */
function renderQuestion(animate=true){
  const u = UI[lang];
  const q = questions[current];
  const data = q[lang];
  const fade = el("qfade");

  const paint = ()=>{
    el("progressInfo").textContent = u.progress(current+1, questions.length);
    el("qnum").textContent = u.qnum(current+1);
    el("qtext").textContent = data.question;
    const opts = el("options");
    opts.innerHTML = "";
    data.options.forEach((text, i)=>{
      const b = document.createElement("button");
      b.className = "option" + (answers[current]===i ? " selected" : "");
      b.innerHTML = `<span class="label">${LETTERS[i]}</span><span>${escapeHtml(text)}</span>`;
      b.addEventListener("click", ()=>selectOption(i));
      opts.appendChild(b);
    });
    el("prevBtn").style.visibility = current===0 ? "hidden" : "visible";
    // submit button only on last question
    el("submitBtn").classList.toggle("hidden", current!==questions.length-1);
    el("barFill").style.width = ((current+1)/questions.length*100) + "%";
    fade.classList.remove("hide");
  };

  if(animate){
    fade.classList.add("hide");
    setTimeout(paint, 200);
  } else {
    paint();
  }
}

function selectOption(i){
  answers[current] = i;
  // show selected state on options
  const opts = el("options").children;
  for(let k=0;k<opts.length;k++) opts[k].classList.toggle("selected", k===i);

  const isLast = current===questions.length-1;
  if(isLast){
    // do not auto-advance; reveal submit button (already visible)
    el("submitBtn").classList.remove("hidden");
  } else {
    // brief selected state then auto-advance
    setTimeout(()=>{ current++; renderQuestion(true); }, 400);
  }
}

el("prevBtn").addEventListener("click", ()=>{
  if(current>0){ current--; renderQuestion(true); }
});
el("submitBtn").addEventListener("click", ()=>{
  if(answers[current]===null) return;
  showResults();
});

/* ===================== NORMAL CDF ===================== */
function erf(x){
  const sign = x<0 ? -1 : 1; x = Math.abs(x);
  const a1=0.254829592, a2=-0.284496736, a3=1.421413741, a4=-1.453152027, a5=1.061405429, p=0.3275911;
  const t = 1/(1+p*x);
  const y = 1 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign*y;
}
function normalCdf(x, mean, sd){ return 0.5*(1+erf((x-mean)/(sd*Math.SQRT2))); }

/* ===================== RESULTS ===================== */
function computeScore(){
  let score=0, correctCount=0;
  const perDiff = { easy:{c:0,t:0}, medium:{c:0,t:0}, hard:{c:0,t:0}, trap:{c:0,t:0} };
  questions.forEach((q,idx)=>{
    perDiff[q.difficulty].t++;
    if(answers[idx]===q.answer){ score+=q.points; correctCount++; perDiff[q.difficulty].c++; }
  });
  return { score, correctCount, wrongCount: questions.length-correctCount, perDiff };
}

function showResults(){
  el("quizView").classList.add("hidden");
  el("resultView").classList.remove("hidden");
  renderResults();
  window.scrollTo(0,0);
}

function renderResults(){
  const u = UI[lang];
  const r = computeScore();
  const mean = 670*0.45, sd = 670*0.15;
  let pct = normalCdf(r.score, mean, sd)*100;
  pct = Math.max(1, Math.min(99, Math.round(pct)));
  const grade = GRADES.find(g=>r.score>=g.min);

  const wrongItems = questions.map((q,idx)=>({q,idx})).filter(o=>answers[o.idx]!==o.q.answer);

  let reviewHtml = "";
  if(wrongItems.length===0){
    reviewHtml = `<div class="review-item">${u.allCorrect}</div>`;
  } else {
    reviewHtml = wrongItems.map(({q,idx})=>{
      const d = q[lang];
      const ua = answers[idx];
      const uaText = ua===null ? "—" : `${LETTERS[ua]}. ${escapeHtml(d.options[ua])}`;
      const caText = `${LETTERS[q.answer]}. ${escapeHtml(d.options[q.answer])}`;
      return `<div class="review-item">
        <div class="review-q">${u.qnum(idx+1)}. ${escapeHtml(d.question)}</div>
        <div class="ans-line ans-wrong">✗ ${u.yourAns}: ${uaText}</div>
        <div class="ans-line ans-correct">✓ ${u.correctAns}: ${caText}</div>
        <div class="explain">${escapeHtml(d.explanation)}</div>
      </div>`;
    }).join("");
  }

  el("resultView").innerHTML = `
    <h2>${u.resultTitle}</h2>
    <div class="score-big">${r.score} / 670</div>
    <div class="grade">${lang==="zh"?grade.zh:grade.en}</div>
    <div class="stat-grid">
      <div class="stat"><div class="k">${u.correct}</div><div class="v">${r.correctCount} / 40</div></div>
      <div class="stat"><div class="k">${u.wrong}</div><div class="v">${r.wrongCount} / 40</div></div>
    </div>
    <div class="review-title">${u.byDiff}</div>
    <div class="stat-grid">
      <div class="stat"><div class="k">${u.easy}</div><div class="v">${r.perDiff.easy.c} / ${r.perDiff.easy.t}</div></div>
      <div class="stat"><div class="k">${u.medium}</div><div class="v">${r.perDiff.medium.c} / ${r.perDiff.medium.t}</div></div>
      <div class="stat"><div class="k">${u.hard}</div><div class="v">${r.perDiff.hard.c} / ${r.perDiff.hard.t}</div></div>
      <div class="stat"><div class="k">${u.trap}</div><div class="v">${r.perDiff.trap.c} / ${r.perDiff.trap.t}</div></div>
    </div>
    <div class="percentile">
      <div class="k" style="color:var(--muted);font-size:13px">${u.percentileTitle}</div>
      <div class="v" style="font-size:17px;font-weight:700;margin-top:4px">${u.percentile(pct)}</div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">${u.retry}</button>
      <button class="btn" id="copyBtn">${u.copy}</button>
      <span class="copied hidden" id="copiedMsg">${u.copied}</span>
    </div>
    <div class="review-title">${u.review}</div>
    ${reviewHtml}
  `;

  el("retryBtn").addEventListener("click", resetQuiz);
  el("copyBtn").addEventListener("click", ()=>{
    const text = u.summary(r.score, r.correctCount) + "\n" + (lang==="zh"?grade.zh:grade.en) + "\n" + u.percentile(pct);
    copyText(text);
    el("copiedMsg").classList.remove("hidden");
    setTimeout(()=>el("copiedMsg").classList.add("hidden"), 2000);
  });
}

function resetQuiz(){
  for(let i=0;i<answers.length;i++) answers[i]=null;
  current = 0;
  el("resultView").classList.add("hidden");
  el("quizView").classList.remove("hidden");
  renderQuestion(false);
  window.scrollTo(0,0);
}

/* ===================== HELPERS ===================== */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta);
}

/* ===================== INIT ===================== */
initTheme();
applyStaticText();
renderQuestion(false);
</script>
</body>
</html>
