<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熱力學測驗 | Thermodynamics Quiz</title>
<style>
  :root {
    --bg: #FFFFFF;
    --bg-card: #F9FAFB;
    --text: #1A1A1A;
    --text-sub: #6B7280;
    --border: #E5E7EB;
    --accent: #2563EB;
    --accent-hover: #1D4ED8;
    --correct: #16A34A;
    --wrong: #DC2626;
    --option-hover: #EFF6FF;
    --option-selected: #DBEAFE;
    --btn-bg: #F3F4F6;
    --btn-text: #374151;
    --progress-bg: #E5E7EB;
  }
  [data-theme="dark"] {
    --bg: #111111;
    --bg-card: #1C1C1C;
    --text: #E5E7EB;
    --text-sub: #9CA3AF;
    --border: #374151;
    --accent: #60A5FA;
    --accent-hover: #93C5FD;
    --correct: #4ADE80;
    --wrong: #F87171;
    --option-hover: #1E3A5F;
    --option-selected: #1E40AF;
    --btn-bg: #374151;
    --btn-text: #E5E7EB;
    --progress-bg: #374151;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }
  #app { max-width: 760px; margin: 0 auto; padding: 0 16px 40px; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .header-controls { display: flex; gap: 8px; align-items: center; }
  .ctrl-btn {
    background: var(--btn-bg);
    color: var(--btn-text);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: var(--border); }
  .progress-text { font-size: 0.85rem; color: var(--text-sub); white-space: nowrap; }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: var(--progress-bg);
    border-radius: 4px;
    height: 6px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: var(--accent);
    height: 100%;
    transition: width 0.3s;
    border-radius: 4px;
  }

  /* QUESTION CARD */
  .question-wrap {
    opacity: 1;
    transition: opacity 0.25s;
  }
  .question-wrap.fade-out { opacity: 0; }
  .question-num {
    font-size: 0.8rem;
    color: var(--text-sub);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .question-text {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 24px;
    color: var(--text);
  }
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-size: 0.95rem;
    line-height: 1.55;
    transition: background 0.15s, border-color 0.15s;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) {
    background: var(--option-hover);
    border-color: var(--accent);
  }
  .option-btn:disabled { cursor: default; }
  .option-btn.selected {
    background: var(--option-selected);
    border-color: var(--accent);
  }
  .option-label {
    font-weight: 700;
    color: var(--accent);
    min-width: 20px;
    flex-shrink: 0;
  }

  /* NAV BUTTONS */
  .nav-row {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    justify-content: space-between;
    align-items: center;
  }
  .nav-btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--btn-bg);
    color: var(--btn-text);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--border); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .submit-btn {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    padding: 10px 28px;
  }
  .submit-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  /* RESULTS */
  #results { display: none; }
  .result-header { text-align: center; padding: 32px 0 20px; }
  .result-score { font-size: 3rem; font-weight: 800; color: var(--accent); }
  .result-score-label { font-size: 1rem; color: var(--text-sub); margin-top: 4px; }
  .result-grade { font-size: 1.6rem; font-weight: 700; margin: 16px 0 8px; }
  .result-percentile { font-size: 0.95rem; color: var(--text-sub); margin-bottom: 24px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  @media (max-width: 500px) { .stats-grid { grid-template-columns: 1fr; } }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.82rem; color: var(--text-sub); margin-top: 4px; }

  .difficulty-stats {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .difficulty-stats h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; }
  .diff-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .diff-row:last-child { border-bottom: none; }
  .diff-bar-bg {
    width: 120px;
    height: 8px;
    background: var(--progress-bg);
    border-radius: 4px;
    overflow: hidden;
    margin: 0 12px;
  }
  .diff-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; }

  /* REVIEW */
  .review-section { margin-top: 8px; }
  .review-section h3 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .review-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .review-q { font-size: 0.92rem; font-weight: 600; margin-bottom: 10px; line-height: 1.5; }
  .review-option { font-size: 0.88rem; padding: 6px 0; display: flex; align-items: flex-start; gap: 8px; line-height: 1.45; }
  .tag {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .tag-wrong { background: #FEE2E2; color: var(--wrong); }
  .tag-correct { background: #DCFCE7; color: var(--correct); }
  [data-theme="dark"] .tag-wrong { background: #450a0a; }
  [data-theme="dark"] .tag-correct { background: #052e16; }
  .review-explanation {
    font-size: 0.85rem;
    color: var(--text-sub);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    line-height: 1.5;
  }

  .result-btns {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .result-btn {
    flex: 1;
    min-width: 140px;
    padding: 12px 20px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--btn-bg);
    color: var(--btn-text);
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    text-align: center;
  }
  .result-btn:hover { background: var(--border); }
  .result-btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .result-btn.primary:hover { background: var(--accent-hover); }

  .copy-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .copy-toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-title" id="header-title">熱力學測驗</div>
    <div class="header-controls">
      <span class="progress-text" id="progress-text">第 1 / 40 題</span>
      <button class="ctrl-btn" id="lang-btn" onclick="toggleLang()">English</button>
      <button class="ctrl-btn" id="theme-btn" onclick="toggleTheme()">🌙 深色</button>
    </div>
  </header>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>

  <!-- QUIZ -->
  <div id="quiz">
    <div class="question-wrap" id="question-wrap">
      <div class="question-num" id="question-num"></div>
      <div class="question-text" id="question-text"></div>
      <div class="options-list" id="options-list"></div>
      <div class="nav-row">
        <button class="nav-btn" id="prev-btn" onclick="prevQuestion()">← <span class="t" data-zh="上一題" data-en="Previous"></span></button>
        <button class="nav-btn submit-btn" id="submit-btn" style="display:none" onclick="submitQuiz()"><span class="t" data-zh="提交測驗" data-en="Submit Quiz"></span></button>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="result-header">
      <div class="result-score" id="result-score"></div>
      <div class="result-score-label t" data-zh="總分 / 670 分" data-en="Total Score / 670"></div>
      <div class="result-grade" id="result-grade"></div>
      <div class="result-percentile" id="result-percentile"></div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-correct"></div>
        <div class="stat-label t" data-zh="答對題數" data-en="Correct Answers"></div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-wrong"></div>
        <div class="stat-label t" data-zh="答錯題數" data-en="Wrong Answers"></div>
      </div>
    </div>

    <div class="difficulty-stats">
      <h3 class="t" data-zh="各難度正確率" data-en="Score by Difficulty"></h3>
      <div class="diff-row">
        <span class="t" data-zh="簡單 Easy" data-en="Easy"></span>
        <div class="diff-bar-bg"><div class="diff-bar-fill" id="bar-easy"></div></div>
        <span id="stat-easy"></span>
      </div>
      <div class="diff-row">
        <span class="t" data-zh="中等 Med" data-en="Medium"></span>
        <div class="diff-bar-bg"><div class="diff-bar-fill" id="bar-med"></div></div>
        <span id="stat-med"></span>
      </div>
      <div class="diff-row">
        <span class="t" data-zh="困難 Hard" data-en="Hard"></span>
        <div class="diff-bar-bg"><div class="diff-bar-fill" id="bar-hard"></div></div>
        <span id="stat-hard"></span>
      </div>
      <div class="diff-row">
        <span class="t" data-zh="陷阱 Trap" data-en="Trap"></span>
        <div class="diff-bar-bg"><div class="diff-bar-fill" id="bar-trap"></div></div>
        <span id="stat-trap"></span>
      </div>
    </div>

    <div class="review-section">
      <h3 id="review-title"></h3>
      <div id="review-list"></div>
    </div>

    <div class="result-btns">
      <button class="result-btn primary" onclick="restartQuiz()">
        <span class="t" data-zh="🔄 重新測驗" data-en="🔄 Restart Quiz"></span>
      </button>
      <button class="result-btn" onclick="copyResult()">
        <span class="t" data-zh="📋 複製結果" data-en="📋 Copy Result"></span>
      </button>
    </div>
  </div>
</div>

<div class="copy-toast" id="copy-toast"></div>

<script>
// ─── THEME ───────────────────────────────────────────────────────────
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
let isDark = prefersDark;
document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '☀️ 淺色' : '🌙 深色';
}
document.getElementById('theme-btn').textContent = isDark ? '☀️ 淺色' : '🌙 深色';

// ─── LANGUAGE ────────────────────────────────────────────────────────
let lang = 'zh';
function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  document.getElementById('lang-btn').textContent = lang === 'zh' ? 'English' : '中文';
  applyLang();
  renderQuestion();
}
function applyLang() {
  document.querySelectorAll('.t').forEach(el => {
    el.textContent = el.dataset[lang] || el.dataset.zh;
  });
  document.getElementById('header-title').textContent = lang === 'zh' ? '熱力學測驗' : 'Thermodynamics Quiz';
  document.title = lang === 'zh' ? '熱力學測驗 | Thermodynamics Quiz' : 'Thermodynamics Quiz | 熱力學測驗';
  updateProgressText();
}

// ─── QUESTION DATA ───────────────────────────────────────────────────
const questionsRaw = [
  // ── EASY (10 題, 10 分) ──
  {
    id: 1, difficulty: 'easy', points: 10,
    zh: {
      question: '下列何者為熱力學溫度的 SI 單位？',
      options: [
        '克耳文（K）——以絕對零度為起點的溫度單位',
        '攝氏度（°C）——以水的冰點為起點的溫度單位',
        '華氏度（°F）——以鹽水冰點為起點的溫度單位',
        '蘭金（°R）——以絕對零度為起點的英制溫度單位'
      ],
      explanation: '熱力學溫度的 SI 單位是克耳文（K），以絕對零度（-273.15°C）為零點。'
    },
    en: {
      question: 'Which of the following is the SI unit of thermodynamic temperature?',
      options: [
        'Kelvin (K) — temperature scale starting from absolute zero',
        'Celsius (°C) — temperature scale starting from the freezing point of water',
        'Fahrenheit (°F) — temperature scale starting from the freezing point of brine',
        'Rankine (°R) — imperial temperature scale starting from absolute zero'
      ],
      explanation: 'The SI unit of thermodynamic temperature is the Kelvin (K), with zero at absolute zero (−273.15 °C).'
    },
    answer: 0
  },
  {
    id: 2, difficulty: 'easy', points: 10,
    zh: {
      question: '熱力學第零定律描述的是什麼核心概念？',
      options: [
        '孤立系統的總能量守恆不隨時間改變',
        '熱平衡具有遞移性：若A與B熱平衡、B與C熱平衡，則A與C亦熱平衡',
        '孤立系統的熵在自發過程中只能增加不能減少',
        '在有限步驟的操作內，絕對零度無法被精確達到'
      ],
      explanation: '熱力學第零定律確立了熱平衡的遞移性，也是溫度這個狀態函數的邏輯基礎。'
    },
    en: {
      question: 'What core concept does the Zeroth Law of Thermodynamics describe?',
      options: [
        'The total energy of an isolated system is conserved and does not change over time',
        'Thermal equilibrium is transitive: if A is in equilibrium with B, and B with C, then A is in equilibrium with C',
        'The entropy of an isolated system can only increase during spontaneous processes',
        'Absolute zero cannot be reached in a finite number of operational steps'
      ],
      explanation: 'The Zeroth Law establishes the transitivity of thermal equilibrium and is the logical foundation for temperature as a state function.'
    },
    answer: 1
  },
  {
    id: 3, difficulty: 'easy', points: 10,
    zh: {
      question: '根據熱力學第一定律，下列敘述何者正確？',
      options: [
        '熱量只能從高溫物體自發地傳向低溫物體，方向不可逆',
        '自發過程中，宇宙的總熵必然增加或維持不變',
        '系統內能的變化量等於系統從環境吸收的熱量減去對外做的功',
        '在相同溫度範圍內運作的熱機，卡諾循環的效率最高'
      ],
      explanation: '第一定律為能量守恆：ΔU = Q − W，內能變化量等於吸熱量減去對外做的功。'
    },
    en: {
      question: 'According to the First Law of Thermodynamics, which statement is correct?',
      options: [
        'Heat spontaneously flows only from hot to cold objects and the direction is irreversible',
        'In spontaneous processes, the total entropy of the universe must increase or remain constant',
        'The change in internal energy equals the heat absorbed from the surroundings minus the work done on the surroundings',
        'Among engines operating between the same temperatures, the Carnot cycle has the highest efficiency'
      ],
      explanation: 'The First Law is energy conservation: ΔU = Q − W; the change in internal energy equals heat absorbed minus work done on surroundings.'
    },
    answer: 2
  },
  {
    id: 4, difficulty: 'easy', points: 10,
    zh: {
      question: '「熱（heat）」的最正確熱力學定義是什麼？',
      options: [
        '物體所包含的全部能量，涵蓋動能與位能的總和',
        '分子無規則熱運動所具備的平均動能大小',
        '系統對外界施力而產生位移時所傳遞的能量',
        '僅因溫度差而驅動，跨越系統邊界傳遞的能量形式'
      ],
      explanation: '熱是因溫度差而在系統與環境邊界傳遞的能量，是過程量而非狀態量，物體本身不「含有」熱量。'
    },
    en: {
      question: 'What is the most accurate thermodynamic definition of "heat"?',
      options: [
        'The total energy contained in a body, including both kinetic and potential energy',
        'The average kinetic energy of molecules due to random thermal motion',
        'Energy transferred when the system exerts a force causing displacement on the surroundings',
        'Energy transferred across a system boundary driven solely by a temperature difference'
      ],
      explanation: 'Heat is energy transferred across a system boundary due to a temperature difference. It is a process quantity, not a state function; objects do not "contain" heat.'
    },
    answer: 3
  },
  {
    id: 5, difficulty: 'easy', points: 10,
    zh: {
      question: '等溫過程（isothermal process）的特徵是什麼？',
      options: [
        '系統在過程進行中溫度維持恆定不變',
        '系統在過程中與外界無任何熱量交換',
        '系統的壓力在整個過程中維持恆定不變',
        '系統的體積在整個過程中維持恆定不變'
      ],
      explanation: '等溫過程（isothermal）字面意義即溫度（thermo）不變（iso），系統溫度全程保持恆定。'
    },
    en: {
      question: 'What is the defining characteristic of an isothermal process?',
      options: [
        'The temperature of the system remains constant throughout the process',
        'There is no heat exchange between the system and its surroundings during the process',
        'The pressure of the system remains constant throughout the process',
        'The volume of the system remains constant throughout the process'
      ],
      explanation: 'An isothermal process is one in which the system temperature remains constant throughout (iso = same, thermo = temperature).'
    },
    answer: 0
  },
  {
    id: 6, difficulty: 'easy', points: 10,
    zh: {
      question: '關於熵（entropy）的物理意義，下列描述何者最為恰當？',
      options: [
        '系統在特定條件下對外做最大功的能力大小',
        '系統微觀狀態數 Ω 的對數量度，S = k_B ln Ω',
        '系統儲存的熱量總含量，單位為焦耳',
        '系統從環境累積吸收的總能量積分值'
      ],
      explanation: '玻爾茲曼關係式 S = k_B ln Ω 揭示熵是系統微觀狀態數的對數量度，反映系統的無序程度。'
    },
    en: {
      question: 'Which description best captures the physical meaning of entropy?',
      options: [
        'The capacity of a system to do maximum work under given conditions',
        'A logarithmic measure of the number of microstates Ω: S = k_B ln Ω',
        'The total heat content stored in a system, measured in joules',
        'The cumulative integral of all energy absorbed by the system from surroundings'
      ],
      explanation: "Boltzmann's relation S = k_B ln Ω reveals that entropy is a logarithmic measure of the number of microstates, reflecting the system's degree of disorder."
    },
    answer: 1
  },
  {
    id: 7, difficulty: 'easy', points: 10,
    zh: {
      question: '絕熱過程（adiabatic process）的定義是什麼？',
      options: [
        '系統溫度全程保持不變，即 dT = 0 的過程',
        '系統壓力全程保持不變，即 dP = 0 的過程',
        '系統與外界之間完全沒有熱量交換，即 δQ = 0 的過程',

// ─── SHUFFLE ─────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── STATE ───────────────────────────────────────────────────────────
let questions = shuffle(questionsRaw);
let current = 0;
let userAnswers = new Array(40).fill(null);
let transitioning = false;

// ─── RENDER ──────────────────────────────────────────────────────────
function updateProgressText() {
  const txt = lang === 'zh'
    ? `第 ${current + 1} / 40 題`
    : `Question ${current + 1} / 40`;
  document.getElementById('progress-text').textContent = txt;
}

function renderQuestion() {
  const q = questions[current];
  const data = q[lang];
  document.getElementById('question-num').textContent =
    lang === 'zh' ? `第 ${current + 1} 題` : `Question ${current + 1}`;
  document.getElementById('question-text').textContent = data.question;

  const ol = document.getElementById('options-list');
  ol.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  data.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (userAnswers[current] === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(i);
    ol.appendChild(btn);
  });

  const prevBtn = document.getElementById('prev-btn');
  const submitBtn = document.getElementById('submit-btn');
  prevBtn.disabled = current === 0;

  const isLast = current === questions.length - 1;
  const hasAnswer = userAnswers[current] !== null;
  submitBtn.style.display = (isLast && hasAnswer) ? 'inline-flex' : 'none';

  const pct = (current / 40) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  updateProgressText();
  applyLang();
}

function selectOption(idx) {
  if (transitioning) return;
  const prev = userAnswers[current];
  userAnswers[current] = idx;

  // Highlight selected
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });

  const isLast = current === questions.length - 1;
  if (isLast) {
    document.getElementById('submit-btn').style.display = 'inline-flex';
    return;
  }

  // Auto-advance after 0.4s
  transitioning = true;
  setTimeout(() => {
    fadeTransition(() => {
      current++;
      renderQuestion();
      transitioning = false;
    });
  }, 400);
}

function fadeTransition(cb) {
  const wrap = document.getElementById('question-wrap');
  wrap.classList.add('fade-out');
  setTimeout(() => {
    cb();
    wrap.classList.remove('fade-out');
  }, 200);
}

function prevQuestion() {
  if (current === 0 || transitioning) return;
  transitioning = true;
  fadeTransition(() => {
    current--;
    renderQuestion();
    transitioning = false;
  });
}

// ─── RESULTS ─────────────────────────────────────────────────────────
function normalCDF(x) {
  // Approximation of the standard normal CDF
  const t = 1 / (1 + 0.2316419 * Math.abs(x));
  const d = 0.3989423 * Math.exp(-x * x / 2);
  const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.7814779 + t * (-1.8212560 + t * 1.3302744))));
  return x > 0 ? 1 - p : p;
}

function submitQuiz() {
  let totalScore = 0;
  let correctCount = 0;
  const byDiff = { easy: [0,0], medium: [0,0], hard: [0,0], trap: [0,0] };
  const maxByDiff = { easy: 10, medium: 15, hard: 10, trap: 5 };

  questions.forEach((q, i) => {
    const ans = userAnswers[i];
    const isCorrect = ans === q.answer;
    byDiff[q.difficulty][1]++;
    if (isCorrect) {
      totalScore += q.points;
      correctCount++;
      byDiff[q.difficulty][0]++;
    }
  });

  // Percentile
  const mean = 670 * 0.45;
  const sd = 670 * 0.15;
  const z = (totalScore - mean) / sd;
  const percentile = Math.round(normalCDF(z) * 100);

  // Grade
  let grade = '';
  if (totalScore >= 600) grade = lang === 'zh' ? '🏆 頂尖專家' : '🏆 Top Expert';
  else if (totalScore >= 500) grade = lang === 'zh' ? '⭐ 進階掌握' : '⭐ Advanced';
  else if (totalScore >= 380) grade = lang === 'zh' ? '📘 中等水準' : '📘 Intermediate';
  else if (totalScore >= 250) grade = lang === 'zh' ? '📗 基礎尚可' : '📗 Basic';
  else grade = lang === 'zh' ? '📕 需要加強' : '📕 Needs Improvement';

  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  document.getElementById('progress-text').textContent = '';

  document.getElementById('result-score').textContent = totalScore;
  document.getElementById('result-grade').textContent = grade;
  document.getElementById('result-percentile').textContent =
    lang === 'zh'
      ? `你的成績超越了約 ${percentile}% 的測試者`
      : `Your score exceeds approximately ${percentile}% of test takers`;

  document.getElementById('stat-correct').textContent = `${correctCount} / 40`;
  document.getElementById('stat-wrong').textContent = `${40 - correctCount} / 40`;

  const diffLabels = {
    easy: lang === 'zh' ? '簡單' : 'Easy',
    medium: lang === 'zh' ? '中等' : 'Medium',
    hard: lang === 'zh' ? '困難' : 'Hard',
    trap: lang === 'zh' ? '陷阱' : 'Trap'
  };
  ['easy','medium','hard','trap'].forEach(d => {
    const [c, t] = byDiff[d];
    document.getElementById(`stat-${d === 'medium' ? 'med' : d}`).textContent = `${c} / ${maxByDiff[d]}`;
    document.getElementById(`bar-${d === 'medium' ? 'med' : d}`).style.width = (t > 0 ? (c/t)*100 : 0) + '%';
  });

  // Review
  const reviewTitle = lang === 'zh' ? '❌ 錯題回顧' : '❌ Review Wrong Answers';
  document.getElementById('review-title').textContent = reviewTitle;

  const rl = document.getElementById('review-list');
  rl.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  let wrongCount = 0;

  questions.forEach((q, i) => {
    const userAns = userAnswers[i];
    if (userAns === q.answer) return;
    wrongCount++;
    const data = q[lang];
    const item = document.createElement('div');
    item.className = 'review-item';

    const qNum = lang === 'zh' ? `第 ${i+1} 題` : `Q${i+1}`;
    const yourAns = lang === 'zh' ? '你的作答' : 'Your answer';
    const corrAns = lang === 'zh' ? '正確答案' : 'Correct answer';
    const explLabel = lang === 'zh' ? '解析：' : 'Explanation: ';

    item.innerHTML = `
      <div class="review-q">${qNum}. ${data.question}</div>
      ${userAns !== null ? `
      <div class="review-option">
        <span class="tag tag-wrong">${yourAns}: ${labels[userAns]}</span>
        <span>${data.options[userAns]}</span>
      </div>` : ''}
      <div class="review-option">
        <span class="tag tag-correct">${corrAns}: ${labels[q.answer]}</span>
        <span>${data.options[q.answer]}</span>
      </div>
      <div class="review-explanation">${explLabel}${data.explanation}</div>
    `;
    rl.appendChild(item);
  });

  if (wrongCount === 0) {
    rl.innerHTML = `<p style="color:var(--correct);font-weight:700;text-align:center;padding:20px 0">${lang === 'zh' ? '🎉 全部答對！' : '🎉 Perfect score!'}</p>`;
  }

  document.getElementById('progress-bar').style.width = '100%';
  applyLang();
}

function restartQuiz() {
  questions = shuffle(questionsRaw);
  current = 0;
  userAnswers = new Array(40).fill(null);
  transitioning = false;
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function copyResult() {
  const score = document.getElementById('result-score').textContent;
  const grade = document.getElementById('result-grade').textContent;
  const percentile = document.getElementById('result-percentile').textContent;
  const correct = document.getElementById('stat-correct').textContent;

  const easyS = document.getElementById('stat-easy').textContent;
  const medS = document.getElementById('stat-med').textContent;
  const hardS = document.getElementById('stat-hard').textContent;
  const trapS = document.getElementById('stat-trap').textContent;

  const text = lang === 'zh'
    ? `【熱力學測驗成績】\n總分：${score} / 670 分\n等級：${grade}\n答對：${correct}\n${percentile}\n簡單：${easyS} | 中等：${medS} | 困難：${hardS} | 陷阱：${trapS}`
    : `[Thermodynamics Quiz Result]\nScore: ${score} / 670\nGrade: ${grade}\nCorrect: ${correct}\n${percentile}\nEasy: ${easyS} | Medium: ${medS} | Hard: ${hardS} | Trap: ${trapS}`;

  navigator.clipboard.writeText(text).then(() => {
    showToast(lang === 'zh' ? '✅ 已複製結果！' : '✅ Result copied!');
  }).catch(() => {
    showToast(lang === 'zh' ? '複製失敗，請手動複製' : 'Copy failed, please copy manually');
  });
}

function showToast(msg) {
  const t = document.getElementById('copy-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── INIT ─────────────────────────────────────────────────────────────
renderQuestion();
applyLang();
</script>
