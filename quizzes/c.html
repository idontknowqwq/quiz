<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C 程式語言測驗</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
    --accent: #2563EB;
    --accent-text: #FFFFFF;
    --track: #E5E7EB;
    --correct: #16A34A;
    --wrong: #DC2626;
  }
  [data-theme="dark"] {
    --bg: #111111;
    --text: #E5E7EB;
    --text-secondary: #9CA3AF;
    --border: #374151;
    --accent: #60A5FA;
    --accent-text: #111111;
    --track: #374151;
    --correct: #4ADE80;
    --wrong: #F87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", Roboto, sans-serif;
    line-height: 1.6;
    transition: background .15s, color .15s;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; flex-wrap: wrap; padding: 8px 0 16px; border-bottom: 1px solid var(--border);
  }
  .title { font-size: 18px; font-weight: 700; }
  .controls { display: flex; gap: 8px; }
  .btn {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; font-size: 14px; cursor: pointer;
    font-family: inherit;
  }
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
  .btn-primary:hover { opacity: .9; background: var(--accent); }
  .progress-text { color: var(--text-secondary); font-size: 14px; margin: 16px 0 4px; }
  .question-area { flex: 1; padding: 16px 0; opacity: 1; transition: opacity .25s; }
  .question-area.fade { opacity: 0; }
  .question-text { font-size: 19px; font-weight: 600; margin-bottom: 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px;
    cursor: pointer; font-size: 15px; background: var(--bg); color: var(--text);
    text-align: left; font-family: inherit; transition: background .1s;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .option:hover { background: var(--border); }
  .option.selected { border-color: var(--accent); background: var(--accent); color: var(--accent-text); }
  .option .label { font-weight: 700; flex-shrink: 0; }
  .nav { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; }
  .footer-bar { padding-top: 16px; }
  .track { width: 100%; height: 8px; background: var(--track); border-radius: 4px; overflow: hidden; }
  .fill { height: 100%; background: var(--accent); width: 0%; transition: width .2s; }
  /* result */
  .result h2 { font-size: 24px; margin-bottom: 16px; }
  .score-big { font-size: 40px; font-weight: 800; color: var(--accent); }
  .grade { font-size: 22px; font-weight: 700; margin: 12px 0; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
  .stat {
    border: 1px solid var(--border); border-radius: 8px; padding: 12px;
  }
  .stat .k { color: var(--text-secondary); font-size: 13px; }
  .stat .v { font-size: 20px; font-weight: 700; }
  .percentile { border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin: 12px 0; font-size: 16px; }
  .review h3 { margin: 24px 0 12px; font-size: 18px; }
  .review-item { border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .review-q { font-weight: 600; margin-bottom: 8px; }
  .review-line { font-size: 14px; margin: 3px 0; }
  .mark-wrong { color: var(--wrong); font-weight: 600; }
  .mark-correct { color: var(--correct); font-weight: 600; }
  .review-exp { color: var(--text-secondary); font-size: 13px; margin-top: 6px; }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
  .hidden { display: none; }
  @media (max-width: 480px) {
    .stat-grid { grid-template-columns: 1fr; }
    .title { font-size: 16px; }
    .btn { padding: 6px 9px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title" id="appTitle">C 程式語言測驗</div>
    <div class="controls">
      <button class="btn" id="langBtn">English</button>
      <button class="btn" id="themeBtn">🌙 深色</button>
    </div>
  </header>

  <!-- QUIZ -->
  <div id="quizView">
    <div class="progress-text" id="progressText">第 1 / 40 題</div>
    <div class="question-area" id="questionArea">
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsBox"></div>
    </div>
    <div class="nav">
      <button class="btn" id="prevBtn">上一題</button>
      <button class="btn btn-primary hidden" id="submitBtn">提交測驗</button>
    </div>
    <div class="footer-bar">
      <div class="track"><div class="fill" id="fill"></div></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="resultView" class="result hidden"></div>
</div>

   en:{question:"In a standard C program, what does main usually return?",options:["void, meaning it returns no value at all","char, returning a character the program prints","float, returning the program's running time","int, returning a status code to the OS"],explanation:"main returns an int status code."}},

   en:{question:"In C, what are the results of 7 / 2 and 7 % 2?",options:["3 and 1","3.5 and 1","3 and 3.5","3.5 and 0"],explanation:"Integer division gives quotient and remainder."}},

  {id:9,difficulty:"easy",points:10,answer:0,

  {id:10,difficulty:"medium",points:15,answer:2,

  {id:15,difficulty:"medium",points:15,answer:3,

  {id:17,difficulty:"hard",points:25,answer:0,

  {id:18,difficulty:"medium",points:15,answer:2,

const i18n = {
  zh: { title:"C 程式語言測驗", lang:"English", dark:"🌙 深色", light:"☀️ 淺色",
    progress:(c,t)=>`第 ${c} / ${t} 題`, prev:"上一題", submit:"提交測驗",
    resultTitle:"測驗結果", totalScore:"總分", correctCount:"正確題數", wrongCount:"錯誤題數",
    byDiff:"各難度正確率", easy:"簡單", medium:"中等", hard:"困難", trap:"陷阱",
    percentile:(p)=>`你的成績超越了約 ${p}% 的測試者`,
    grade:"等級評定", review:"錯題回顧", yourAns:"你的選擇", correctAns:"正確答案",
    retry:"重新測驗", copy:"複製結果", copied:"已複製！", noWrong:"太厲害了，全部答對！",
    summary:(s,c)=>`我在 C 程式語言測驗中得到 ${s} / 670 分，答對 ${c} / 40 題！` },
  en: { title:"C Programming Quiz", lang:"中文", dark:"🌙 Dark", light:"☀️ Light",
    progress:(c,t)=>`Question ${c} / ${t}`, prev:"Previous", submit:"Submit Quiz",
    resultTitle:"Your Results", totalScore:"Total Score", correctCount:"Correct", wrongCount:"Wrong",
    byDiff:"Accuracy by Difficulty", easy:"Easy", medium:"Medium", hard:"Hard", trap:"Trap",
    percentile:(p)=>`You scored higher than about ${p}% of test-takers`,
    grade:"Grade", review:"Review of Wrong Answers", yourAns:"Your choice", correctAns:"Correct answer",
    retry:"Retry", copy:"Copy Results", copied:"Copied!", noWrong:"Perfect — all correct!",
    summary:(s,c)=>`I scored ${s} / 670 on the C Programming Quiz, ${c} / 40 correct!` }
};

const grades = [
  {min:600, zh:"🏆 頂尖專家", en:"🏆 Top Expert"},
  {min:500, zh:"⭐ 進階掌握", en:"⭐ Advanced"},
  {min:380, zh:"📘 中等水準", en:"📘 Intermediate"},
  {min:250, zh:"📗 基礎尚可", en:"📗 Basic"},
  {min:0,   zh:"📕 需要加強", en:"📕 Needs Improvement"}
];

let lang = "zh";
let current = 0;
const answers = new Array(questions.length).fill(null);
const LETTERS = ["A","B","C","D"];

// theme init
(function initTheme(){
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
})();

const $ = id => document.getElementById(id);

function applyStaticText(){
  const t = i18n[lang];
  document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
  $("appTitle").textContent = t.title;
  $("langBtn").textContent = t.lang;
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  $("themeBtn").textContent = isDark ? t.light : t.dark;
  $("prevBtn").textContent = t.prev;
  $("submitBtn").textContent = t.submit;
}

function renderQuestion(){
  const t = i18n[lang];
  const q = questions[current];
  const data = q[lang];
  $("progressText").textContent = t.progress(current+1, questions.length);
  $("questionText").textContent = data.question;
  const box = $("optionsBox");
  box.innerHTML = "";
  data.options.forEach((opt, idx) => {
    const el = document.createElement("button");
    el.className = "option" + (answers[current] === idx ? " selected" : "");
    el.innerHTML = `<span class="label">${LETTERS[idx]}</span><span>${escapeHtml(opt)}</span>`;
    el.addEventListener("click", () => selectOption(idx));
    box.appendChild(el);
  });
  $("prevBtn").style.visibility = current === 0 ? "hidden" : "visible";
  const lastAndAnswered = current === questions.length - 1 && answers[current] !== null;
  $("submitBtn").classList.toggle("hidden", !lastAndAnswered);
  $("fill").style.width = ((current+1)/questions.length*100) + "%";
}

function selectOption(idx){
  answers[current] = idx;
  // show selected state
  const opts = $("optionsBox").children;
  for (let i=0;i<opts.length;i++) opts[i].classList.toggle("selected", i===idx);

  if (current === questions.length - 1){
    // last question: show submit button, no auto-advance
    $("submitBtn").classList.remove("hidden");
    return;
  }
  // brief highlight then auto-advance
  setTimeout(()=>{
    const area = $("questionArea");
    area.classList.add("fade");
    setTimeout(()=>{
      current++;
      renderQuestion();
      area.classList.remove("fade");
    }, 250);
  }, 400);
}

function goPrev(){
  if (current === 0) return;
  const area = $("questionArea");
  area.classList.add("fade");
  setTimeout(()=>{
    current--;
    renderQuestion();
    area.classList.remove("fade");
  }, 250);
}

// normal CDF via erf approximation
function normalCdf(x, mean, sd){
  const z = (x - mean) / (sd * Math.SQRT2);
  return 0.5 * (1 + erf(z));
}
function erf(x){
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x);
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const t = 1/(1+p*x);
  const y = 1 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign*y;
}

function computeResults(){
  let score=0, correct=0;
  const diff = {easy:{c:0,n:0},medium:{c:0,n:0},hard:{c:0,n:0},trap:{c:0,n:0}};
  const wrong = [];
  questions.forEach((q,i)=>{
    diff[q.difficulty].n++;
    if (answers[i] === q.answer){ score += q.points; correct++; diff[q.difficulty].c++; }
    else { wrong.push({q, chosen: answers[i]}); }
  });
  const mean = 670*0.45, sd = 670*0.15;
  const pct = Math.round(normalCdf(score, mean, sd)*100);
  return {score, correct, wrong:wrong, diff, pct: Math.max(0,Math.min(99,pct))};
}

function showResults(){
  const t = i18n[lang];
  const r = computeResults();
  const grade = grades.find(g => r.score >= g.min);
  $("quizView").classList.add("hidden");
  const v = $("resultView");
  v.classList.remove("hidden");

  let html = `<h2>${t.resultTitle}</h2>`;
  html += `<div class="score-big">${r.score} / 670</div>`;
  html += `<div class="grade">${grade[lang]}</div>`;
  html += `<div class="stat-grid">
    <div class="stat"><div class="k">${t.correctCount}</div><div class="v">${r.correct} / 40</div></div>
    <div class="stat"><div class="k">${t.wrongCount}</div><div class="v">${40-r.correct} / 40</div></div>
  </div>`;
  html += `<div class="stat-grid">
    <div class="stat"><div class="k">${t.easy}</div><div class="v">${r.diff.easy.c} / ${r.diff.easy.n}</div></div>
    <div class="stat"><div class="k">${t.medium}</div><div class="v">${r.diff.medium.c} / ${r.diff.medium.n}</div></div>
    <div class="stat"><div class="k">${t.hard}</div><div class="v">${r.diff.hard.c} / ${r.diff.hard.n}</div></div>
    <div class="stat"><div class="k">${t.trap}</div><div class="v">${r.diff.trap.c} / ${r.diff.trap.n}</div></div>
  </div>`;
  html += `<div class="percentile">${t.percentile(r.pct)}</div>`;

  html += `<div class="result-actions">
    <button class="btn btn-primary" id="retryBtn">${t.retry}</button>
    <button class="btn" id="copyBtn">${t.copy}</button>
  </div>`;

  html += `<div class="review"><h3>${t.review}</h3>`;
  if (r.wrong.length === 0){
    html += `<div class="review-item">${t.noWrong}</div>`;
  } else {
    r.wrong.forEach(w => {
      const d = w.q[lang];
      const chosenTxt = w.chosen === null ? "—" : `${LETTERS[w.chosen]}. ${escapeHtml(d.options[w.chosen])}`;
      const correctTxt = `${LETTERS[w.q.answer]}. ${escapeHtml(d.options[w.q.answer])}`;
      html += `<div class="review-item">
        <div class="review-q">${escapeHtml(d.question)}</div>
        <div class="review-line"><span class="mark-wrong">${t.yourAns}:</span> ${chosenTxt}</div>
        <div class="review-line"><span class="mark-correct">${t.correctAns}:</span> ${correctTxt}</div>
        <div class="review-exp">${escapeHtml(d.explanation)}</div>
      </div>`;
    });
  }
  html += `</div>`;
  v.innerHTML = html;

  $("retryBtn").addEventListener("click", retry);
  $("copyBtn").addEventListener("click", ()=>{
    const text = t.summary(r.score, r.correct);
    navigator.clipboard.writeText(text).then(()=>{
      $("copyBtn").textContent = t.copied;
      setTimeout(()=>{ $("copyBtn").textContent = t.copy; }, 1500);
    }).catch(()=>{
      $("copyBtn").textContent = t.copied;
    });
  });
}

function retry(){
  current = 0;
  for (let i=0;i<answers.length;i++) answers[i]=null;
  $("resultView").classList.add("hidden");
  $("quizView").classList.remove("hidden");
  renderQuestion();
}

function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// events
$("langBtn").addEventListener("click", ()=>{
  lang = lang === "zh" ? "en" : "zh";
  applyStaticText();
  if ($("resultView").classList.contains("hidden")) renderQuestion();
  else showResults();
});
$("themeBtn").addEventListener("click", ()=>{
  const cur = document.documentElement.getAttribute("data-theme");
  document.documentElement.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
  applyStaticText();
});
$("prevBtn").addEventListener("click", goPrev);
$("submitBtn").addEventListener("click", showResults);

// init
applyStaticText();
renderQuestion();
</script>
