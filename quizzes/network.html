<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計算機網路測驗</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
    --accent: #2563EB;
    --accent-text: #FFFFFF;
    --hover: #F3F4F6;
    --correct: #16A34A;
    --wrong: #DC2626;
    --track: #E5E7EB;
  }
  [data-theme="dark"] {
    --bg: #111111;
    --text: #E5E7EB;
    --text-secondary: #9CA3AF;
    --border: #374151;
    --accent: #60A5FA;
    --accent-text: #111111;
    --hover: #1F2937;
    --correct: #4ADE80;
    --wrong: #F87171;
    --track: #374151;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    line-height: 1.6;
    transition: background .2s, color .2s;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; padding: 12px 0 16px; border-bottom: 1px solid var(--border);
  }
  h1 { font-size: 1.15rem; font-weight: 700; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .btn {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 12px; font-size: .85rem; cursor: pointer;
    font-family: inherit; transition: background .15s, border-color .15s;
  }
  .btn:hover { background: var(--hover); }
  .btn-accent { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
  .progress-info { color: var(--text-secondary); font-size: .9rem; margin: 18px 0 6px; }
  .stage { flex: 1; display: flex; flex-direction: column; }

  .q-card { opacity: 1; transition: opacity .25s ease; }
  .q-card.fade { opacity: 0; }
  .q-text { font-size: 1.1rem; font-weight: 600; margin: 8px 0 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex; align-items: flex-start; gap: 10px;
    border: 1px solid var(--border); border-radius: 8px; padding: 13px 14px;
    cursor: pointer; background: var(--bg); transition: background .15s, border-color .15s;
    font-size: .98rem; text-align: left; color: var(--text); font-family: inherit; width: 100%;
  }
  .option:hover { background: var(--hover); }
  .option.selected { border-color: var(--accent); background: var(--hover); }
  .option .key {
    flex-shrink: 0; width: 24px; height: 24px; border: 1px solid var(--border);
    border-radius: 5px; display: flex; align-items: center; justify-content: center;
    font-size: .8rem; font-weight: 600; color: var(--text-secondary);
  }
  .option.selected .key { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; gap: 10px; }

  .bar-track { height: 6px; background: var(--track); border-radius: 3px; overflow: hidden; margin-top: 20px; }
  .bar-fill { height: 100%; width: 0; background: var(--accent); transition: width .25s ease; }

  /* Result */
  .result h2 { font-size: 1.4rem; margin-bottom: 4px; }
  .score-big { font-size: 2.6rem; font-weight: 700; color: var(--accent); margin: 10px 0; }
  .grade { font-size: 1.3rem; font-weight: 600; margin: 6px 0 4px; }
  .pct { color: var(--text-secondary); margin-bottom: 18px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 18px 0; }
  .stat {
    border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px;
  }
  .stat .label { font-size: .8rem; color: var(--text-secondary); }
  .stat .val { font-size: 1.25rem; font-weight: 700; margin-top: 2px; }
  .section-title { font-size: 1.05rem; font-weight: 700; margin: 24px 0 12px; }
  .review-item { border: 1px solid var(--border); border-radius: 8px; padding: 13px 14px; margin-bottom: 12px; }
  .review-q { font-weight: 600; margin-bottom: 8px; }
  .review-line { font-size: .9rem; margin: 3px 0; }
  .review-line.your { color: var(--wrong); }
  .review-line.correct { color: var(--correct); }
  .review-exp { font-size: .85rem; color: var(--text-secondary); margin-top: 6px; }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
  .hidden { display: none; }
  @media (max-width: 480px) {
    h1 { font-size: 1rem; }
    .btn { padding: 6px 9px; font-size: .8rem; }
    .stat-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title">計算機網路 · 互動測驗</h1>
    <div class="controls">
      <button class="btn" id="langBtn">English</button>
      <button class="btn" id="themeBtn">🌙</button>
    </div>
  </header>

  <!-- Quiz stage -->
  <div class="stage" id="quizStage">
    <div class="progress-info" id="progressInfo"></div>
    <div class="q-card" id="qCard">
      <div class="q-text" id="qText"></div>
      <div class="options" id="options"></div>
    </div>
    <div class="nav-row">
      <button class="btn" id="prevBtn">上一題</button>
      <button class="btn btn-accent hidden" id="submitBtn">提交測驗</button>
    </div>
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
  </div>

  <!-- Result stage -->
  <div class="stage result hidden" id="resultStage"></div>
</div>

const i18n = {
  zh: { title:"計算機網路 · 互動測驗", lang:"English", prev:"上一題", submit:"提交測驗",
    progress:(c,t)=>`第 ${c} / ${t} 題`,
    rTitle:"測驗結果", score:"總分", correctN:"正確題數", wrongN:"錯誤題數",
    byDiff:"各難度正確率", easy:"簡單", medium:"中等", hard:"困難", trap:"陷阱",
    pct:p=>`你的成績超越了約 ${p}% 的測試者`, grade:"等級評定",
    review:"錯題回顧", yourAns:"你的選擇", correctAns:"正確答案", noWrong:"太厲害了，全部答對！",
    retry:"重新測驗", copy:"複製結果", copied:"已複製！",
    summary:(s,c)=>`我在「計算機網路」測驗中獲得 ${s} / 670 分，答對 ${c} / 40 題。` },
  en: { title:"Computer Networks · Interactive Quiz", lang:"中文", prev:"Previous", submit:"Submit Quiz",
    progress:(c,t)=>`Question ${c} / ${t}`,
    rTitle:"Quiz Result", score:"Total Score", correctN:"Correct", wrongN:"Incorrect",
    byDiff:"Accuracy by Difficulty", easy:"Easy", medium:"Medium", hard:"Hard", trap:"Trap",
    pct:p=>`You scored higher than about ${p}% of test takers`, grade:"Grade",
    review:"Review of Incorrect Questions", yourAns:"Your answer", correctAns:"Correct answer",
    noWrong:"Outstanding — everything correct!",
    retry:"Retake Quiz", copy:"Copy Result", copied:"Copied!",
    summary:(s,c)=>`I scored ${s} / 670 on the Computer Networks quiz, answering ${c} / 40 correctly.` }
};

const grades = [
  {min:600,zh:"🏆 頂尖專家",en:"🏆 Top Expert"},
  {min:500,zh:"⭐ 進階掌握",en:"⭐ Advanced"},
  {min:380,zh:"📘 中等水準",en:"📘 Intermediate"},
  {min:250,zh:"📗 基礎尚可",en:"📗 Basic"},
  {min:0,  zh:"📕 需要加強",en:"📕 Needs Improvement"}
];

let lang = "zh";
let current = 0;
const answers = new Array(questions.length).fill(null);
const KEYS = ["A","B","C","D"];

// ---- Theme ----
function initTheme(){
  const saved = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  setTheme(saved);
}
function setTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("themeBtn").textContent = t === "dark" ? "☀️" : "🌙";
}
document.getElementById("themeBtn").onclick = () => {
  const cur = document.documentElement.getAttribute("data-theme");
  setTheme(cur === "dark" ? "light" : "dark");
};
document.getElementById("langBtn").onclick = () => {
  lang = lang === "zh" ? "en" : "zh";
  document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
  applyStaticText();
  if (document.getElementById("resultStage").classList.contains("hidden")) renderQuestion();
  else renderResult();
};

function applyStaticText(){
  const t = i18n[lang];
  document.getElementById("title").textContent = t.title;
  document.getElementById("langBtn").textContent = t.lang;
  document.getElementById("prevBtn").textContent = t.prev;
  document.getElementById("submitBtn").textContent = t.submit;
}

// ---- Quiz ----
function renderQuestion(){
  const t = i18n[lang];
  const q = questions[current];
  const data = q[lang];
  document.getElementById("progressInfo").textContent = t.progress(current+1, questions.length);
  document.getElementById("qText").textContent = data.question;
  const optBox = document.getElementById("options");
  optBox.innerHTML = "";
  data.options.forEach((opt, idx) => {
    const b = document.createElement("button");
    b.className = "option" + (answers[current] === idx ? " selected" : "");
    b.innerHTML = `<span class="key">${KEYS[idx]}</span><span>${opt}</span>`;
    b.onclick = () => choose(idx);
    optBox.appendChild(b);
  });
  document.getElementById("prevBtn").style.visibility = current === 0 ? "hidden" : "visible";
  const submit = document.getElementById("submitBtn");
  const isLast = current === questions.length - 1;
  submit.classList.toggle("hidden", !(isLast && answers[current] !== null));
  const pct = ((current+ (answers[current]!==null?1:0)) / questions.length) * 100;
  document.getElementById("barFill").style.width = pct + "%";
}

function choose(idx){
  answers[current] = idx;
  // show selected state
  const opts = document.querySelectorAll("#options .option");
  opts.forEach((o,i)=>o.classList.toggle("selected", i===idx));
  const isLast = current === questions.length - 1;
  if (isLast){
    document.getElementById("submitBtn").classList.remove("hidden");
    document.getElementById("barFill").style.width = "100%";
    return;
  }
  // auto-advance after ~0.4s with fade
  const card = document.getElementById("qCard");
  setTimeout(()=>{
    card.classList.add("fade");
    setTimeout(()=>{
      current++;
      renderQuestion();
      card.classList.remove("fade");
    }, 250);
  }, 400);
}

document.getElementById("prevBtn").onclick = () => {
  if (current === 0) return;
  const card = document.getElementById("qCard");
  card.classList.add("fade");
  setTimeout(()=>{ current--; renderQuestion(); card.classList.remove("fade"); }, 250);
};

document.getElementById("submitBtn").onclick = renderResult;

// ---- Normal CDF for percentile ----
function normalCdf(x, mean, sd){
  const z = (x - mean) / (sd * Math.SQRT2);
  return 0.5 * (1 + erf(z));
}
function erf(x){
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x);
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const t = 1/(1+p*x);
  const y = 1 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign*y;
}

function renderResult(){
  const t = i18n[lang];
  document.getElementById("quizStage").classList.add("hidden");
  const stage = document.getElementById("resultStage");
  stage.classList.remove("hidden");

  let score=0, correct=0;
  const diff = {easy:[0,0],medium:[0,0],hard:[0,0],trap:[0,0]};
  const wrong = [];
  questions.forEach((q,i)=>{
    diff[q.difficulty][1]++;
    if (answers[i] === q.answer){ score += q.points; correct++; diff[q.difficulty][0]++; }
    else wrong.push({q, your:answers[i]});
  });
  const wrongCount = questions.length - correct;
  const pctRank = Math.max(1, Math.min(99, Math.round(normalCdf(score, 301.5, 100.5)*100)));
  const grade = grades.find(g => score >= g.min);

  const diffRow = (k) => `<div class="stat"><div class="label">${t[k]}</div><div class="val">${diff[k][0]} / ${diff[k][1]}</div></div>`;

  let reviewHtml = "";
  if (wrong.length === 0){
    reviewHtml = `<p class="pct">${t.noWrong}</p>`;
  } else {
    wrong.forEach(({q,your})=>{
      const d = q[lang];
      const yourTxt = your===null ? "—" : `${KEYS[your]}. ${d.options[your]}`;
      reviewHtml += `<div class="review-item">
        <div class="review-q">${d.question}</div>
        <div class="review-line your">${t.yourAns}：${yourTxt}</div>
        <div class="review-line correct">${t.correctAns}：${KEYS[q.answer]}. ${d.options[q.answer]}</div>
        <div class="review-exp">${d.explanation}</div>
      </div>`;
    });
  }

  stage.innerHTML = `
    <h2>${t.rTitle}</h2>
    <div class="score-big">${score} / 670</div>
    <div class="grade">${grade[lang]}</div>
    <div class="pct">${t.pct(pctRank)}</div>
    <div class="stat-grid">
      <div class="stat"><div class="label">${t.correctN}</div><div class="val">${correct} / 40</div></div>
      <div class="stat"><div class="label">${t.wrongN}</div><div class="val">${wrongCount} / 40</div></div>
    </div>
    <div class="section-title">${t.byDiff}</div>
    <div class="stat-grid">
      ${diffRow("easy")}${diffRow("medium")}${diffRow("hard")}${diffRow("trap")}
    </div>
    <div class="section-title">${t.review}</div>
    ${reviewHtml}
    <div class="result-actions">
      <button class="btn btn-accent" id="retryBtn">${t.retry}</button>
      <button class="btn" id="copyBtn">${t.copy}</button>
    </div>
  `;

  document.getElementById("retryBtn").onclick = () => {
    answers.fill(null); current = 0;
    stage.classList.add("hidden");
    document.getElementById("quizStage").classList.remove("hidden");
    renderQuestion();
    window.scrollTo(0,0);
  };
  document.getElementById("copyBtn").onclick = () => {
    const text = t.summary(score, correct) + " " + t.pct(pctRank);
    navigator.clipboard.writeText(text).then(()=>{
      const b = document.getElementById("copyBtn");
      const old = b.textContent; b.textContent = t.copied;
      setTimeout(()=>b.textContent = old, 1500);
    });
  };
  window.scrollTo(0,0);
}

// ---- init ----
initTheme();
applyStaticText();
renderQuestion();
</script>
