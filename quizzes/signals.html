<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訊號與系統 互動測驗</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
    --accent: #2563EB;
    --accent-text: #FFFFFF;
    --track: #E5E7EB;
    --hover: #F3F4F6;
    --correct: #16A34A;
    --wrong: #DC2626;
  }
  [data-theme="dark"] {
    --bg: #111111;
    --text: #E5E7EB;
    --text-secondary: #9CA3AF;
    --border: #374151;
    --accent: #60A5FA;
    --accent-text: #111111;
    --track: #374151;
    --hover: #1F2937;
    --correct: #4ADE80;
    --wrong: #F87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    transition: background 0.2s, color 0.2s;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  .title { font-size: 18px; font-weight: 700; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .btn {
    font: inherit; font-size: 14px; cursor: pointer;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--hover); }
  .btn-primary {
    background: var(--accent); color: var(--accent-text); border-color: var(--accent);
  }
  .btn-primary:hover { background: var(--accent); opacity: 0.9; }
  .progress-text { font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; }
  .question {
    font-size: 18px; font-weight: 600; margin-bottom: 20px;
    transition: opacity 0.25s; opacity: 1;
  }
  .question.fade { opacity: 0; }
  .options { display: flex; flex-direction: column; gap: 10px; transition: opacity 0.25s; }
  .options.fade { opacity: 0; }
  .option {
    display: flex; align-items: flex-start; gap: 10px;
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; cursor: pointer; background: var(--bg);
    transition: background 0.15s, border-color 0.15s;
  }
  .option:hover { background: var(--hover); }
  .option.selected { border-color: var(--accent); background: var(--hover); }
  .option .label { font-weight: 700; color: var(--accent); min-width: 20px; }
  .nav { display: flex; justify-content: space-between; margin-top: 24px; }
  .progress-bar-track {
    height: 6px; background: var(--track); border-radius: 3px;
    margin-top: 28px; overflow: hidden;
  }
  .progress-bar-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }
  /* result */
  .result h2 { font-size: 22px; margin-bottom: 16px; }
  .score-big { font-size: 40px; font-weight: 800; color: var(--accent); }
  .grade { font-size: 24px; font-weight: 700; margin: 12px 0; }
  .stat-row {
    display: flex; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .stat-row .k { color: var(--text-secondary); }
  .section-title { font-size: 16px; font-weight: 700; margin: 24px 0 12px; }
  .review-item {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 12px;
  }
  .review-q { font-weight: 600; margin-bottom: 8px; }
  .rev-line { font-size: 14px; margin: 3px 0; }
  .rev-wrong { color: var(--wrong); }
  .rev-correct { color: var(--correct); }
  .rev-exp { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
  .result-btns { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title" id="appTitle">訊號與系統 測驗</div>
    <div class="controls">
      <button class="btn" id="langBtn">English</button>
      <button class="btn" id="themeBtn">🌙</button>
    </div>
  </header>

  <main id="quizView">
    <div class="progress-text" id="progressText"></div>
    <div class="question" id="questionText"></div>
    <div class="options" id="optionsBox"></div>
    <div class="nav">
      <button class="btn" id="prevBtn"></button>
      <button class="btn btn-primary hidden" id="submitBtn"></button>
    </div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
  </main>

  <main id="resultView" class="result hidden"></main>
</div>

let lang = "zh";
let current = 0;
const answers = new Array(questions.length).fill(null);
const LETTERS = ["A","B","C","D"];

// theme init
(function initTheme(){
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  setTheme(prefersDark ? "dark" : "light");
})();
function setTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("themeBtn").textContent = t === "dark" ? "☀️" : "🌙";
}
document.getElementById("themeBtn").addEventListener("click", ()=>{
  const cur = document.documentElement.getAttribute("data-theme");
  setTheme(cur === "dark" ? "light" : "dark");
});
document.getElementById("langBtn").addEventListener("click", ()=>{
  lang = lang === "zh" ? "en" : "zh";
  document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
  applyStaticText();
  if(!document.getElementById("resultView").classList.contains("hidden")) renderResult();
  else renderQuestion(false);
});

function applyStaticText(){
  const t = i18n[lang];
  document.getElementById("appTitle").textContent = t.title;
  document.getElementById("langBtn").textContent = t.lang;
  document.getElementById("prevBtn").textContent = t.prev;
  document.getElementById("submitBtn").textContent = t.submit;
}

function renderQuestion(fade=true){
  const t = i18n[lang];
  const q = questions[current];
  const qData = q[lang];
  const qEl = document.getElementById("questionText");
  const oEl = document.getElementById("optionsBox");

  const paint = ()=>{
    document.getElementById("progressText").textContent = t.progress(current+1, questions.length);
    qEl.textContent = `${current+1}. ${qData.question}`;
    oEl.innerHTML = "";
    qData.options.forEach((opt, i)=>{
      const div = document.createElement("div");
      div.className = "option" + (answers[current]===i ? " selected" : "");
      div.innerHTML = `<span class="label">${LETTERS[i]}</span><span>${opt}</span>`;
      div.addEventListener("click", ()=> selectOption(i, div));
      oEl.appendChild(div);
    });
    // nav
    document.getElementById("prevBtn").style.visibility = current===0 ? "hidden" : "visible";
    const submitBtn = document.getElementById("submitBtn");
    if(current === questions.length-1 && answers[current]!==null) submitBtn.classList.remove("hidden");
    else submitBtn.classList.add("hidden");
    // progress bar
    const answered = answers.filter(a=>a!==null).length;
    document.getElementById("progressFill").style.width = (answered/questions.length*100) + "%";
    qEl.classList.remove("fade"); oEl.classList.remove("fade");
  };

  if(fade){
    qEl.classList.add("fade"); oEl.classList.add("fade");
    setTimeout(paint, 200);
  } else paint();
}

function selectOption(i, div){
  answers[current] = i;
  document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
  div.classList.add("selected");
  const answered = answers.filter(a=>a!==null).length;
  document.getElementById("progressFill").style.width = (answered/questions.length*100) + "%";

  if(current === questions.length-1){
    document.getElementById("submitBtn").classList.remove("hidden");
    return; // 最後一題不自動提交
  }
  setTimeout(()=>{ current++; renderQuestion(true); }, 400);
}

document.getElementById("prevBtn").addEventListener("click", ()=>{
  if(current>0){ current--; renderQuestion(true); }
});
document.getElementById("submitBtn").addEventListener("click", showResult);

// normal CDF via erf approximation
function normalCdf(x, mean, sd){
  const z = (x - mean) / (sd * Math.SQRT2);
  // Abramowitz-Stegun erf
  const t = 1/(1+0.3275911*Math.abs(z));
  const y = 1 - (((((1.061405429*t -1.453152027)*t)+1.421413741)*t -0.284496736)*t +0.254829592)*t*Math.exp(-z*z);
  const erf = z>=0 ? y : -y;
  return 0.5*(1+erf);
}

function computeStats(){
  let score=0, correct=0;
  const diffStat = { easy:[0,0], medium:[0,0], hard:[0,0], trap:[0,0] };
  const wrong = [];
  questions.forEach((q,idx)=>{
    diffStat[q.difficulty][1]++;
    if(answers[idx]===q.answer){ score+=q.points; correct++; diffStat[q.difficulty][0]++; }
    else wrong.push({q, chosen:answers[idx]});
  });
  return {score, correct, wrong:questions.length-correct, diffStat, wrongList:wrong};
}

function showResult(){
  document.getElementById("quizView").classList.add("hidden");
  document.getElementById("resultView").classList.remove("hidden");
  renderResult();
}

function renderResult(){
  const t = i18n[lang];
  const s = computeStats();
  const mean = 670*0.45, sd = 670*0.15;
  const pct = Math.round(normalCdf(s.score, mean, sd)*100);
  let grade = t.grades[t.grades.length-1][1];
  for(const [thr,label] of t.grades){ if(s.score>=thr){ grade=label; break; } }

  const el = document.getElementById("resultView");
  let html = `<h2>${t.resultTitle}</h2>`;
  html += `<div class="score-big">${s.score} / 670</div>`;
  html += `<div class="grade">${t.gradeLabel}: ${grade}</div>`;
  html += `<div class="stat-row"><span class="k">${t.correctCount}</span><span>${s.correct} / 40</span></div>`;
  html += `<div class="stat-row"><span class="k">${t.wrongCount}</span><span>${s.wrong} / 40</span></div>`;
  html += `<div class="section-title">${t.byDiff}</div>`;
  [["easy",10],["medium",15],["hard",10],["trap",5]].forEach(([d])=>{
    html += `<div class="stat-row"><span class="k">${t[d]}</span><span>${s.diffStat[d][0]} / ${s.diffStat[d][1]}</span></div>`;
  });
  html += `<div class="section-title">${t.percentile(pct)}</div>`;

  html += `<div class="result-btns">
    <button class="btn btn-primary" id="retryBtn">${t.retry}</button>
    <button class="btn" id="copyBtn">${t.copy}</button>
  </div>`;

  // review
  html += `<div class="section-title">${t.reviewTitle}</div>`;
  if(s.wrongList.length===0){
    html += `<div class="rev-line">${t.noWrong}</div>`;
  } else {
    s.wrongList.forEach(({q,chosen})=>{
      const d = q[lang];
      const chosenTxt = chosen===null ? "—" : `${LETTERS[chosen]}. ${d.options[chosen]}`;
      html += `<div class="review-item">
        <div class="review-q">${q.id}. ${d.question}</div>
        <div class="rev-line rev-wrong">✗ ${t.yourAns}: ${chosenTxt}</div>
        <div class="rev-line rev-correct">✓ ${t.correctAns}: ${LETTERS[q.answer]}. ${d.options[q.answer]}</div>
        <div class="rev-exp">${d.explanation}</div>
      </div>`;
    });
  }
  el.innerHTML = html;

  document.getElementById("retryBtn").addEventListener("click", ()=>{
    current=0; answers.fill(null);
    document.getElementById("resultView").classList.add("hidden");
    document.getElementById("quizView").classList.remove("hidden");
    renderQuestion(false);
  });
  document.getElementById("copyBtn").addEventListener("click", (e)=>{
    const text = t.summary(s.score, s.correct) + " " + t.percentile(pct);
    navigator.clipboard.writeText(text).then(()=>{
      e.target.textContent = t.copied;
      setTimeout(()=>{ e.target.textContent = t.copy; }, 1500);
    });
  });
}

// start
applyStaticText();
renderQuestion(false);
</script>
</body>
</html>
