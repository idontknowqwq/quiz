<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通訊系統 互動測驗 | Communication Systems Quiz</title>
  <style>
    :root {
      --bg: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #6B7280;
      --option-border: #E5E7EB;
      --accent: #2563EB;
      --option-hover-bg: #EFF6FF;
      --option-selected-bg: #DBEAFE;
      --option-selected-border: #2563EB;
      --progress-bg: #E5E7EB;
      --card-bg: #F9FAFB;
      --btn-sec-bg: #F3F4F6;
      --btn-sec-text: #374151;
      --separator: #E5E7EB;
      --correct-bg: #D1FAE5;
      --correct-text: #065F46;
      --wrong-bg: #FEE2E2;
      --wrong-text: #991B1B;
      --header-bg: #FFFFFF;
    }
    [data-theme="dark"] {
      --bg: #111111;
      --text-primary: #E5E7EB;
      --text-secondary: #9CA3AF;
      --option-border: #374151;
      --accent: #60A5FA;
      --option-hover-bg: #1E3A5F;
      --option-selected-bg: #1E3A5F;
      --option-selected-border: #60A5FA;
      --progress-bg: #374151;
      --card-bg: #1F2937;
      --btn-sec-bg: #374151;
      --btn-sec-text: #E5E7EB;
      --separator: #374151;
      --correct-bg: #064E3B;
      --correct-text: #6EE7B7;
      --wrong-bg: #7F1D1D;
      --wrong-text: #FCA5A5;
      --header-bg: #111111;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', 'PingFang TC', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
      line-height: 1.6;
    }

    /* ── HEADER ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      border-bottom: 1px solid var(--separator);
      padding: 10px 20px 8px;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .header-title {
      font-size: 0.97rem;
      font-weight: 700;
      color: var(--text-primary);
      flex: 1;
      min-width: 120px;
    }
    .header-controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn-ctrl {
      padding: 5px 12px;
      border: 1.5px solid var(--option-border);
      border-radius: 6px;
      background: var(--btn-sec-bg);
      color: var(--btn-sec-text);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-ctrl:hover { opacity: 0.75; }
    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .progress-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }
    .progress-bar-wrap {
      margin-top: 6px;
      height: 3px;
      background: var(--progress-bg);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.35s ease;
    }

    /* ── MAIN ── */
    .main { max-width: 740px; margin: 0 auto; padding: 28px 20px 80px; }

    /* ── QUESTION CARD ── */
    .q-card { transition: opacity 0.22s ease; }
    .q-card.fade { opacity: 0; }

    .q-meta {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .q-text {
      font-size: 1.06rem;
      font-weight: 500;
      line-height: 1.75;
      color: var(--text-primary);
      margin-bottom: 22px;
    }

    /* ── OPTIONS ── */
    .opts { display: flex; flex-direction: column; gap: 9px; margin-bottom: 24px; }
    .opt-btn {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 13px 15px;
      border: 1.5px solid var(--option-border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 0.93rem;
      line-height: 1.55;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: background 0.12s, border-color 0.12s;
    }
    .opt-btn:hover { background: var(--option-hover-bg); border-color: var(--accent); }
    .opt-btn.selected {
      background: var(--option-selected-bg);
      border-color: var(--option-selected-border);
    }
    .opt-label {
      font-weight: 700;
      color: var(--accent);
      min-width: 18px;
      flex-shrink: 0;
    }

    /* ── NAV BUTTONS ── */
    .nav-row { display: flex; gap: 10px; align-items: center; }
    .btn-primary {
      padding: 10px 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.93rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      padding: 10px 18px;
      background: var(--btn-sec-bg);
      color: var(--btn-sec-text);
      border: 1.5px solid var(--option-border);
      border-radius: 8px;
      font-size: 0.93rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-secondary:hover { opacity: 0.75; }

    /* ── RESULTS ── */
    #resultsPage { display: none; }
    #resultsPage.show { display: block; }

    .score-hero {
      background: var(--card-bg);
      border: 1px solid var(--separator);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      margin-bottom: 16px;
    }
    .score-num {
      font-size: 3.2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .score-denom { font-size: 1.1rem; color: var(--text-secondary); margin-top: 2px; }
    .grade-text { font-size: 1.25rem; font-weight: 700; margin-top: 14px; }
    .pct-text { font-size: 0.88rem; color: var(--text-secondary); margin-top: 6px; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--separator);
      border-radius: 10px;
      padding: 16px;
    }
    .stat-label { font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); }

    .diff-box {
      background: var(--card-bg);
      border: 1px solid var(--separator);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .diff-box-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
    .diff-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.87rem;
      padding: 6px 0;
      border-bottom: 1px solid var(--separator);
    }
    .diff-row:last-of-type { border-bottom: none; }
    .diff-mini-bar {
      height: 5px;
      background: var(--progress-bg);
      border-radius: 3px;
      margin: 2px 0 6px;
      overflow: hidden;
    }
    .diff-mini-fill { height: 100%; background: var(--accent); }

    .results-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }

    .review-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; }
    .review-item {
      background: var(--card-bg);
      border: 1px solid var(--separator);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .review-q { font-size: 0.88rem; font-weight: 600; line-height: 1.6; margin-bottom: 10px; }
    .review-opt {
      font-size: 0.84rem;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 5px;
      line-height: 1.5;
    }
    .review-opt.wrong { background: var(--wrong-bg); color: var(--wrong-text); }
    .review-opt.correct { background: var(--correct-bg); color: var(--correct-text); }
    .review-exp {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--separator);
      line-height: 1.6;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      .score-num { font-size: 2.6rem; }
      .q-text { font-size: 0.97rem; }
      .opt-btn { font-size: 0.88rem; padding: 11px 12px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-row">
    <div class="header-title" id="hTitle">通訊系統 互動測驗</div>
    <div class="header-controls">
      <button class="btn-ctrl" id="langBtn" onclick="toggleLang()">English</button>
      <button class="btn-ctrl" id="themeBtn" onclick="toggleTheme()">🌙 深色</button>
    </div>
  </div>
  <div class="progress-row">
    <span class="progress-label" id="progressLabel">第 1 / 40 題</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- QUIZ PAGE -->
  <div id="quizPage">
    <div class="q-card" id="qCard">
      <div class="q-meta" id="qMeta">第 1 題</div>
      <div class="q-text" id="qText"></div>
      <div class="opts" id="opts"></div>
      <div class="nav-row">
        <button class="btn-secondary" id="prevBtn" onclick="prevQ()" style="display:none">← 上一題</button>
        <button class="btn-primary" id="submitBtn" onclick="submitQuiz()" style="display:none">提交測驗</button>
      </div>
    </div>
  </div>

  <!-- RESULTS PAGE -->
  <div id="resultsPage"></div>

</main>

<script>
// ═══════════════════════════════════
// QUESTION DATA  (40 題)
// difficulty: easy/medium/hard/trap
// answer: 0=A 1=B 2=C 3=D
// ═══════════════════════════════════
const Q = [
  // ── 1 ── Easy  answer A(0)
  {
    difficulty:"easy", points:10,
    zh:{
      question:"根據 Shannon-Hartley 定理，若通道頻寬為 B Hz、信號雜訊比為 SNR，則通道最大傳輸速率 C 為何？",
      options:[
        "C = B × log₂(1 + SNR)",
        "C = B × log₂(SNR)",
        "C = B² × log₂(1 + SNR)",
        "C = 2B × log₂(1 + SNR)"
      ],
      explanation:"Shannon-Hartley 定理：C = B log₂(1+SNR)，是有雜訊通道傳輸速率的理論極限。"
    },
    en:{
      question:"According to the Shannon-Hartley theorem, if the channel bandwidth is B Hz and the SNR is as given, what is the maximum channel capacity C?",
      options:[
        "C = B × log₂(1 + SNR)",
        "C = B × log₂(SNR)",
        "C = B² × log₂(1 + SNR)",
        "C = 2B × log₂(1 + SNR)"
      ],
      explanation:"The Shannon-Hartley theorem states C = B log₂(1+SNR), the theoretical upper bound for a noisy channel."
    },
    answer:0
  },

  // ── 2 ── Medium  answer C(2)
  {
    difficulty:"medium", points:15,
    zh:{
      question:"在 8-PSK（8 相位移鍵控）調變系統中，每個符元（symbol）可攜帶幾個位元，且相鄰星座點之間的相位間隔為何？",
      options:[
        "每符元 4 位元，相位間隔 90°",
        "每符元 2 位元，相位間隔 45°",
        "每符元 3 位元，相位間隔 45°",
        "每符元 3 位元，相位間隔 60°"
      ],
      explanation:"8-PSK 有 8 個相位點，每符元攜帶 log₂8 = 3 位元，相位均分 360°/8 = 45°。"
    },
    en:{
      question:"In an 8-PSK (8-ary Phase Shift Keying) modulation system, how many bits does each symbol carry, and what is the phase spacing between adjacent constellation points?",
      options:[
        "4 bits per symbol, phase spacing 90°",
        "2 bits per symbol, phase spacing 45°",
        "3 bits per symbol, phase spacing 45°",
        "3 bits per symbol, phase spacing 60°"
      ],
      explanation:"8-PSK has 8 phase points, carrying log₂8 = 3 bits/symbol, equally spaced at 360°/8 = 45°."
    },
    answer:2
  },

  // ── 3 ── Hard  answer C(2)
  {
    difficulty:"hard", points:25,
    zh:{
      question:"在數位通訊系統中，若頻譜效率（spectral efficiency）為 η bit/s/Hz，則每位元能量與雜訊功率頻譜密度之比（Eb/N₀）與信號雜訊比（SNR）的關係式為何？",
      options:[
        "Eb/N₀ = SNR × η",
        "Eb/N₀ = SNR + 10log₁₀(η)",
        "Eb/N₀ = SNR / η",
        "Eb/N₀ = SNR × η²"
      ],
      explanation:"SNR = (Eb × R)/(N₀ × B) = Eb/N₀ × η，因此 Eb/N₀ = SNR / η。頻譜效率越高，同等SNR下Eb/N₀反而更低。"
    },
    en:{
      question:"In a digital communication system with spectral efficiency η bit/s/Hz, what is the relationship between Eb/N₀ (energy per bit to noise power spectral density) and SNR?",
      options:[
        "Eb/N₀ = SNR × η",
        "Eb/N₀ = SNR + 10log₁₀(η)",
        "Eb/N₀ = SNR / η",
        "Eb/N₀ = SNR × η²"
      ],
      explanation:"Since SNR = (Eb/N₀) × (R/B) = (Eb/N₀) × η, it follows that Eb/N₀ = SNR / η."
    },
    answer:2
  },

  // ── 4 ── Trap  answer B(1)
  {
    difficulty:"trap", points:19,
    zh:{
      question:"根據 Carson 法則（Carson's Rule），若調頻（FM）信號的最大頻率偏移為 Δf、基頻信號最高頻率為 f_m，則已調 FM 信號的近似頻寬 BW 為何？",
      options:[
        "BW = 2 × Δf（僅考慮最大頻偏）",
        "BW = 2(Δf + f_m)（同時考慮頻偏與基頻頻率）",
        "BW = 2 × f_m（僅考慮基頻最高頻率）",
        "BW = 2 × Δf × f_m（頻偏與基頻頻率之乘積）"
      ],
      explanation:"Carson 法則：BW ≈ 2(Δf + f_m)。常見錯誤是只計算 2Δf（忽略了基頻頻率項 f_m）。"
    },
    en:{
      question:"According to Carson's Rule, if an FM signal has a maximum frequency deviation Δf and the highest baseband frequency is f_m, what is the approximate FM signal bandwidth BW?",
      options:[
        "BW = 2 × Δf (considering only the maximum frequency deviation)",
        "BW = 2(Δf + f_m) (considering both the deviation and baseband frequency)",
        "BW = 2 × f_m (considering only the highest baseband frequency)",
        "BW = 2 × Δf × f_m (the product of deviation and baseband frequency)"
      ],
      explanation:"Carson's Rule: BW ≈ 2(Δf + f_m). A common mistake is to use only 2Δf, omitting the baseband frequency term f_m."
    },
    answer:1
  },

  // ── 5 ── Easy  answer B(1)
  {
    difficulty:"easy", points:10,
    zh:{
      question:"奈奎斯特取樣定理指出，為避免混疊（aliasing）效應，對最高頻率為 f_m 的類比信號取樣時，取樣頻率 f_s 必須滿足何條件？",
      options:[
        "f_s ≥ f_m（等於信號最高頻率）",
        "f_s ≥ 2f_m（至少為信號最高頻率的兩倍）",
        "f_s ≥ 4f_m（至少為信號最高頻率的四倍）",
        "f_s ≥ f_m / 2（為信號最高頻率的一半）"
      ],
      explanation:"奈奎斯特定理：取樣頻率必須至少為信號最高頻率的兩倍（f_s ≥ 2f_m），才能無失真地還原原始信號。"
    },
    en:{
      question:"The Nyquist sampling theorem states that to avoid aliasing, the sampling frequency f_s for a signal with highest frequency f_m must satisfy which condition?",
      options:[
        "f_s ≥ f_m (equal to the signal's highest frequency)",
        "f_s ≥ 2f_m (at least twice the signal's highest frequency)",
        "f_s ≥ 4f_m (at least four times the signal's highest frequency)",
        "f_s ≥ f_m / 2 (half the signal's highest frequency)"
      ],
      explanation:"Nyquist theorem: sampling frequency must be at least twice the signal's highest frequency (f_s ≥ 2f_m) to reconstruct the original signal without distortion."
    },
    answer:1
  },

  // ── 6 ── Medium  answer D(3)
  {
    difficulty:"medium", points:15,
    zh:{
      question:"正交分頻多工（OFDM）相較於傳統單載波系統的主要優勢為何？",
      options:[
        "每個子載波的功率利用率較低，特別適合功率受限的物聯網環境",
        "OFDM 符元週期較短，因此對無線通道的延遲擴散更不敏感",
        "OFDM 不需要保護區間（guard interval），可節省所有頻寬開銷",
        "各子載波相互正交，可在同一頻帶同時傳多路信號而互不干擾"
      ],
      explanation:"OFDM 的核心優勢是子載波正交性，允許頻譜高效重疊；保護區間則用來對抗多徑延遲，並非不需要。"
    },
    en:{
      question:"What is the primary advantage of OFDM (Orthogonal Frequency Division Multiplexing) over traditional single-carrier systems?",
      options:[
        "Each subcarrier has lower power utilization, ideal for power-constrained IoT environments",
        "OFDM symbol periods are shorter, making them less sensitive to channel delay spread",
        "OFDM eliminates the need for a guard interval, saving all bandwidth overhead",
        "Orthogonal subcarriers allow multiple streams to be transmitted simultaneously in the same band without interfering with each other"
      ],
      explanation:"OFDM's core advantage is subcarrier orthogonality, enabling spectrally efficient overlap. Guard intervals are still required to combat multipath delay spread."
    },
    answer:3
  },

  // ── 7 ── Hard  answer D(3)
  {
    difficulty:"hard", points:25,
    zh:{
      question:"在 AWGN 通道中，接收端使用匹配濾波器（matched filter）的最主要目的是什麼？",
      options:[
        "最大化接收信號的頻寬，以縮短符元識別所需的時間",
        "消除信號中的所有諧波成分，實現理想的帶通濾波效果",
        "最小化接收端的均方誤差（MSE），降低符元間失真程度",
        "最大化取樣時刻的輸出信號雜訊比（SNR），實現最佳符元偵測性能"
      ],
      explanation:"匹配濾波器的設計原則是最大化取樣瞬間的 SNR，其脈衝響應等於發送脈波的時反（time-reversed）共軛，由此達到最優偵測性能。"
    },
    en:{
      question:"In an AWGN channel, what is the primary purpose of using a matched filter at the receiver?",
      options:[
        "Maximize the received signal bandwidth to speed up symbol identification",
        "Eliminate all harmonic components from the signal for ideal bandpass filtering",
        "Minimize the mean squared error (MSE) at the receiver to reduce inter-symbol distortion",
        "Maximize the output SNR at the sampling instant to achieve optimal symbol detection performance"
      ],
      explanation:"The matched filter maximizes the SNR at the sampling instant. Its impulse response equals the time-reversed conjugate of the transmitted pulse, yielding optimal detection."
    },
    answer:3
  },

  // ── 8 ── Trap  answer C(2)
  {
    difficulty:"trap", points:19,
    zh:{
      question:"一個類比音頻信號包含三個頻率成分：DC（0 Hz）、500 Hz 及 950 Hz。依據奈奎斯特取樣定理，下列哪個取樣頻率「恰好足夠」完整重建此信號？",
      options:[
        "950 Hz（等於信號的最高頻率成分）",
        "1000 Hz（500 Hz 最高週期性分量的兩倍）",
        "1900 Hz（等於最高頻率 950 Hz 的兩倍）",
        "2000 Hz（取整至最近的千赫茲整數）"
      ],
      explanation:"奈奎斯特頻率須為信號最高頻率的兩倍：2 × 950 = 1900 Hz。選 1000 Hz 是常見錯誤，誤將 500 Hz 視為最高頻率。"
    },
    en:{
      question:"An analog audio signal contains three frequency components: DC (0 Hz), 500 Hz, and 950 Hz. According to the Nyquist sampling theorem, which sampling frequency is 'just sufficient' to perfectly reconstruct this signal?",
      options:[
        "950 Hz (equal to the signal's highest frequency component)",
        "1000 Hz (twice the highest periodic component of 500 Hz)",
        "1900 Hz (twice the highest frequency of 950 Hz)",
        "2000 Hz (rounded to the nearest integer kilohertz)"
      ],
      explanation:"Nyquist rate = 2 × highest frequency = 2 × 950 = 1900 Hz. Choosing 1000 Hz is a common error — mistaking 500 Hz for the highest frequency."
    },
    answer:2
  },

  // ── 9 ── Easy  answer C(2)
  {
    difficulty:"easy", points:10,
    zh:{
      question:"在雙邊帶調幅（DSB-AM）中，若基頻信號的頻寬為 W Hz，則已調 AM 信號所佔用的頻寬為何？",
      options:[
        "W/2 Hz（為基頻信號頻寬的一半）",
        "W Hz（等於基頻信號頻寬）",
        "2W Hz（為基頻信號頻寬的兩倍）",
        "4W Hz（為基頻信號頻寬的四倍）"
      ],
      explanation:"DSB-AM 產生上下兩個邊帶，各佔 W Hz，因此總頻寬為 2W Hz。"

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let lang = 'zh';
let currentQ = 0;
const answers = new Array(Q.length).fill(-1);
let busy = false;

// ═══════════════════════════════════
// THEME
// ═══════════════════════════════════
function applyTheme() {
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const forcedDark = document.documentElement.dataset.forcedTheme === 'dark';
  const forcedLight = document.documentElement.dataset.forcedTheme === 'light';
  const isDark = forcedDark || (!forcedLight && prefersDark);
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = isDark
    ? (lang === 'zh' ? '☀️ 淺色' : '☀️ Light')
    : (lang === 'zh' ? '🌙 深色' : '🌙 Dark');
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  document.documentElement.dataset.forcedTheme = cur === 'dark' ? 'light' : 'dark';
  applyTheme();
}

// ═══════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════
function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
  document.getElementById('langBtn').textContent = lang === 'zh' ? 'English' : '中文';
  applyTheme();
  if (document.getElementById('resultsPage').classList.contains('show')) {
    renderResults();
  } else {
    renderQuestion(false);
  }
}

// ═══════════════════════════════════
// RENDER QUESTION
// ═══════════════════════════════════
function renderQuestion(animate) {
  const card = document.getElementById('qCard');
  if (animate) {
    card.classList.add('fade');
    setTimeout(() => { _fill(); card.classList.remove('fade'); }, 220);
  } else {
    _fill();
  }
}

function _fill() {
  const q = Q[currentQ];
  const d = lang === 'zh' ? q.zh : q.en;
  const n = Q.length;
  const LABELS = ['A', 'B', 'C', 'D'];

  // Header
  document.getElementById('hTitle').textContent =
    lang === 'zh' ? '通訊系統 互動測驗' : 'Communication Systems Quiz';
  document.getElementById('progressLabel').textContent =
    lang === 'zh' ? `第 ${currentQ + 1} / ${n} 題` : `Question ${currentQ + 1} / ${n}`;
  document.getElementById('progressFill').style.width = `${(currentQ / n) * 100}%`;

  // Question
  document.getElementById('qMeta').textContent =
    lang === 'zh' ? `第 ${currentQ + 1} 題` : `Question ${currentQ + 1}`;
  document.getElementById('qText').textContent = d.question;

  // Options
  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  d.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[currentQ] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-label">${LABELS[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => pick(i));
    opts.appendChild(btn);
  });

  // Prev
  const prev = document.getElementById('prevBtn');
  prev.style.display = currentQ === 0 ? 'none' : '';
  prev.textContent = lang === 'zh' ? '← 上一題' : '← Previous';

  // Submit (last question only)
  const sub = document.getElementById('submitBtn');
  sub.style.display = currentQ === n - 1 ? '' : 'none';
  sub.textContent = lang === 'zh' ? '提交測驗' : 'Submit Quiz';
}

// ═══════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════
function pick(idx) {
  if (busy) return;
  answers[currentQ] = idx;

  // Highlight
  document.querySelectorAll('.opt-btn').forEach((b, i) =>
    b.classList.toggle('selected', i === idx));

  // Auto-advance (not on last question)
  if (currentQ < Q.length - 1) {
    busy = true;
    setTimeout(() => {
      currentQ++;
      renderQuestion(true);
      busy = false;
    }, 400);
  }
  // On last question: show submit button (already visible), user clicks manually
}

function prevQ() {
  if (busy || currentQ === 0) return;
  busy = true;
  currentQ--;
  renderQuestion(true);
  setTimeout(() => { busy = false; }, 280);
}

function submitQuiz() {
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('resultsPage').classList.add('show');
  renderResults();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════
// RESULTS
// ═══════════════════════════════════
function normalCDF(z) {
  // Abramowitz & Stegun approximation
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const p = t * (0.319381530 + t * (-0.356563782 +
    t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));
  const phi = 1 - (1 / Math.sqrt(2 * Math.PI)) * Math.exp(-0.5 * z * z) * p;
  return z >= 0 ? phi : 1 - phi;
}

function calcPercentile(score) {
  const mean = 670 * 0.45;  // 301.5
  const std  = 670 * 0.15;  // 100.5
  return Math.min(99, Math.max(1, Math.round(normalCDF((score - mean) / std) * 100)));
}

function getGrade(score) {
  const g = (zh, en) => lang === 'zh' ? zh : en;
  if (score >= 600) return g('🏆 頂尖專家', '🏆 Top Expert');
  if (score >= 500) return g('⭐ 進階掌握', '⭐ Advanced');
  if (score >= 380) return g('📘 中等水準', '📘 Intermediate');
  if (score >= 250) return g('📗 基礎尚可', '📗 Basic');
  return g('📕 需要加強', '📕 Needs Improvement');
}

function renderResults() {
  const t = (zh, en) => lang === 'zh' ? zh : en;
  const LABELS = ['A', 'B', 'C', 'D'];

  let totalScore = 0, correct = 0;
  const byDiff = {
    easy:   { c: 0, tot: 10 },
    medium: { c: 0, tot: 15 },
    hard:   { c: 0, tot: 10 },
    trap:   { c: 0, tot: 5 }
  };
  const wrong = [];

  Q.forEach((q, i) => {
    if (answers[i] === q.answer) {
      totalScore += q.points;
      correct++;
      byDiff[q.difficulty].c++;
    } else {
      wrong.push(i);
    }
  });

  const pct = calcPercentile(totalScore);
  const grade = getGrade(totalScore);

  const diffLabels = {
    easy:   t('簡單 Easy', 'Easy'),
    medium: t('中等 Med',  'Medium'),
    hard:   t('困難 Hard', 'Hard'),
    trap:   t('陷阱 Trap', 'Trap')
  };

  let html = `
    <div class="score-hero">
      <div class="score-num">${totalScore}</div>
      <div class="score-denom">/ 670 ${t('分', 'pts')}</div>
      <div class="grade-text">${grade}</div>
      <div class="pct-text">${t(`你的成績超越了約 ${pct}% 的測試者`, `Your score surpasses approximately ${pct}% of test-takers`)}</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">${t('答對題數', 'Correct Answers')}</div>
        <div class="stat-val">${correct} / 40</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">${t('答錯題數', 'Wrong Answers')}</div>
        <div class="stat-val">${40 - correct} / 40</div>
      </div>
    </div>

    <div class="diff-box">
      <div class="diff-box-title">${t('各難度正確率', 'Accuracy by Difficulty')}</div>
      ${['easy','medium','hard','trap'].map(d => {
        const b = byDiff[d];
        const pct = b.tot > 0 ? Math.round(b.c / b.tot * 100) : 0;
        return `
          <div class="diff-row">
            <span>${diffLabels[d]}</span>
            <span><strong>${b.c}</strong> / ${b.tot} &nbsp;(${pct}%)</span>
          </div>
          <div class="diff-mini-bar"><div class="diff-mini-fill" style="width:${pct}%"></div></div>`;
      }).join('')}
    </div>

    <div class="results-btns">
      <button class="btn-primary" onclick="restartQuiz()">${t('重新測驗', 'Restart Quiz')}</button>
      <button class="btn-secondary" onclick="copyResult()">${t('複製結果', 'Copy Results')}</button>
    </div>`;

  if (wrong.length === 0) {
    html += `<div class="review-title">🎉 ${t('所有題目全部答對！完美成績！', 'All questions correct! Perfect score!')}</div>`;
  } else {
    html += `<div class="review-title">${t('錯題回顧', 'Wrong Answer Review')} (${wrong.length} ${t('題', 'questions')})</div>`;
    wrong.forEach(i => {
      const q = Q[i];
      const d = lang === 'zh' ? q.zh : q.en;
      const userAns = answers[i];
      html += `
        <div class="review-item">
          <div class="review-q">${t('第', 'Q.')} ${i + 1}. ${d.question}</div>
          <div class="review-opt wrong">
            ✗ ${t('你的答案', 'Your answer')}: ${userAns >= 0 ? LABELS[userAns] + '. ' + d.options[userAns] : t('未作答', 'Not answered')}
          </div>
          <div class="review-opt correct">
            ✓ ${t('正確答案', 'Correct answer')}: ${LABELS[q.answer]}. ${d.options[q.answer]}
          </div>
          <div class="review-exp">💡 ${d.explanation}</div>
        </div>`;
    });
  }

  document.getElementById('resultsPage').innerHTML = html;
}

function restartQuiz() {
  answers.fill(-1);
  currentQ = 0;
  document.getElementById('resultsPage').classList.remove('show');
  document.getElementById('resultsPage').innerHTML = '';
  document.getElementById('quizPage').style.display = '';
  renderQuestion(false);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyResult() {
  let totalScore = 0, correct = 0;
  const byDiff = { easy:{c:0,tot:10}, medium:{c:0,tot:15}, hard:{c:0,tot:10}, trap:{c:0,tot:5} };
  Q.forEach((q, i) => {
    if (answers[i] === q.answer) { totalScore += q.points; correct++; byDiff[q.difficulty].c++; }
  });
  const pct = calcPercentile(totalScore);
  const grade = getGrade(totalScore);
  const text = lang === 'zh'
    ? `【通訊系統測驗成績】\n總分：${totalScore}/670\n正確：${correct}/40\n等級：${grade}\n超越約 ${pct}% 的測試者\n簡單：${byDiff.easy.c}/10 ｜ 中等：${byDiff.medium.c}/15 ｜ 困難：${byDiff.hard.c}/10 ｜ 陷阱：${byDiff.trap.c}/5`
    : `[Communication Systems Quiz Result]\nScore: ${totalScore}/670\nCorrect: ${correct}/40\nGrade: ${grade}\nBeats ~${pct}% of test-takers\nEasy: ${byDiff.easy.c}/10 | Medium: ${byDiff.medium.c}/15 | Hard: ${byDiff.hard.c}/10 | Trap: ${byDiff.trap.c}/5`;
  navigator.clipboard.writeText(text)
    .then(() => alert(lang === 'zh' ? '已複製到剪貼簿！' : 'Copied to clipboard!'))
    .catch(() => prompt(lang === 'zh' ? '請手動複製：' : 'Copy manually:', text));
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
applyTheme();
renderQuestion(false);
  </script>
