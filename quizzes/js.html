<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript 互動測驗</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
    --accent: #2563EB;
    --accent-text: #FFFFFF;
    --surface: #FFFFFF;
    --hover: #F3F4F6;
    --correct: #16A34A;
    --wrong: #DC2626;
    --track: #E5E7EB;
  }
  html[data-theme="dark"] {
    --bg: #111111;
    --text: #E5E7EB;
    --text-secondary: #9CA3AF;
    --border: #374151;
    --accent: #60A5FA;
    --accent-text: #111111;
    --surface: #1A1A1A;
    --hover: #1F2937;
    --correct: #4ADE80;
    --wrong: #F87171;
    --track: #374151;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    transition: background 0.2s, color 0.2s;
    min-height: 100vh;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .title { font-size: 18px; font-weight: 700; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .btn {
    font: inherit;
    font-size: 14px;
    padding: 7px 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--hover); }
  .progress-text { color: var(--text-secondary); font-size: 14px; margin: 18px 0 8px; }

  .qcard { opacity: 1; transition: opacity 0.25s ease; }
  .qcard.fade { opacity: 0; }
  .question {
    font-size: 19px;
    font-weight: 600;
    margin: 8px 0 20px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    font: inherit;
    font-size: 16px;
    text-align: left;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: background 0.15s, border-color 0.15s;
  }
  .option:hover { background: var(--hover); }
  .option .label { font-weight: 700; color: var(--accent); flex-shrink: 0; }
  .option.selected {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--accent-text);
  }
  .option.selected .label { color: var(--accent-text); }

  .nav { display: flex; justify-content: space-between; margin-top: 24px; }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--accent); opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .bar-track {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 6px;
    background: var(--track);
  }
  .bar-fill {
    height: 100%;
    width: 0;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  /* Results */
  .result h2 { font-size: 22px; margin: 8px 0 16px; }
  .score-big { font-size: 40px; font-weight: 800; color: var(--accent); }
  .grade { font-size: 24px; font-weight: 700; margin: 8px 0; }
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 18px 0;
  }
  .stat {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .stat .k { color: var(--text-secondary); font-size: 13px; }
  .stat .v { font-size: 20px; font-weight: 700; margin-top: 2px; }
  .percentile {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin: 16px 0;
    font-size: 16px;
  }
  .review-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin: 12px 0;
  }
  .review-q { font-weight: 600; margin-bottom: 8px; white-space: pre-wrap; }
  .review-line { font-size: 15px; margin: 3px 0; }
  .mark-wrong { color: var(--wrong); font-weight: 600; }
  .mark-correct { color: var(--correct); font-weight: 600; }
  .review-exp { color: var(--text-secondary); font-size: 14px; margin-top: 6px; }
  .section-h { font-size: 17px; font-weight: 700; margin: 24px 0 6px; }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0 40px; }
  .hidden { display: none; }
  @media (max-width: 480px) {
    .title { font-size: 16px; }
    .question { font-size: 17px; }
    .stat-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title" id="appTitle">JavaScript 互動測驗</div>
    <div class="controls">
      <button class="btn" id="langBtn">English</button>
      <button class="btn" id="themeBtn">🌙 深色</button>
    </div>
  </header>

  <!-- Quiz view -->
  <div id="quizView">
    <div class="progress-text" id="progressText"></div>
    <div class="qcard" id="qcard">
      <div class="question" id="questionText"></div>
      <div class="options" id="optionsBox"></div>
    </div>
    <div class="nav">
      <button class="btn" id="prevBtn">上一題</button>
      <button class="btn btn-primary hidden" id="submitBtn">提交測驗</button>
    </div>
  </div>

  <!-- Result view -->
  <div id="resultView" class="result hidden"></div>
</div>
<div class="bar-track"><div class="bar-fill" id="barFill"></div></div>

let lang = "zh";
let current = 0;
const answers = new Array(questions.length).fill(null);
let locked = false;

const $ = (id) => document.getElementById(id);

function initTheme() {
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  setTheme(prefersDark ? "dark" : "light");
}
function setTheme(mode) {
  document.documentElement.setAttribute("data-theme", mode);
  $("themeBtn").textContent = mode === "dark" ? i18n[lang].light : i18n[lang].dark;
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme");
  setTheme(cur === "dark" ? "light" : "dark");
}

function toggleLang() {
  lang = lang === "zh" ? "en" : "zh";
  document.documentElement.setAttribute("lang", lang === "zh" ? "zh-Hant" : "en");
  applyStaticText();
  if ($("resultView").classList.contains("hidden")) {
    renderQuestion(true);
  } else {
    renderResult();
  }
}

function applyStaticText() {
  const t = i18n[lang];
  $("appTitle").textContent = t.title;
  $("langBtn").textContent = t.lang;
  $("prevBtn").textContent = t.prev;
  $("submitBtn").textContent = t.submit;
  const mode = document.documentElement.getAttribute("data-theme");
  $("themeBtn").textContent = mode === "dark" ? t.light : t.dark;
  document.title = t.title;
}

function updateBar() {
  const answered = answers.filter(a => a !== null).length;
  $("barFill").style.width = (answered / questions.length * 100) + "%";
}

function renderQuestion(skipFade) {
  const t = i18n[lang];
  const q = questions[current];
  const data = q[lang];
  const card = $("qcard");

  const paint = () => {
    $("progressText").textContent = t.progress(current + 1, questions.length);
    $("questionText").textContent = data.question;
    const box = $("optionsBox");
    box.innerHTML = "";
    data.options.forEach((opt, i) => {
      const el = document.createElement("button");
      el.className = "option" + (answers[current] === i ? " selected" : "");
      el.innerHTML = `<span class="label">${t.labels[i]}</span><span>${escapeHtml(opt)}</span>`;
      el.onclick = () => choose(i);
      box.appendChild(el);
    });
    $("prevBtn").disabled = current === 0;
    const isLast = current === questions.length - 1;
    const allAnswered = answers.every(a => a !== null);
    $("submitBtn").classList.toggle("hidden", !(isLast && answers[current] !== null && allAnswered));
    card.classList.remove("fade");
  };

  if (skipFade) { paint(); }
  else { card.classList.add("fade"); setTimeout(paint, 150); }
}

function choose(i) {
  if (locked) return;
  answers[current] = i;
  // show selection
  const opts = document.querySelectorAll(".option");
  opts.forEach((el, idx) => el.classList.toggle("selected", idx === i));
  updateBar();

  const isLast = current === questions.length - 1;
  if (isLast) {
    // do not auto-advance; show submit button if all answered
    const allAnswered = answers.every(a => a !== null);
    $("submitBtn").classList.toggle("hidden", !allAnswered);
    return;
  }
  locked = true;
  setTimeout(() => {
    locked = false;
    current++;
    renderQuestion();
  }, 400);
}

function prev() {
  if (current > 0) { current--; renderQuestion(); }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// normal CDF via erf approximation
function normalCdf(x, mean, sd) {
  const z = (x - mean) / (sd * Math.SQRT2);
  return 0.5 * (1 + erf(z));
}
function erf(x) {
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x);
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const t = 1/(1+p*x);
  const y = 1 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign*y;
}

function computeResult() {
  let score = 0, correct = 0;
  const byDiff = { easy:{c:0,n:0}, medium:{c:0,n:0}, hard:{c:0,n:0}, trap:{c:0,n:0} };
  const wrong = [];
  questions.forEach((q, idx) => {
    byDiff[q.difficulty].n++;
    if (answers[idx] === q.answer) { score += q.points; correct++; byDiff[q.difficulty].c++; }
    else wrong.push(idx);
  });
  return { score, correct, wrong, byDiff };
}

function gradeIndex(score) {
  if (score >= 600) return 0;
  if (score >= 500) return 1;
  if (score >= 380) return 2;
  if (score >= 250) return 3;
  return 4;
}

function renderResult() {
  const t = i18n[lang];
  const { score, correct, wrong, byDiff } = computeResult();
  const total = questions.reduce((s,q)=>s+q.points,0);
  const pct = Math.max(0, Math.min(100, Math.round(normalCdf(score, 301.5, 100.5) * 100)));
  const gi = gradeIndex(score);

  let html = `<h2>${t.rTitle}</h2>`;
  html += `<div class="score-big">${score} / ${total}</div>`;
  html += `<div class="grade">${t.grades[gi]}</div>`;
  html += `<div class="stat-grid">
    <div class="stat"><div class="k">${t.rCorrect}</div><div class="v">${correct} / 40</div></div>
    <div class="stat"><div class="k">${t.rWrong}</div><div class="v">${40 - correct} / 40</div></div>
  </div>`;
  html += `<div class="section-h">${t.rByDiff}</div>`;
  html += `<div class="stat-grid">
    <div class="stat"><div class="k">${t.dEasy}</div><div class="v">${byDiff.easy.c} / ${byDiff.easy.n}</div></div>
    <div class="stat"><div class="k">${t.dMedium}</div><div class="v">${byDiff.medium.c} / ${byDiff.medium.n}</div></div>
    <div class="stat"><div class="k">${t.dHard}</div><div class="v">${byDiff.hard.c} / ${byDiff.hard.n}</div></div>
    <div class="stat"><div class="k">${t.dTrap}</div><div class="v">${byDiff.trap.c} / ${byDiff.trap.n}</div></div>
  </div>`;
  html += `<div class="percentile">${t.percentile(pct)}</div>`;

  html += `<div class="section-h">${t.reviewH}</div>`;
  if (wrong.length === 0) {
    html += `<div class="review-item">${t.allCorrect}</div>`;
  } else {
    wrong.forEach(idx => {
      const q = questions[idx];
      const data = q[lang];
      const userIdx = answers[idx];
      const userTxt = userIdx === null ? "—" : `${t.labels[userIdx]}. ${escapeHtml(data.options[userIdx])}`;
      const corrTxt = `${t.labels[q.answer]}. ${escapeHtml(data.options[q.answer])}`;
      html += `<div class="review-item">
        <div class="review-q">${escapeHtml(data.question)}</div>
        <div class="review-line mark-wrong">${t.yourAns}: ${userTxt}</div>
        <div class="review-line mark-correct">${t.correctAns}: ${corrTxt}</div>
        <div class="review-exp">${escapeHtml(data.explanation)}</div>
      </div>`;
    });
  }

  html += `<div class="result-actions">
    <button class="btn btn-primary" id="retryBtn">${t.retry}</button>
    <button class="btn" id="copyBtn">${t.copy}</button>
  </div>`;

  $("resultView").innerHTML = html;
  $("retryBtn").onclick = retry;
  $("copyBtn").onclick = () => {
    const text = t.summary(score, correct);
    navigator.clipboard.writeText(text).then(() => {
      $("copyBtn").textContent = t.copied;
      setTimeout(() => { $("copyBtn").textContent = t.copy; }, 1500);
    });
  };
}

function submit() {
  $("quizView").classList.add("hidden");
  $("resultView").classList.remove("hidden");
  $("barFill").style.width = "100%";
  window.scrollTo(0, 0);
  renderResult();
}

function retry() {
  for (let i = 0; i < answers.length; i++) answers[i] = null;
  current = 0;
  $("resultView").classList.add("hidden");
  $("quizView").classList.remove("hidden");
  updateBar();
  renderQuestion(true);
  window.scrollTo(0, 0);
}

// wire up
$("langBtn").onclick = toggleLang;
$("themeBtn").onclick = toggleTheme;
$("prevBtn").onclick = prev;
$("submitBtn").onclick = submit;

initTheme();
applyStaticText();
renderQuestion(true);
updateBar();
</script>
