<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電子學互動測驗</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
    --accent: #2563EB;
    --accent-text: #FFFFFF;
    --correct: #16A34A;
    --wrong: #DC2626;
    --surface: #F9FAFB;
  }
  [data-theme="dark"] {
    --bg: #111111;
    --text: #E5E7EB;
    --text-secondary: #9CA3AF;
    --border: #374151;
    --accent: #60A5FA;
    --accent-text: #111111;
    --correct: #4ADE80;
    --wrong: #F87171;
    --surface: #1C1C1C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
    line-height: 1.6;
    transition: background 0.2s, color 0.2s;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 8px 0 16px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .title { font-size: 18px; font-weight: 700; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .ctrl-btn {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: var(--border); }
  .progress-info { font-size: 14px; color: var(--text-secondary); margin: 16px 0 8px; }
  .quiz-area { flex: 1; }
  .question-card { opacity: 1; transition: opacity 0.25s ease; }
  .question-card.fading { opacity: 0; }
  .q-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; font-size: 15px; cursor: pointer; text-align: left;
    color: var(--text); transition: background 0.15s, border-color 0.15s;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .option:hover { background: var(--surface); }
  .option.selected { border-color: var(--accent); background: var(--accent); color: var(--accent-text); }
  .option .label { font-weight: 700; }
  .nav-row { display: flex; justify-content: space-between; margin-top: 24px; align-items: center; gap: 12px; }
  .nav-btn {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 18px; font-size: 14px; cursor: pointer;
  }
  .nav-btn:hover:not(:disabled) { background: var(--surface); }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .submit-btn {
    background: var(--accent); color: var(--accent-text); border: none;
    border-radius: 6px; padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .progress-bar-wrap { margin-top: auto; padding-top: 24px; }
  .progress-bar-bg { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
  /* Results */
  .results { display: none; }
  .result-score { font-size: 40px; font-weight: 800; color: var(--accent); }
  .result-grade { font-size: 24px; font-weight: 700; margin: 8px 0 4px; }
  .result-sub { color: var(--text-secondary); margin-bottom: 24px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .stat-label { font-size: 13px; color: var(--text-secondary); }
  .stat-val { font-size: 20px; font-weight: 700; margin-top: 2px; }
  .section-title { font-size: 18px; font-weight: 700; margin: 24px 0 12px; }
  .review-item { border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .review-q { font-weight: 600; margin-bottom: 8px; }
  .review-ans { font-size: 14px; padding: 4px 0; }
  .review-ans.user { color: var(--wrong); }
  .review-ans.correct { color: var(--correct); }
  .review-exp { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
  .result-actions { display: flex; gap: 12px; margin: 24px 0; flex-wrap: wrap; }
  .percentile { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 24px; font-size: 16px; }
  @media (max-width: 480px) {
    .title { font-size: 15px; width: 100%; }
    .ctrl-btn { padding: 5px 9px; font-size: 12px; }
    .stat-grid { grid-template-columns: 1fr; }
    .q-text { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title" id="appTitle">電子學互動測驗</div>
    <div class="controls">
      <button class="ctrl-btn" id="langBtn">English</button>
      <button class="ctrl-btn" id="themeBtn">🌙 深色</button>
    </div>
  </header>

  <!-- Quiz -->
  <div id="quizScreen">
    <div class="progress-info" id="progressInfo"></div>
    <div class="quiz-area">
      <div class="question-card" id="questionCard">
        <div class="q-text" id="qText"></div>
        <div class="options" id="optionsBox"></div>
      </div>
      <div class="nav-row">
        <button class="nav-btn" id="prevBtn"></button>
        <button class="submit-btn" id="submitBtn" style="display:none;"></button>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="resultScreen">
    <div class="result-score" id="rScore"></div>
    <div class="result-grade" id="rGrade"></div>
    <div class="result-sub" id="rSub"></div>
    <div class="percentile" id="rPercentile"></div>
    <div class="stat-grid" id="rStats"></div>
    <div class="section-title" id="reviewTitle"></div>
    <div id="reviewBox"></div>
    <div class="result-actions">
      <button class="submit-btn" id="retryBtn"></button>
      <button class="nav-btn" id="copyBtn"></button>
    </div>
  </div>
</div>

const L = {

    rScore:(s)=>`${s} / 670`, correctN:"正確題數", wrongN:"錯誤題數",
    byDiff:{easy:"簡單",medium:"中等",hard:"困難",trap:"陷阱"},
    grades:{expert:"🏆 頂尖專家",adv:"⭐ 進階掌握",inter:"📘 中等水準",basic:"📗 基礎尚可",need:"📕 需要加強"},
    percentile:(p)=>`你的成績超越了約 ${p}% 的測試者`,

    optLabels:["A","B","C","D"],

    grades:{expert:"🏆 Top Expert",adv:"⭐ Advanced",inter:"📘 Intermediate",basic:"📗 Basic",need:"📕 Needs Improvement"},
    percentile:(p)=>`You scored higher than about ${p}% of test takers`,
    review:"Review of Incorrect Answers", yourAns:"Your answer", correctAns:"Correct answer",
    retry:"Retry Quiz", copy:"Copy Results", copied:"Copied!",
    allCorrect:"Excellent! All correct — nothing to review.",

let lang = "zh";
let current = 0;
const answers = new Array(questions.length).fill(null);

// Theme
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("themeBtn").textContent = t==="dark" ? L[lang].themeLight : L[lang].themeDark;
  themeState = t;
}
let themeState = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
applyTheme(themeState);

document.getElementById("themeBtn").onclick = ()=> applyTheme(themeState==="dark"?"light":"dark");
document.getElementById("langBtn").onclick = ()=>{
  lang = lang==="zh"?"en":"zh";
  document.documentElement.lang = lang==="zh"?"zh-Hant":"en";
  applyStaticText();
  if(document.getElementById("resultScreen").style.display==="block") showResults();
  else renderQuestion(false);
};

function applyStaticText(){
  const t = L[lang];
  document.getElementById("appTitle").textContent = t.title;
  document.title = t.title;
  document.getElementById("langBtn").textContent = t.langBtn;
  document.getElementById("themeBtn").textContent = themeState==="dark"?t.themeLight:t.themeDark;
  document.getElementById("prevBtn").textContent = t.prev;
  document.getElementById("submitBtn").textContent = t.submit;
  document.getElementById("retryBtn").textContent = t.retry;
  document.getElementById("copyBtn").textContent = t.copy;
  document.getElementById("reviewTitle").textContent = t.review;
}

function renderQuestion(fade=true){
  const card = document.getElementById("questionCard");
  const draw = ()=>{
    const t = L[lang];
    const q = questions[current];
    const qd = q[lang];
    document.getElementById("progressInfo").textContent = t.progress(current+1, questions.length);
    document.getElementById("qText").textContent = qd.question;
    const box = document.getElementById("optionsBox");
    box.innerHTML = "";
    qd.options.forEach((opt,i)=>{
      const el = document.createElement("button");
      el.className = "option" + (answers[current]===i ? " selected" : "");
      el.innerHTML = `<span class="label">${t.optLabels[i]}</span><span>${opt}</span>`;
      el.onclick = ()=> selectOption(i);
      box.appendChild(el);
    });
    document.getElementById("prevBtn").disabled = current===0;
    const isLast = current===questions.length-1;
    document.getElementById("submitBtn").style.display = (isLast && answers[current]!==null) ? "inline-block" : "none";
    document.getElementById("progressFill").style.width = ((current+1)/questions.length*100)+"%";
    card.classList.remove("fading");
  };
  if(fade){
    card.classList.add("fading");
    setTimeout(draw, 250);
  } else draw();
}

function selectOption(i){
  answers[current] = i;
  // show selected state immediately
  const box = document.getElementById("optionsBox");
  [...box.children].forEach((c,idx)=> c.classList.toggle("selected", idx===i));
  const isLast = current===questions.length-1;
  if(isLast){
    document.getElementById("submitBtn").style.display = "inline-block";
  } else {
    setTimeout(()=>{ current++; renderQuestion(true); }, 400);
  }
}

document.getElementById("prevBtn").onclick = ()=>{ if(current>0){ current--; renderQuestion(true); } };
document.getElementById("submitBtn").onclick = showResults;
document.getElementById("retryBtn").onclick = ()=>{
  for(let i=0;i<answers.length;i++) answers[i]=null;
  current=0;
  document.getElementById("resultScreen").style.display="none";
  document.getElementById("quizScreen").style.display="block";
  renderQuestion(false);
  window.scrollTo(0,0);
};

// Normal CDF via erf approximation
function normalCDF(x, mean, sd){
  const z = (x-mean)/(sd*Math.SQRT2);
  // erf approximation (Abramowitz & Stegun 7.1.26)
  const t = 1/(1+0.3275911*Math.abs(z));
  const y = 1 - (((((1.061405429*t -1.453152027)*t)+1.421413741)*t -0.284496736)*t +0.254829592)*t*Math.exp(-z*z);
  const erf = z>=0 ? y : -y;
  return 0.5*(1+erf);
}

function gradeFor(score){
  if(score>=600) return "expert";
  if(score>=500) return "adv";
  if(score>=380) return "inter";
  if(score>=250) return "basic";
  return "need";
}

let lastScore=0, lastCorrect=0;

function showResults(){
  const t = L[lang];
  document.getElementById("quizScreen").style.display="none";
  document.getElementById("resultScreen").style.display="block";

  let score=0, correctCount=0;
  const byDiff = {easy:{c:0,n:0},medium:{c:0,n:0},hard:{c:0,n:0},trap:{c:0,n:0}};
  questions.forEach((q,i)=>{
    byDiff[q.difficulty].n++;
    if(answers[i]===q.answer){ score+=q.points; correctCount++; byDiff[q.difficulty].c++; }
  });
  lastScore=score; lastCorrect=correctCount;
  const wrongCount = questions.length - correctCount;

  document.getElementById("rScore").textContent = t.rScore(score);
  const g = gradeFor(score);
  document.getElementById("rGrade").textContent = t.grades[g];
  document.getElementById("rSub").textContent = t.scoreLabel;

  const pct = Math.round(normalCDF(score, 301.5, 100.5)*100);
  document.getElementById("rPercentile").textContent = t.percentile(Math.min(99,Math.max(1,pct)));

  const stats = document.getElementById("rStats");
  stats.innerHTML = "";
  const mk = (label,val)=>`<div class="stat-box"><div class="stat-label">${label}</div><div class="stat-val">${val}</div></div>`;
  stats.innerHTML += mk(t.correctN, `${correctCount} / 40`);
  stats.innerHTML += mk(t.wrongN, `${wrongCount} / 40`);
  ["easy","medium","hard","trap"].forEach(d=>{
    stats.innerHTML += mk(t.byDiff[d], `${byDiff[d].c} / ${byDiff[d].n}`);
  });

  const box = document.getElementById("reviewBox");
  box.innerHTML = "";
  const wrong = questions.map((q,i)=>({q,i})).filter(x=> answers[x.i]!==x.q.answer);
  if(wrong.length===0){
    box.innerHTML = `<div class="review-item">${t.allCorrect}</div>`;
  } else {
    wrong.forEach(({q,i})=>{
      const qd = q[lang];
      const ua = answers[i];
      const userTxt = ua===null ? "—" : `${t.optLabels[ua]}. ${qd.options[ua]}`;
      const corTxt = `${t.optLabels[q.answer]}. ${qd.options[q.answer]}`;
      const div = document.createElement("div");
      div.className = "review-item";
      div.innerHTML = `<div class="review-q">${qd.question}</div>
        <div class="review-ans user">${t.yourAns}: ${userTxt}</div>
        <div class="review-ans correct">${t.correctAns}: ${corTxt}</div>
        <div class="review-exp">${qd.explanation}</div>`;
      box.appendChild(div);
    });
  }
  window.scrollTo(0,0);
}

document.getElementById("copyBtn").onclick = ()=>{
  const t = L[lang];
  const g = gradeFor(lastScore);
  const txt = t.copyText(lastScore,lastCorrect) + t.grades[g];
  navigator.clipboard.writeText(txt).then(()=>{
    const b = document.getElementById("copyBtn");
    const orig = b.textContent; b.textContent = t.copied;
    setTimeout(()=> b.textContent = orig, 1500);
  });
};

applyStaticText();
renderQuestion(false);
</script>
