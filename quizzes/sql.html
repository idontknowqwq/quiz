<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL 互動測驗</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --muted: #6B7280;
    --border: #E5E7EB;
    --accent: #2563EB;
    --accent-text: #FFFFFF;
    --hover: #F3F4F6;
    --correct: #16A34A;
    --wrong: #DC2626;
    --track: #E5E7EB;
  }
  html[data-theme="dark"] {
    --bg: #111111;
    --text: #E5E7EB;
    --muted: #9CA3AF;
    --border: #374151;
    --accent: #60A5FA;
    --accent-text: #111111;
    --hover: #1F2937;
    --correct: #4ADE80;
    --wrong: #F87171;
    --track: #374151;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    transition: background-color 0.2s, color 0.2s;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    padding: 8px 0 16px;
    border-bottom: 1px solid var(--border);
  }
  .title { font-size: 18px; font-weight: 700; margin: 0; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .btn {
    font-size: 14px;
    padding: 7px 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.15s;
  }
  .btn:hover { background: var(--hover); }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
    font-weight: 600;
  }
  .progress-text { color: var(--muted); font-size: 14px; margin: 18px 0 6px; }
  .qtext { font-size: 18px; font-weight: 600; margin: 4px 0 18px; }
  .options { list-style: none; padding: 0; margin: 0; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 15px;
    margin-bottom: 10px;
    cursor: pointer;
    background: var(--bg);
    transition: background-color 0.15s, border-color 0.15s;
  }
  .opt:hover { background: var(--hover); }
  .opt.selected { border-color: var(--accent); background: var(--hover); }
  .opt .label { font-weight: 700; color: var(--accent); min-width: 18px; }
  .stage { transition: opacity 0.25s; }
  .stage.fade { opacity: 0; }
  .nav { display: flex; justify-content: space-between; margin-top: 18px; min-height: 40px; }
  .barwrap { height: 6px; background: var(--track); border-radius: 3px; margin-top: 24px; overflow: hidden; }
  .bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.25s; }
  /* results */
  .result-card { border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
  .score-big { font-size: 40px; font-weight: 800; color: var(--accent); }
  .grade { font-size: 22px; font-weight: 700; margin: 6px 0; }
  .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .review-item { border: 1px solid var(--border); border-radius: 8px; padding: 13px 15px; margin-bottom: 12px; }
  .rev-q { font-weight: 600; margin-bottom: 8px; }
  .rev-line { font-size: 14px; margin: 3px 0; }
  .rev-wrong { color: var(--wrong); }
  .rev-correct { color: var(--correct); }
  .rev-exp { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .hidden { display: none; }
  .section-h { font-size: 15px; font-weight: 700; margin: 22px 0 10px; color: var(--muted); }
  @media (max-width: 480px) {
    .title { font-size: 16px; }
    .btn { padding: 6px 9px; font-size: 13px; }
    .qtext { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="title" id="appTitle">SQL 互動測驗</h1>
    <div class="controls">
      <button class="btn" id="langBtn">English</button>
      <button class="btn" id="themeBtn">🌙 深色</button>
    </div>
  </header>

  <!-- QUIZ -->
  <div id="quiz">
    <div class="progress-text" id="progressText"></div>
    <div class="stage" id="stage">
      <div class="qtext" id="qText"></div>
      <ul class="options" id="optList"></ul>
    </div>
    <div class="nav">
      <button class="btn" id="prevBtn">上一題</button>
      <button class="btn btn-primary hidden" id="submitBtn">提交測驗</button>
    </div>
    <div class="barwrap"><div class="bar" id="bar"></div></div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="hidden"></div>
</div>

<script>
const questions = [
  {id:1,difficulty:"easy",points:10,answer:0,

   en:{question:"What does the SQL keyword SELECT do?",options:["Retrieves data from one or more tables","Permanently deletes rows from a table","Changes the structure of an existing table","Grants access privileges to a database user"],explanation:"SELECT 用於查詢並取回資料。/ SELECT retrieves data."}},

   en:{question:"What does an INNER JOIN return?",options:["All rows from the left table only","All rows from both tables regardless of match","Only rows with matching keys in both tables","All rows from the right table only"],explanation:"INNER JOIN 只保留雙方都匹配的列。/ Only matching rows are kept."}},

  {id:3,difficulty:"hard",points:25,answer:1,

  {id:5,difficulty:"easy",points:10,answer:0,

  {id:6,difficulty:"medium",points:15,answer:2,

  {id:7,difficulty:"hard",points:25,answer:1,

  {id:8,difficulty:"medium",points:15,answer:3,

  {id:9,difficulty:"easy",points:10,answer:0,

   en:{question:"Which aggregate function returns the number of rows?",options:["COUNT() returns the number of rows","TOTAL() returns the number of rows","NUMBER() returns the number of rows","AMOUNT() returns the number of rows"],explanation:"COUNT 用於計算列數。/ COUNT returns the row count."}},

  {id:10,difficulty:"hard",points:25,answer:2,

  {id:12,difficulty:"trap",points:19,answer:3,

   en:{question:"How does COUNT(column) differ from COUNT(*)?",options:["They always return exactly the same value","COUNT(column) counts duplicate rows only","COUNT(*) ignores rows that contain NULL","COUNT(column) ignores rows where it is NULL"],explanation:"COUNT(欄位)略過該欄 NULL。/ COUNT(col) skips NULLs in that column."}},

  {id:13,difficulty:"easy",points:10,answer:0,

   en:{question:"Which statement adds new rows to a table?",options:["INSERT adds new rows into a table","APPEND adds new rows into a table","CREATE adds new rows into a table","ATTACH adds new rows into a table"],explanation:"新增資料列用 INSERT。/ Add rows with INSERT."}},

  {id:14,difficulty:"medium",points:15,answer:2,

  {id:15,difficulty:"hard",points:25,answer:1,

   en:{question:"Which isolation level prevents dirty reads but still allows phantom reads?",options:["READ UNCOMMITTED allows reading uncommitted data","READ COMMITTED reads only committed data rows","SERIALIZABLE fully isolates concurrent transactions","REPEATABLE READ blocks all phantom row inserts"],explanation:"READ COMMITTED 防髒讀但容許幻讀。/ READ COMMITTED stops dirty reads, allows phantoms."}},

  {id:16,difficulty:"medium",points:15,answer:3,

   en:{question:"What does WHERE id IN (SELECT id FROM t2) do?",options:["Joins the two tables on every column pair","Returns rows whose id is absent from t2","Always returns every row of the outer table","Returns rows whose id appears in the subquery"],explanation:"IN 子查詢保留有相符值的列。/ IN keeps rows whose value is in the subquery."}},

  {id:17,difficulty:"easy",points:10,answer:0,

   en:{question:"Which clause filters which rows a query returns?",options:["WHERE filters rows by a given condition","SELECT filters rows by a given condition","VALUES filters rows by a given condition","BETWEEN filters rows by a given condition"],explanation:"WHERE 依條件篩選列。/ WHERE filters rows by condition."}},

  {id:18,difficulty:"medium",points:15,answer:2,

  {id:19,difficulty:"hard",points:25,answer:1,

  {id:23,difficulty:"hard",points:25,answer:1,

  {id:24,difficulty:"medium",points:15,answer:3,

   en:{question:"What does TRUNCATE TABLE do compared with DELETE?",options:["It removes only the rows matching a filter","It deletes the table definition entirely","It rolls back automatically after running","It removes all rows, usually faster, no filter"],explanation:"TRUNCATE 清空整表，通常較快。/ TRUNCATE removes all rows, usually faster."}},

  {id:25,difficulty:"easy",points:10,answer:0,

const T = {

    progress:(c,t)=>`第 ${c} / ${t} 題`, prev:"上一題", submit:"提交測驗",
    labels:["A","B","C","D"],
    rTitle:"測驗結果", total:"總分", correctN:"正確題數", wrongN:"錯誤題數",
    byDiff:"各難度正確率", easy:"簡單", medium:"中等", hard:"困難", trap:"陷阱",
    percentile:p=>`你的成績超越了約 ${p}% 的測試者`, gradeH:"等級評定",
    reviewH:"錯題回顧", yourAns:"你的選擇", correctAns:"正確答案",

    summary:(s,c)=>`SQL 互動測驗結果\n總分：${s} / 670\n正確：${c} / 40`
  },
  en: {
    title:"SQL Interactive Quiz", lang:"中文", dark:"🌙 Dark", light:"☀️ Light",
    progress:(c,t)=>`Question ${c} / ${t}`, prev:"Previous", submit:"Submit Quiz",
    labels:["A","B","C","D"],
    rTitle:"Quiz Results", total:"Total Score", correctN:"Correct", wrongN:"Incorrect",
    byDiff:"Accuracy by Difficulty", easy:"Easy", medium:"Medium", hard:"Hard", trap:"Trap",
    percentile:p=>`You scored higher than about ${p}% of test takers`, gradeH:"Grade",
    reviewH:"Review of Incorrect Answers", yourAns:"Your answer", correctAns:"Correct answer",
    retry:"Retake Quiz", copy:"Copy Results", copied:"Copied!", allCorrect:"Perfect — every answer correct!",
    grades:[[600,"🏆 Top Expert"],[500,"⭐ Advanced"],[380,"📘 Intermediate"],[250,"📗 Basic"],[0,"📕 Needs Improvement"]],
    summary:(s,c)=>`SQL Interactive Quiz Result\nScore: ${s} / 670\nCorrect: ${c} / 40`
  }

let lang = "zh";
let current = 0;
const answers = new Array(questions.length).fill(null);

const $ = id => document.getElementById(id);

// theme
(function initTheme(){
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
  updateThemeBtn();
})();
function updateThemeBtn(){
  const dark = document.documentElement.getAttribute("data-theme")==="dark";
  $("themeBtn").textContent = dark ? T[lang].light : T[lang].dark;
}
$("themeBtn").onclick = () => {
  const dark = document.documentElement.getAttribute("data-theme")==="dark";
  document.documentElement.setAttribute("data-theme", dark ? "light" : "dark");
  updateThemeBtn();
};

$("langBtn").onclick = () => {
  lang = lang==="zh" ? "en" : "zh";
  document.documentElement.lang = lang==="zh" ? "zh-Hant" : "en";
  applyStaticText();
  if($("results").classList.contains("hidden")) renderQuestion(false);
  else renderResults();
};

function applyStaticText(){
  $("appTitle").textContent = T[lang].title;
  $("langBtn").textContent = T[lang].lang;
  $("prevBtn").textContent = T[lang].prev;
  $("submitBtn").textContent = T[lang].submit;
  updateThemeBtn();
  document.title = T[lang].title;
}

function renderQuestion(fade){
  const q = questions[current];
  const data = q[lang];
  const stage = $("stage");
  const draw = () => {
    $("progressText").textContent = T[lang].progress(current+1, questions.length);
    $("qText").textContent = data.question;
    const list = $("optList");
    list.innerHTML = "";
    data.options.forEach((opt,i) => {
      const li = document.createElement("li");
      li.className = "opt" + (answers[current]===i ? " selected" : "");
      li.innerHTML = `<span class="label">${T[lang].labels[i]}</span><span>${opt}</span>`;
      li.onclick = () => choose(i);
      list.appendChild(li);
    });
    $("prevBtn").style.visibility = current===0 ? "hidden" : "visible";
    const last = current===questions.length-1;
    $("submitBtn").classList.toggle("hidden", !(last && answers[current]!==null));
    $("bar").style.width = ((current+1)/questions.length*100) + "%";
    stage.classList.remove("fade");
  };
  if(fade){ stage.classList.add("fade"); setTimeout(draw, 250); } else { draw(); }
}

function choose(i){
  answers[current] = i;
  // show selected state
  const opts = document.querySelectorAll(".opt");
  opts.forEach((o,idx)=>o.classList.toggle("selected", idx===i));
  const last = current===questions.length-1;
  if(last){
    $("submitBtn").classList.remove("hidden");
  } else {
    setTimeout(()=>{ current++; renderQuestion(true); }, 400);
  }
}

$("prevBtn").onclick = () => { if(current>0){ current--; renderQuestion(true); } };
$("submitBtn").onclick = () => { showResults(); };

// normal CDF (Abramowitz & Stegun)
function normalCdf(z){
  const t = 1/(1+0.2316419*Math.abs(z));
  const d = 0.3989423*Math.exp(-z*z/2);
  let p = d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));
  return z>0 ? 1-p : p;
}

let lastResult = null;
function computeResult(){
  let score=0, correct=0;
  const byDiff = {easy:[0,0], medium:[0,0], hard:[0,0], trap:[0,0]};
  const wrong = [];
  questions.forEach((q,i)=>{
    byDiff[q.difficulty][1]++;
    if(answers[i]===q.answer){ score+=q.points; correct++; byDiff[q.difficulty][0]++; }
    else wrong.push({q, chosen:answers[i]});
  });
  const mean=301.5, sd=100.5;
  const pct = Math.max(0, Math.min(100, Math.round(normalCdf((score-mean)/sd)*100)));
  return {score, correct, wrong:questions.length-correct, byDiff, pct, wrongList:wrong};
}

function gradeFor(score){
  for(const [min,label] of T[lang].grades){ if(score>=min) return label; }
  return T[lang].grades[T[lang].grades.length-1][1];
}

function showResults(){
  lastResult = computeResult();
  $("quiz").classList.add("hidden");
  $("results").classList.remove("hidden");
  renderResults();
  window.scrollTo(0,0);
}

function renderResults(){
  if(!lastResult) return;
  const r = lastResult, t = T[lang];
  const d = r.byDiff;
  const rows = [
    [t.total, `${r.score} / 670`],
    [t.correctN, `${r.correct} / 40`],
    [t.wrongN, `${r.wrong} / 40`]
  ];
  let html = `<div class="result-card">
    <div class="score-big">${r.score} / 670</div>
    <div class="grade">${gradeFor(r.score)}</div>
    <div style="color:var(--muted)">${t.percentile(r.pct)}</div>
  </div>
  <div class="result-card">
    ${rows.map(([k,v])=>`<div class="stat-row"><span>${k}</span><strong>${v}</strong></div>`).join("")}
  </div>
  <div class="result-card">
    <div class="section-h" style="margin-top:0">${t.byDiff}</div>
    <div class="stat-row"><span>${t.easy}</span><strong>${d.easy[0]} / ${d.easy[1]}</strong></div>
    <div class="stat-row"><span>${t.medium}</span><strong>${d.medium[0]} / ${d.medium[1]}</strong></div>
    <div class="stat-row"><span>${t.hard}</span><strong>${d.hard[0]} / ${d.hard[1]}</strong></div>
    <div class="stat-row"><span>${t.trap}</span><strong>${d.trap[0]} / ${d.trap[1]}</strong></div>
  </div>`;

  html += `<div class="section-h">${t.reviewH}</div>`;
  if(r.wrongList.length===0){
    html += `<div class="result-card">${t.allCorrect}</div>`;
  } else {
    r.wrongList.forEach(({q,chosen})=>{
      const data = q[lang];
      const yourTxt = chosen===null ? "—" : `${t.labels[chosen]}. ${data.options[chosen]}`;
      const corTxt = `${t.labels[q.answer]}. ${data.options[q.answer]}`;
      html += `<div class="review-item">
        <div class="rev-q">${data.question}</div>
        <div class="rev-line rev-wrong">${t.yourAns}: ${yourTxt}</div>
        <div class="rev-line rev-correct">${t.correctAns}: ${corTxt}</div>
        <div class="rev-exp">${data.explanation}</div>
      </div>`;
    });
  }

  html += `<div class="nav" style="margin-top:20px">
    <button class="btn btn-primary" id="retryBtn">${t.retry}</button>
    <button class="btn" id="copyBtn">${t.copy}</button>
  </div>`;

  $("results").innerHTML = html;
  $("retryBtn").onclick = retry;
  $("copyBtn").onclick = function(){
    const text = t.summary(r.score, r.correct) + "\n" + gradeFor(r.score) + "\n" + t.percentile(r.pct);
    navigator.clipboard.writeText(text).then(()=>{
      this.textContent = t.copied;
      setTimeout(()=>{ this.textContent = t.copy; }, 1500);
    }).catch(()=>{ this.textContent = t.copied; });
  };
}

function retry(){
  current = 0;
  answers.fill(null);
  lastResult = null;
  $("results").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  renderQuestion(false);
  window.scrollTo(0,0);
}

// init
applyStaticText();
renderQuestion(false);
</script>
